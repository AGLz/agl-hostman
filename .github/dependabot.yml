version: 2
updates:
  # NPM dependencies — raiz (API Fastify)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    reviewers:
      - "aguileraz"
    assignees:
      - "aguileraz"
    labels:
      - "dependencies"
      - "security"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    target-branch: "develop"
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "*-dev"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        patterns:
          - "@types/*"
          - "*-dev"
          - "eslint*"
          - "prettier"
        dependency-type: "development"

  # Laravel + Vite (frontend principal)
  - package-ecosystem: "npm"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "security"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    target-branch: "develop"

  # Vite standalone (src/web)
  - package-ecosystem: "npm"
    directory: "/src/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:45"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    target-branch: "develop"

  # MCP search server
  - package-ecosystem: "npm"
    directory: "/mcp-servers/search"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    target-branch: "develop"

  # Skill post-job (pnpm)
  - package-ecosystem: "npm"
    directory: "/.agents/skills/post-job"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:15"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    target-branch: "develop"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/docker/production"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore(docker)"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "aguileraz"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(ci)"

# Security update configuration
# Dependabot will automatically:
# - Create PRs for security updates with high/critical severity
# - Label them appropriately
# - Group related updates
# - Follow the schedule for non-security updates

# To enable:
# 1. Ensure GitHub Advanced Security is enabled (for private repos)
# 2. Configure branch protection rules for develop/main
# 3. Set up CODEOWNERS file for automatic review assignment
