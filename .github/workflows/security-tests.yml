name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  security-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2']
        laravel-version: ['10.*']

    name: PHP ${{ matrix.php-version }} Security Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        working-directory: ./src
        run: cp .env.example .env

      - name: Generate application key
        working-directory: ./src
        run: php artisan key:generate

      - name: Create database
        working-directory: ./src
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run security unit tests
        working-directory: ./src
        run: |
          vendor/bin/phpunit --testsuite=Unit --filter=Security \
            --coverage-clover=coverage-security-unit.xml \
            --coverage-xml=coverage-security-unit-xml

      - name: Run security feature tests
        working-directory: ./src
        run: |
          vendor/bin/phpunit --testsuite=Feature --filter=Security \
            --coverage-clover=coverage-security-feature.xml \
            --coverage-xml=coverage-security-feature-xml

      - name: Run PHPStan security analysis
        working-directory: ./src
        run: |
          composer require --dev phpstan/phpstan
          vendor/bin/phpstan analyse \
            --level=max \
            --error-format=github \
            --memory-limit=2G \
            app/ tests/

      - name: Run Psalm security analysis
        working-directory: ./src
        run: |
          composer require --dev vimeo/psalm
          vendor/bin/psalm \
            --show-info=false \
            --report=security-report.json \
            --set=security

      - name: Check for hardcoded secrets
        run: |
          git clone https://github.com/naugtur/input-sanitizer-checker.git /tmp/checker || true
          # Skip if clone fails, continue with other checks

      - name: Run composer audit
        working-directory: ./src
        run: composer audit --no-dev

      - name: Check for security vulnerabilities in dependencies
        working-directory: ./src
        run: |
          composer require --dev enlightn/security-checker
          vendor/bin/security-checker security:check composer.lock

      - name: Generate security coverage report
        run: |
          php .github/scripts/generate-security-report.php

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./src/coverage-security-unit.xml,./src/coverage-security-feature.xml
          flags: security
          name: codecov-security

      - name: Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './security-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

              const body = `
              ## Security Test Results

              **Status**: ${report.status === 'success' ? '✅ Passed' : '❌ Failed'}

              **Tests Run**: ${report.tests_total}
              **Assertions**: ${report.assertions}
              **Failures**: ${report.failures}
              **Errors**: ${report.errors}

              ### Coverage
              - Unit Tests: ${report.coverage.unit}%
              - Feature Tests: ${report.coverage.feature}%

              ### Issues Found
              ${report.issues.length > 0 ? report.issues.map(issue => `- ${issue.severity}: ${issue.message}`).join('\n') : 'No security issues found'}

              ---
              _Generated by GitHub Actions_
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Upload security artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: |
            ./src/coverage-security-*.xml
            ./src/security-report.json
            ./src/security-report.html

  dependency-scan:
    runs-on: ubuntu-latest
    name: Dependency Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
          working-directory: ./src

      - name: Run Snyk license scan
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: license
          working-directory: ./src

  codeql-analysis:
    runs-on: ubuntu-latest
    name: CodeQL Security Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: php, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:php"

  secrets-scan:
    runs-on: ubuntu-latest
    name: Secrets Detection Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
