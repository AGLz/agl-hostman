name: Security Scanning

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  schedule:
    # Run daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: harbor.aglz.io:5000
  IMAGE_NAME: dev/agl-hostman

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '0'  # Don't fail on vulnerabilities, just report
        scanners: 'vuln,secret,config'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: 'trivy-filesystem'

    - name: Generate Trivy report (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-fs-report.json'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'

    - name: Quality Gate - Check CRITICAL vulnerabilities
      run: |
        CRITICAL_COUNT=$(cat trivy-fs-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
        HIGH_COUNT=$(cat trivy-fs-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity == "HIGH")] | length')

        echo "🔍 Security Scan Results:"
        echo "   CRITICAL: $CRITICAL_COUNT"
        echo "   HIGH: $HIGH_COUNT"

        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "❌ CRITICAL vulnerabilities found! Pipeline BLOCKED."
          echo ""
          echo "Critical vulnerabilities:"
          cat trivy-fs-report.json | jq -r '.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL") | "- \(.VulnerabilityID): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "no fix")"'
          exit 1
        fi

        if [ "$HIGH_COUNT" -gt 0 ]; then
          echo "⚠️  HIGH vulnerabilities found. Manual review required."
          echo ""
          echo "High vulnerabilities:"
          cat trivy-fs-report.json | jq -r '.Results[].Vulnerabilities[]? | select(.Severity == "HIGH") | "- \(.VulnerabilityID): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "no fix")"'
        fi

        echo "✅ Quality gate passed (no CRITICAL vulnerabilities)"

    - name: Upload scan reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-filesystem-reports
        path: |
          trivy-fs-results.sarif
          trivy-fs-report.json
        retention-days: 30

  trivy-config:
    name: Trivy Configuration Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy config scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-config-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '0'

    - name: Upload Trivy config results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-config-results.sarif'
        category: 'trivy-config'

    - name: Generate config report
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-config-report.json'

    - name: Check configuration issues
      run: |
        CRITICAL_CONFIG=$(cat trivy-config-report.json | jq '[.Results[].Misconfigurations[]? | select(.Severity == "CRITICAL")] | length')

        echo "🔧 Configuration Scan Results:"
        echo "   CRITICAL misconfigurations: $CRITICAL_CONFIG"

        if [ "$CRITICAL_CONFIG" -gt 0 ]; then
          echo "❌ CRITICAL misconfigurations found!"
          cat trivy-config-report.json | jq -r '.Results[].Misconfigurations[]? | select(.Severity == "CRITICAL") | "- \(.ID): \(.Title)"'
        else
          echo "✅ No critical misconfigurations"
        fi

  secret-scanning:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better detection

    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified --json --fail

    - name: Secret scan with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        scanners: 'secret'
        format: 'sarif'
        output: 'trivy-secret-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'  # Block on secrets found

    - name: Upload secret scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-secret-results.sarif'
        category: 'trivy-secrets'

  dependency-scanning:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: |
        echo "🔍 Running npm audit..."
        npm audit --json > npm-audit.json || true
        npm audit --audit-level=moderate

    - name: Check npm audit results
      run: |
        CRITICAL=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')
        HIGH=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
        MODERATE=$(cat npm-audit.json | jq '.metadata.vulnerabilities.moderate // 0')

        echo "📊 Dependency Vulnerabilities:"
        echo "   CRITICAL: $CRITICAL"
        echo "   HIGH: $HIGH"
        echo "   MODERATE: $MODERATE"

        if [ "$CRITICAL" -gt 0 ]; then
          echo "❌ CRITICAL dependency vulnerabilities found!"
          cat npm-audit.json | jq -r '.vulnerabilities | to_entries[] | select(.value.severity == "critical") | "- \(.key): \(.value.via[0].title // .value.via[0])"'
          exit 1
        fi

        if [ "$HIGH" -gt 0 ]; then
          echo "⚠️  HIGH severity vulnerabilities found. Please review."
          cat npm-audit.json | jq -r '.vulnerabilities | to_entries[] | select(.value.severity == "high") | "- \(.key): \(.value.via[0].title // .value.via[0])"'
        fi

    - name: Upload npm audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-audit-report
        path: npm-audit.json
        retention-days: 30

  docker-image-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/production/Dockerfile
        load: true
        tags: ${{ env.IMAGE_NAME }}:scan-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:scan-${{ github.sha }}
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy image results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-image-results.sarif'
        category: 'trivy-docker-image'

    - name: Run Trivy image scan (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:scan-${{ github.sha }}
        format: 'json'
        output: 'trivy-image-report.json'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Quality Gate - Image vulnerabilities
      run: |
        CRITICAL=$(cat trivy-image-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
        HIGH=$(cat trivy-image-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity == "HIGH")] | length')

        echo "🐳 Docker Image Security:"
        echo "   CRITICAL: $CRITICAL"
        echo "   HIGH: $HIGH"

        if [ "$CRITICAL" -gt 0 ]; then
          echo "❌ CRITICAL vulnerabilities in Docker image!"
          cat trivy-image-report.json | jq -r '.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL") | "- \(.VulnerabilityID): \(.PkgName) \(.InstalledVersion)"'
          exit 1
        fi

        echo "✅ Docker image passed security gate"

    - name: Upload image scan reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-image-reports
        path: |
          trivy-image-results.sarif
          trivy-image-report.json
        retention-days: 30

  security-summary:
    name: Security Summary Report
    runs-on: ubuntu-latest
    needs: [trivy-filesystem, trivy-config, secret-scanning, dependency-scanning]
    if: always()
    timeout-minutes: 5

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: security-reports

    - name: Generate security summary
      run: |
        echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Job status
        echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Filesystem Scan | ${{ needs.trivy-filesystem.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Configuration Scan | ${{ needs.trivy-config.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Secret Detection | ${{ needs.secret-scanning.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Dependency Scan | ${{ needs.dependency-scanning.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Actions Required" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.trivy-filesystem.result }}" != "success" ] || \
           [ "${{ needs.secret-scanning.result }}" != "success" ] || \
           [ "${{ needs.dependency-scanning.result }}" != "success" ]; then
          echo "⚠️ **Critical issues detected!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the Security tab in GitHub" >> $GITHUB_STEP_SUMMARY
          echo "2. Check scan artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
          echo "3. Remediate CRITICAL vulnerabilities before deployment" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ All security scans passed!" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Create issue on security failure
      if: failure() && github.event_name != 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Security Scan Failed - ' + context.ref.replace('refs/heads/', ''),
            body: `## Security Scan Failure\n\n**Branch:** ${context.ref}\n**Commit:** ${context.sha}\n**Workflow:** ${context.workflow}\n\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})\n\n**Action Required:** Review the failed security scans and remediate issues before deployment.`,
            labels: ['security', 'automated']
          });
          console.log('Created issue #' + issue.data.number);

  notify-security:
    name: Security Notifications
    runs-on: ubuntu-latest
    needs: [security-summary]
    if: always() && github.event_name != 'pull_request'

    steps:
    - name: Send Slack notification
      if: ${{ secrets.SLACK_WEBHOOK_SECURITY != '' }}
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "🔒 Security Scan ${{ job.status }}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Security Scan Results"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${{ job.status }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${{ github.actor }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SECURITY }}
