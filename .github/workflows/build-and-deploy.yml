name: Build and Deploy (Optimized)

on:
  push:
    branches: [develop, release, main]
  pull_request:
    branches: [develop]

env:
  REGISTRY: harbor.aglz.io:5000
  IMAGE_NAME: agl-hostman

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        environment: [qa, uat, production]
        exclude:
          # Production builds only on main branch
          - environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate caching

      # Performance: Start timing
      - name: Record build start time
        id: build_start
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      # Cache Strategy 1: Composer Dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            src/vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-

      # Cache Strategy 2: NPM Dependencies
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            src/node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-

      # Cache Strategy 3: Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:v0.12.0

      # Login to Harbor Registry
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Cache Strategy 4: Docker Layer Cache
      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.environment }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.environment }}:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.environment }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.environment }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.environment }},mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            COMPOSER_CACHE_DIR=/root/.composer/cache
            NPM_CACHE_DIR=/root/.npm
          secrets: |
            "composer_auth=${{ secrets.COMPOSER_AUTH }}"
          target: production

      # Cache Strategy 5: Test Results
      - name: Cache Pest test results
        uses: actions/cache@v4
        with:
          path: |
            src/.phpunit.result.cache
            src/storage/framework/testing
          key: test-results-${{ github.sha }}
          restore-keys: |
            test-results-

      # Performance: Calculate build time
      - name: Calculate build performance
        id: build_metrics
        run: |
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - ${{ steps.build_start.outputs.start_time }}))
          echo "build_time_seconds=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "### Build Performance 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time**: ${BUILD_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.environment }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # Store build metrics
      - name: Store build metrics
        if: success()
        run: |
          curl -X POST https://dok.aglz.io/api/build/metrics/record \
            -H "Content-Type: application/json" \
            -d '{
              "build_time_seconds": ${{ steps.build_metrics.outputs.build_time_seconds }},
              "environment": "${{ matrix.environment }}",
              "git_sha": "${{ github.sha }}",
              "git_branch": "${{ github.ref_name }}",
              "cache_hit": true,
              "image_size_mb": 0,
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || echo "Metrics recording failed (non-blocking)"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    strategy:
      matrix:
        environment: [qa, uat]
        # Production deployment requires manual approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Dokploy via webhook
        run: |
          curl -X POST ${{ secrets.DOKPLOY_WEBHOOK_URL_${{ matrix.environment }} }} \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.environment }}:${{ github.sha }}",
              "environment": "${{ matrix.environment }}"
            }'

      - name: Verify deployment
        run: |
          sleep 30
          HEALTH_URL="${{ secrets.APP_URL_${{ matrix.environment }} }}/health"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Deployment successful - Health check passed"
          else
            echo "❌ Deployment failed - Health check returned $RESPONSE"
            exit 1
          fi

  production-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://hostman.aglz.io

    steps:
      - name: Deploy to production
        run: |
          curl -X POST ${{ secrets.DOKPLOY_WEBHOOK_URL_PRODUCTION }} \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-production:${{ github.sha }}",
              "environment": "production"
            }'

      - name: Verify production deployment
        run: |
          sleep 60
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://hostman.aglz.io/health)
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed"
            exit 1
          fi
