name: Deployment Notifications

on:
  workflow_run:
    workflows: ["Deploy to QA", "Deploy to UAT", "Deploy to Production"]
    types:
      - requested
      - completed

jobs:
  notify-start:
    if: github.event.workflow_run.conclusion == null
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment start
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/webhooks/deployment \
            -H "Content-Type: application/json" \
            -d '{
              "event": "deployment_started",
              "environment": "${{ github.event.workflow_run.name }}",
              "version": "${{ github.event.workflow_run.head_sha }}",
              "triggered_by": "${{ github.event.workflow_run.actor.login }}",
              "workflow_url": "${{ github.event.workflow_run.html_url }}"
            }'

  notify-result:
    if: github.event.workflow_run.conclusion != null
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment result
        run: |
          EVENT_TYPE="deployment_${{ github.event.workflow_run.conclusion }}"

          curl -X POST ${{ secrets.APP_URL }}/api/webhooks/deployment \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"${EVENT_TYPE}\",
              \"environment\": \"${{ github.event.workflow_run.name }}\",
              \"version\": \"${{ github.event.workflow_run.head_sha }}\",
              \"conclusion\": \"${{ github.event.workflow_run.conclusion }}\",
              \"workflow_url\": \"${{ github.event.workflow_run.html_url }}\"
            }"
