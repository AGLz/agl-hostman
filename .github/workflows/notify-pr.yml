name: PR Notifications

on:
  pull_request:
    types: [opened, closed, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine event type
        id: event
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "type=${{ github.event.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request_review" ]; then
            echo "type=review_submitted" >> $GITHUB_OUTPUT
          else
            echo "type=comment_created" >> $GITHUB_OUTPUT
          fi

      - name: Send PR notification
        run: |
          MERGED="false"
          if [ "${{ github.event.action }}" == "closed" ] && [ "${{ github.event.pull_request.merged }}" == "true" ]; then
            MERGED="true"
          fi

          COMMENT_BODY="${{ github.event.comment.body || github.event.review.body || '' }}"

          curl -X POST ${{ secrets.APP_URL }}/api/webhooks/pr \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"${{ steps.event.outputs.type }}\",
              \"pr_number\": ${{ github.event.pull_request.number }},
              \"title\": \"${{ github.event.pull_request.title }}\",
              \"author\": \"${{ github.event.pull_request.user.login }}\",
              \"url\": \"${{ github.event.pull_request.html_url }}\",
              \"merged\": ${MERGED},
              \"merged_by\": \"${{ github.event.pull_request.merged_by.login || '' }}\",
              \"labels\": $(echo '${{ toJson(github.event.pull_request.labels.*.name) }}'),
              \"comment\": \"${COMMENT_BODY}\",
              \"commenter\": \"${{ github.event.comment.user.login || github.event.review.user.login || '' }}\"
            }"
