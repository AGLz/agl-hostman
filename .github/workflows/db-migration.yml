name: Database Migration

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/database/migrations/**'
      - '.github/workflows/db-migration.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      seed:
        description: 'Run seeders after migration'
        type: boolean
        default: false
      rollback:
        description: 'Rollback to previous batch'
        type: boolean
        default: false

env:
  REGISTRY: harbor.aglz.io:5000
  IMAGE_NAME: agl-hostman

jobs:
  # ============================================================================
  # Job 1: Validate Migrations
  # ============================================================================
  validate-migrations:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, pdo_pgsql
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Validate migration files
        working-directory: ./src
        run: |
          # Check for proper naming convention
          for file in database/migrations/*.php; do
            if ! basename "$file" | grep -qE '^[0-9]{4}_[0-9]{2}_[0-9]{2}_[0-9]{6}'; then
              echo "Error: Invalid migration filename: $file"
              exit 1
            fi
          done
          echo "Migration filenames validated"

      - name: Check migration syntax
        working-directory: ./src
        run: |
          php -l database/migrations/*.php
          echo "Migration syntax validated"

      - name: Dry-run migration on SQLite
        working-directory: ./src
        run: |
          cp .env.example .env
          php artisan migrate:fresh --force --dry-run || true

  # ============================================================================
  # Job 2: Test Migrations
  # ============================================================================
  test-migrations:
    name: Test Migrations
    runs-on: ubuntu-latest
    needs: validate-migrations
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Configure test database
        working-directory: ./src
        run: |
          cp .env.example .env
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=test_db/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=test_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=test_password/' .env

      - name: Run migrations on test database
        working-directory: ./src
        run: |
          php artisan migrate:fresh --force

      - name: Verify migration results
        working-directory: ./src
        run: |
          php artisan migrate:status

      - name: Test migration rollback
        working-directory: ./src
        run: |
          php artisan migrate:rollback --step=1 --force
          php artisan migrate --force

  # ============================================================================
  # Job 3: Migrate Staging
  # ============================================================================
  migrate-staging:
    name: Migrate Staging Database
    runs-on: ubuntu-latest
    needs: [validate-migrations, test-migrations]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Create backup before migration
        run: |
          BACKUP_NAME="staging-pre-migration-$(date +%Y%m%d-%H%M%S)"
          echo "Creating backup: $BACKUP_NAME"
          # Call backup API or script
          curl -X POST "${{ secrets.STAGING_BACKUP_API_URL }}" \
            -H "Authorization: Bearer ${{ secrets.STAGING_BACKUP_TOKEN }}" \
            -d "{\"name\": \"$BACKUP_NAME\"}"

      - name: Get migration status
        id: status
        working-directory: ./src
        run: |
          STATUS=$(php artisan migrate:status --json || echo '{"pending": 0}')
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Run database migrations
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DB_DATABASE: ${{ secrets.STAGING_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          php artisan migrate --force

      - name: Run seeders if requested
        working-directory: ./src
        if: github.event.inputs.seed == 'true'
        env:
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DB_DATABASE: ${{ secrets.STAGING_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          php artisan db:seed --force

      - name: Verify migration
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DB_DATABASE: ${{ secrets.STAGING_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          php artisan migrate:status

      - name: Post-migration health check
        run: |
          curl -f https://staging-agl.aglz.io/api/health || exit 1

  # ============================================================================
  # Job 4: Migrate Production
  # ============================================================================
  migrate-production:
    name: Migrate Production Database
    runs-on: ubuntu-latest
    needs: [validate-migrations, test-migrations, migrate-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivymmathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Create backup before migration
        run: |
          BACKUP_NAME="production-pre-migration-$(date +%Y%m%d-%H%M%S)"
          echo "Creating backup: $BACKUP_NAME"
          curl -X POST "${{ secrets.PRODUCTION_BACKUP_API_URL }}" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_BACKUP_TOKEN }}" \
            -d "{\"name\": \"$BACKUP_NAME\"}"

      - name: Verify backup completed
        run: |
          sleep 30
          # Verify backup was created successfully

      - name: Get migration status
        id: status
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          STATUS=$(php artisan migrate:status --json || echo '{"pending": 0}')
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          php artisan migrate:status

      - name: Run database migrations
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          php artisan migrate --force

      - name: Run seeders if requested
        working-directory: ./src
        if: github.event.inputs.seed == 'true'
        env:
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          php artisan db:seed --force

      - name: Verify migration
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          php artisan migrate:status

      - name: Post-migration health check
        run: |
          curl -f https://prod-agl.aglz.io/api/health || exit 1

  # ============================================================================
  # Job 5: Rollback Migrations (if requested)
  # ============================================================================
  rollback-migrations:
    name: Rollback Migrations
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback == 'true'
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Run migration rollback
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', github.event.inputs.environment)] }}
          DB_DATABASE: ${{ secrets[format('{0}_DB_DATABASE', github.event.inputs.environment)] }}
          DB_USERNAME: ${{ secrets[format('{0}_DB_USERNAME', github.event.inputs.environment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', github.event.inputs.environment)] }}
        run: |
          php artisan migrate:rollback --step=1 --force

      - name: Verify rollback
        working-directory: ./src
        env:
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', github.event.inputs.environment)] }}
          DB_DATABASE: ${{ secrets[format('{0}_DB_DATABASE', github.event.inputs.environment)] }}
          DB_USERNAME: ${{ secrets[format('{0}_DB_USERNAME', github.event.inputs.environment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', github.event.inputs.environment)] }}
        run: |
          php artisan migrate:status

  # ============================================================================
  # Job 6: Migration Summary
  # ============================================================================
  migration-summary:
    name: Migration Summary
    runs-on: ubuntu-latest
    needs: [validate-migrations, test-migrations, migrate-staging, migrate-production]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Generate migration summary
        run: |
          echo "## Database Migration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.migrate-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.migrate-production.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Determine Slack notification
        id: slack-notify
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: |
          steps.slack-notify.outputs.enabled == 'true' &&
          (needs.migrate-production.result == 'success' ||
           needs.migrate-staging.result == 'success' ||
           needs.migrate-production.result == 'failure')
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Database Migration ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Database Migration: ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Actor:*\n${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
