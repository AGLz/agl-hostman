name: Deploy to Production (Blue-Green)

on:
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Deployment Strategy'
        required: true
        type: choice
        options:
          - blue-green
          - rolling
          - canary
        default: 'blue-green'
      version:
        description: 'Version to deploy (e.g., v1.0.0 or latest)'
        required: true
        type: string
        default: 'latest'
      approval_1_username:
        description: 'First Approval - Lead Developer Username'
        required: true
        type: string
      approval_2_username:
        description: 'Second Approval - Admin Username'
        required: true
        type: string

env:
  HARBOR_REGISTRY: harbor.aglz.io:5000
  HARBOR_PROJECT: agl-hostman-prod
  IMAGE_NAME: agl-hostman

jobs:
  validate-approvals:
    name: Validate Deployment Approvals
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify approval signatures
        id: check
        run: |
          echo "Verifying approvals from authorized users..."

          # Check approval 1 (lead-developer)
          APPROVAL_1="${{ github.event.inputs.approval_1_username }}"
          if [[ ! "$APPROVAL_1" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid approval 1 username format"
            exit 1
          fi

          # Check approval 2 (admin)
          APPROVAL_2="${{ github.event.inputs.approval_2_username }}"
          if [[ ! "$APPROVAL_2" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid approval 2 username format"
            exit 1
          fi

          # Verify approvals are from different users
          if [ "$APPROVAL_1" == "$APPROVAL_2" ]; then
            echo "❌ Approvals must be from different users"
            exit 1
          fi

          echo "✅ Approvals validated"
          echo "approved=true" >> $GITHUB_OUTPUT

      - name: Record approval request
        run: |
          echo "📝 Recording deployment approval request..."
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Deployment Type: ${{ github.event.inputs.deployment_type }}"
          echo "Approved by: ${{ github.event.inputs.approval_1_username }}, ${{ github.event.inputs.approval_2_username }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-approvals
    if: needs.validate-approvals.outputs.approved == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, pcntl, pdo, pdo_pgsql, pgsql, redis
          coverage: none

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --no-dev

      - name: Run production smoke tests
        working-directory: ./src
        run: php artisan test --filter=ProductionSmokeTests --stop-on-failure

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }} \
            -t ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest \
            --build-arg APP_ENV=production \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION=${{ github.event.inputs.version }} \
            .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Push to Harbor
        run: |
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

  deploy-to-green:
    name: Deploy to Green Environment
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production-green
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to green environment
        run: |
          echo "🚀 Deploying version ${{ github.event.inputs.version }} to GREEN environment"

          # Implementation would call Dokploy API or SSH to production server
          # For now, simulate deployment

          curl -X POST "${{ secrets.PRODUCTION_DOKPLOY_URL }}/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "production",
              "slot": "green",
              "version": "${{ github.event.inputs.version }}",
              "replicas": 2
            }'

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for green environment to be ready..."
          sleep 60

      - name: Run health checks on green
        run: |
          echo "🏥 Running health checks on green environment..."

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://green.prod-agl.aglz.io/health || echo "000")

            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi

            echo "⏳ Health check failed with code $HTTP_CODE (attempt $i/10)"
            sleep 10
          done

          echo "❌ Health checks failed after 10 attempts"
          exit 1

      - name: Run production smoke tests on green
        run: |
          echo "🧪 Running production smoke tests on green environment..."

          # Run smoke tests against green environment
          curl -X POST "https://green.prod-agl.aglz.io/api/test/smoke" \
            -H "Authorization: Bearer ${{ secrets.API_TEST_TOKEN }}" \
            -H "Content-Type: application/json"

  switch-traffic:
    name: Switch Traffic to Green (Gradual)
    runs-on: ubuntu-latest
    needs: deploy-to-green
    environment:
      name: production
    steps:
      - name: Switch 10% traffic
        run: |
          echo "🔄 Switching 10% traffic to green..."
          curl -X POST "${{ secrets.PRODUCTION_LB_API }}/traffic/switch" \
            -H "Authorization: Bearer ${{ secrets.LB_API_TOKEN }}" \
            -d '{"target": "green", "percentage": 10}'
          sleep 120

      - name: Monitor error rates (10%)
        run: |
          echo "📊 Monitoring error rates at 10%..."
          ERROR_RATE=$(curl -s "${{ secrets.MONITORING_API }}/metrics/error-rate?slot=green" | jq -r '.error_rate')

          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ Error rate too high: $ERROR_RATE"
            exit 1
          fi

          echo "✅ Error rate acceptable: $ERROR_RATE"

      - name: Switch 50% traffic
        run: |
          echo "🔄 Switching 50% traffic to green..."
          curl -X POST "${{ secrets.PRODUCTION_LB_API }}/traffic/switch" \
            -H "Authorization: Bearer ${{ secrets.LB_API_TOKEN }}" \
            -d '{"target": "green", "percentage": 50}'
          sleep 180

      - name: Monitor error rates (50%)
        run: |
          echo "📊 Monitoring error rates at 50%..."
          ERROR_RATE=$(curl -s "${{ secrets.MONITORING_API }}/metrics/error-rate?slot=green" | jq -r '.error_rate')

          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ Error rate too high: $ERROR_RATE"
            exit 1
          fi

          echo "✅ Error rate acceptable: $ERROR_RATE"

      - name: Switch 100% traffic
        run: |
          echo "🔄 Switching 100% traffic to green..."
          curl -X POST "${{ secrets.PRODUCTION_LB_API }}/traffic/switch" \
            -H "Authorization: Bearer ${{ secrets.LB_API_TOKEN }}" \
            -d '{"target": "green", "percentage": 100}'

      - name: Monitor final state
        run: |
          echo "📊 Monitoring final state for 10 minutes..."
          sleep 600

          ERROR_RATE=$(curl -s "${{ secrets.MONITORING_API }}/metrics/error-rate?slot=green" | jq -r '.error_rate')

          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "⚠️ High error rate detected: $ERROR_RATE"
            echo "TRIGGER_ROLLBACK=true" >> $GITHUB_ENV
          else
            echo "✅ Deployment successful! Error rate: $ERROR_RATE"
          fi

  finalize-or-rollback:
    name: Finalize Deployment or Rollback
    runs-on: ubuntu-latest
    needs: switch-traffic
    if: always()
    steps:
      - name: Check deployment status
        id: check
        run: |
          if [ "${{ needs.switch-traffic.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Finalize deployment
        if: steps.check.outputs.status == 'success'
        run: |
          echo "✅ Finalizing deployment..."
          echo "Blue environment kept as rollback target for 1 hour"

      - name: Rollback to blue
        if: steps.check.outputs.status == 'failure'
        run: |
          echo "🔄 Rolling back to blue environment..."

          curl -X POST "${{ secrets.PRODUCTION_LB_API }}/traffic/switch" \
            -H "Authorization: Bearer ${{ secrets.LB_API_TOKEN }}" \
            -d '{"target": "blue", "percentage": 100}'

          echo "❌ Deployment failed - rolled back to blue"
          exit 1

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [finalize-or-rollback]
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production Deployment ${{ job.status }}
            Version: ${{ github.event.inputs.version }}
            Deployment Type: ${{ github.event.inputs.deployment_type }}
            Approvals: ${{ github.event.inputs.approval_1_username }}, ${{ github.event.inputs.approval_2_username }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Production Deployment ${{ job.status }} - v${{ github.event.inputs.version }}"
          to: ${{ secrets.DEPLOYMENT_EMAIL_RECIPIENTS }}
          from: "AGL Deployments <deployments@agl.com>"
          body: |
            Production deployment has ${{ job.status }}.

            Version: ${{ github.event.inputs.version }}
            Deployment Type: ${{ github.event.inputs.deployment_type }}
            Approved by: ${{ github.event.inputs.approval_1_username }}, ${{ github.event.inputs.approval_2_username }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
