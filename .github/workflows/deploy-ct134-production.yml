name: Deploy CT134 Production (Harbor → Dokploy)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ct134-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HARBOR_REGISTRY: harbor.aglz.io
  HARBOR_PROJECT: agl-hostman-prod
  IMAGE_NAME: hostman
  DOCKERFILE: ./src/Dockerfile
  BUILD_CONTEXT: ./src

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test (Pest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_pgsql, bcmath, intl, zip, redis
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare Laravel env
        working-directory: ./src
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run Pest (deploy gate)
        working-directory: ./src
        # ponytail: suite mínima estável — sem ExampleTest (requer Vite build no runner)
        run: |
          php -d memory_limit=512M vendor/bin/pest \
            tests/Unit/ExampleTest.php \
            tests/Feature/LlmMonitorApiTest.php \
            tests/Feature/Services/DeploymentRollbackTest.php

  build-push:
    name: Build & Push Harbor
    runs-on: [self-hosted, agl-network]
    needs: test
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::7}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="pr-${{ github.event.pull_request.number }}-${SHA}"
          else
            TAG="prod-${SHA}"
          fi
          IMAGE="${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "${IMAGE}:prod-latest" >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build & push (rede AGL)
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
        run: |
          IMAGE_TAG="${IMAGE_TAG}" bash scripts/dokploy/build-push-ct134-harbor.sh

  deploy-prod:
    name: Deploy CT134 (main)
    runs-on: [self-hosted, agl-network]
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production-ct134
      url: https://ah.aglz.io
    timeout-minutes: 15
    env:
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Rolling update CT134
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          IMAGE_TAG="${IMAGE_TAG}" bash scripts/dokploy/trigger-ct134-deploy.sh

      - name: Health check
        env:
          HEALTH_URL: ${{ secrets.CT134_HEALTH_URL || 'https://ah.aglz.io/health/' }}
        run: |
          for i in $(seq 1 36); do
            if curl -fsS "${HEALTH_URL}"; then
              echo "Health OK"
              exit 0
            fi
            echo "Aguardar deploy... ($i/36)"
            sleep 10
          done
          echo "Health check falhou: ${HEALTH_URL}" >&2
          exit 1

  pr-comment:
    name: PR — imagem Harbor
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.build-push.outputs.image_tag }}';
            const image = `${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${tag}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Imagem CT134 prod publicada no Harbor:\n\`${image}\`\n\nDeploy prod ocorre após merge em \`main\`.`
            });
