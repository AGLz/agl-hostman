name: Deploy CT134 Production (Harbor → Dokploy)

# PR → build imagem preview (sem deploy prod)
# merge/push main → build prod + deploy CT134 via Dokploy webhook

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: deploy-ct134-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: harbor.aglz.io
  HARBOR_PROJECT: agl-hostman-prod
  IMAGE_NAME: hostman
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_sqlite, bcmath, intl, zip, redis
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Composer install
        working-directory: src
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel (SQLite CI)
        working-directory: src
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate:fresh --seed --force

      - name: NPM install & build
        working-directory: src
        run: |
          npm ci
          npm run build

      - name: Pest
        working-directory: src
        run: vendor/bin/pest --parallel --processes=2

  build-push:
    name: Build & Push Harbor
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
      deploy_env: ${{ steps.tags.outputs.deploy_env }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Trust Harbor CA (self-signed)
        env:
          HARBOR_CA_CERT: ${{ secrets.HARBOR_CA_CERT }}
        run: |
          if [[ -n "${HARBOR_CA_CERT}" ]]; then
            sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}
            echo "${HARBOR_CA_CERT}" | base64 -d | sudo tee /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt >/dev/null
          fi

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
            echo "deploy_env=preview" >> "$GITHUB_OUTPUT"
          else
            TAG="prod-${SHORT_SHA}"
            echo "deploy_env=production" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build and push Laravel image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.deploy_env }}-latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.tags.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (block CRITICAL on prod)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.image_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: ${{ github.event_name == 'push' && '1' || '0' }}

  deploy-preview:
    name: Deploy PR Preview (Dokploy)
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'pull_request'
    steps:
      - name: Trigger Dokploy preview
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_PREVIEW_WEBHOOK_URL }}
        run: |
          if [[ -z "${WEBHOOK_URL}" ]]; then
            echo "DOKPLOY_PREVIEW_WEBHOOK_URL não configurado — saltar preview"
            exit 0
          fi
          curl -fsS -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag\": \"${{ needs.build-push.outputs.image_tag }}\",
              \"pr\": ${{ github.event.pull_request.number }},
              \"commit\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.head_ref }}\"
            }"

  deploy-production:
    name: Deploy CT134 (main)
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production-ct134
    steps:
      - name: Trigger Dokploy production deploy
        run: |
          if [[ -z "${{ secrets.DOKPLOY_PROD_WEBHOOK_URL }}" ]]; then
            echo "DOKPLOY_PROD_WEBHOOK_URL não configurado — saltar webhook"
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.DOKPLOY_PROD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag\": \"${{ needs.build-push.outputs.image_tag }}\",
              \"commit\": \"${{ github.sha }}\",
              \"branch\": \"main\"
            }"

      - name: Health check CT134
        env:
          HEALTH_URL: ${{ secrets.CT134_HEALTH_URL }}
        run: |
          if [[ -z "${HEALTH_URL}" ]]; then
            echo "CT134_HEALTH_URL não configurado — saltar health check"
            exit 0
          fi
          for i in $(seq 1 24); do
            if curl -fsS "${HEALTH_URL}" >/dev/null; then
              echo "Health OK: ${HEALTH_URL}"
              exit 0
            fi
            echo "Aguardar deploy ($i/24)..."
            sleep 15
          done
          echo "Health check falhou: ${HEALTH_URL}"
          exit 1

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-push, deploy-production]
    if: always() && github.event_name == 'push'
    steps:
      - name: Summary
        run: |
          echo "## CT134 Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.build-push.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy: ${{ needs.deploy-production.result || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
