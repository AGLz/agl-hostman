name: Deploy - Staging (QA)

on:
  push:
    branches: [ staging ]

env:
  REGISTRY: harbor.aglz.io:5000
  IMAGE_NAME: qa/agl-hostman
  NODE_VERSION: '20'
  DOKPLOY_URL: https://dok.aglz.io

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run full test suite
      run: |
        npm run lint
        npm test -- --coverage
        npm run test:integration

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=qa-
          type=raw,value=qa-latest
          type=raw,value=qa-${{ github.run_number }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/production/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_ENV=staging

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'

  deploy-qa:
    name: Deploy to QA Environment
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 10
    environment:
      name: staging
      url: https://agl-hostman-qa.aglz.io

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Dokploy
      run: |
        echo "🚀 Deploying to Dokploy QA environment..."

        # Trigger Dokploy webhook (if configured)
        if [ -n "${{ secrets.DOKPLOY_WEBHOOK_QA }}" ]; then
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_QA }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${{ github.sha }}",
              "environment": "staging",
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}"
            }'
        fi

        echo "✅ Deployment triggered"

    - name: Wait for deployment
      run: |
        echo "Waiting for deployment to complete..."
        sleep 30

    - name: Verify deployment health
      run: |
        for i in {1..30}; do
          if curl -f https://agl-hostman-qa.aglz.io/health; then
            echo "✅ QA environment is healthy"
            exit 0
          fi
          echo "Waiting for QA environment... ($i/30)"
          sleep 10
        done
        echo "❌ QA environment failed health check"
        exit 1

    - name: Run smoke tests
      run: |
        # Test critical endpoints
        curl -f https://agl-hostman-qa.aglz.io/api/overview || exit 1
        curl -f https://agl-hostman-qa.aglz.io/api/containers || exit 1
        curl -f https://agl-hostman-qa.aglz.io/api/network || exit 1

        echo "✅ Smoke tests passed"

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-qa
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run load tests
      run: |
        k6 run --vus 10 --duration 30s tests/performance/load-test.js || true

    - name: Check response times
      run: |
        echo "✅ Performance baseline established"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-qa, performance-test]
    if: always()

    steps:
    - name: Send Slack notification
      if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "🎯 QA Deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "QA Deployment ${{ job.status }}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\nStaging (QA)"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*URL:*\nhttps://agl-hostman-qa.aglz.io"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Image:*\nqa-${{ github.sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Deployed by:*\n${{ github.actor }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
