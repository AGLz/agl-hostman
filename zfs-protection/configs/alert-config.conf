# ZFS Alert Configuration
# Configuration for send-alert.sh

# General alert settings
ALERT_RATE_LIMIT=300                # Minimum seconds between identical alerts

# Email notifications
EMAIL_ENABLED=true
EMAIL_RECIPIENTS="admin@example.com,ops@example.com"
EMAIL_FROM="zfs-monitor@$(hostname)"
EMAIL_SMTP_SERVER="localhost"
EMAIL_SMTP_PORT=25
EMAIL_USE_TLS=false
EMAIL_USERNAME=""
EMAIL_PASSWORD=""

# Slack notifications
SLACK_ENABLED=false
SLACK_WEBHOOK_URL=""
SLACK_CHANNEL="#infrastructure"
SLACK_USERNAME="ZFS Monitor"

# Webhook notifications (generic HTTP POST)
WEBHOOK_ENABLED=false
WEBHOOK_URL=""
WEBHOOK_METHOD="POST"
WEBHOOK_HEADERS="Content-Type: application/json"
WEBHOOK_TIMEOUT=10

# SMS notifications
SMS_ENABLED=false
SMS_SERVICE="twilio"                # twilio|custom
SMS_RECIPIENTS=""                   # Comma-separated phone numbers

# Twilio settings (if using Twilio for SMS)
TWILIO_ACCOUNT_SID=""
TWILIO_AUTH_TOKEN=""
TWILIO_FROM_NUMBER=""

# Custom SMS script settings (if using custom SMS)
SMS_SCRIPT="/opt/zfs-protection/scripts/custom-sms.sh"

# PagerDuty integration
PAGERDUTY_ENABLED=false
PAGERDUTY_INTEGRATION_KEY=""
PAGERDUTY_SEVERITY_MAPPING="CRITICAL:critical,WARNING:warning,INFO:info"

# Microsoft Teams
TEAMS_ENABLED=false
TEAMS_WEBHOOK_URL=""

# Discord
DISCORD_ENABLED=false
DISCORD_WEBHOOK_URL=""

# Alert severity filtering
ALERT_CRITICAL_ENABLED=true        # Send alerts for CRITICAL issues
ALERT_WARNING_ENABLED=true         # Send alerts for WARNING issues
ALERT_INFO_ENABLED=false           # Send alerts for INFO messages

# Time-based alert filtering
ALERT_BUSINESS_HOURS_ONLY=false    # Only send alerts during business hours
ALERT_BUSINESS_START=09            # Business hours start (24-hour)
ALERT_BUSINESS_END=17              # Business hours end (24-hour)
ALERT_WEEKEND_ALERTS=true          # Send alerts on weekends

# Alert escalation
ESCALATION_ENABLED=false           # Enable alert escalation
ESCALATION_DELAY=1800              # Escalation delay (seconds)
ESCALATION_RECIPIENTS=""           # Escalation email recipients
ESCALATION_SMS_RECIPIENTS=""       # Escalation SMS recipients

# Alert suppression during maintenance
MAINTENANCE_MODE_FILE="/tmp/zfs-maintenance-mode"
SUPPRESS_DURING_MAINTENANCE=true   # Suppress alerts when maintenance file exists

# Pool-specific alert settings
CRITICAL_POOLS_ONLY=""             # Only send critical alerts for these pools
WARNING_POOLS_IGNORE=""            # Ignore warning alerts for these pools

# Alert content customization
ALERT_INCLUDE_POOL_STATUS=true     # Include full pool status in alerts
ALERT_INCLUDE_SYSTEM_INFO=true     # Include system information in alerts
ALERT_INCLUDE_ARC_STATUS=true      # Include ARC statistics in alerts
ALERT_INCLUDE_RECENT_LOGS=false    # Include recent log entries in alerts

# Advanced notification settings
ALERT_RETRY_ATTEMPTS=3             # Number of retry attempts for failed alerts
ALERT_RETRY_DELAY=60               # Delay between retry attempts (seconds)
ALERT_BATCH_ENABLED=false          # Batch multiple alerts together
ALERT_BATCH_DELAY=300              # Batch delay (seconds)
ALERT_BATCH_MAX_SIZE=5             # Maximum alerts per batch

# External tool integration
ALERT_SCRIPT_PRE=""                # Script to run before sending alerts
ALERT_SCRIPT_POST=""               # Script to run after sending alerts
ALERT_CUSTOM_HANDLER=""            # Custom alert handler script

# Logging
ALERT_LOG_ALL=true                 # Log all alerts (including successful ones)
ALERT_LOG_FAILURES_ONLY=false     # Only log failed alert attempts
ALERT_AUDIT_ENABLED=true           # Enable alert audit logging