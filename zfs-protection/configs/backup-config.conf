# ZFS Backup Configuration
# Configuration for zfs-backup.sh implementing 3-2-1 backup strategy

# Datasets to backup (space-separated list, or leave empty to auto-detect)
# Auto-detection excludes pools/datasets starting with "backup"
BACKUP_DATASETS=""

# Local backup settings (2nd copy)
LOCAL_BACKUP_ENABLED=true
LOCAL_BACKUP_POOL="backup"            # Local backup pool name
LOCAL_BACKUP_COMPRESSION="lz4"       # Compression for backup datasets

# Remote backup settings (3rd copy, off-site)
REMOTE_BACKUP_ENABLED=false
REMOTE_HOST=""                       # SSH hostname for remote backup
REMOTE_USER="root"                   # SSH user for remote backup
REMOTE_DATASET="backup"              # Remote dataset root
REMOTE_PORT=22                       # SSH port
REMOTE_COMPRESSION="gzip"            # Compression for remote sends

# Snapshot retention policies
HOURLY_RETENTION=24                  # Keep 24 hourly snapshots (1 day)
DAILY_RETENTION=30                   # Keep 30 daily snapshots (1 month)
WEEKLY_RETENTION=12                  # Keep 12 weekly snapshots (3 months)
MONTHLY_RETENTION=12                 # Keep 12 monthly snapshots (1 year)

# Backup schedule
BACKUP_SCHEDULE_ENABLED=true
HOURLY_BACKUP_ENABLED=true          # Enable hourly backups
DAILY_BACKUP_ENABLED=true           # Enable daily backups
WEEKLY_BACKUP_ENABLED=true          # Enable weekly backups
MONTHLY_BACKUP_ENABLED=true         # Enable monthly backups

# Backup verification
VERIFY_BACKUPS=true                 # Verify backup integrity after creation
VERIFICATION_METHOD="checksum"       # checksum|mount|both
VERIFY_PERCENTAGE=10                # Percentage of backups to verify (random sampling)

# Performance settings
BACKUP_BANDWIDTH_LIMIT=""           # Bandwidth limit (e.g., "100M" for 100MB/s)
PARALLEL_BACKUPS=2                  # Number of parallel backup operations
BACKUP_NICE_LEVEL=10                # Nice level for backup processes (lower priority)

# Encryption settings
BACKUP_ENCRYPTION_ENABLED=false
BACKUP_ENCRYPTION_KEY_FILE=""       # Path to encryption key file
REMOTE_ENCRYPTION_ENABLED=false     # Encrypt data for remote backups

# Notification settings
NOTIFY_ON_SUCCESS=false             # Send notifications on successful backups
NOTIFY_ON_FAILURE=true              # Send notifications on backup failures
NOTIFY_ON_VERIFICATION_FAILURE=true # Send notifications on verification failures
BACKUP_REPORT_EMAIL=""              # Email for backup reports (optional)

# Storage management
AUTO_THIN_SNAPSHOTS=true            # Automatically thin old snapshots
THIN_THRESHOLD_DAYS=90              # Thin snapshots older than this many days
EMERGENCY_CLEANUP_THRESHOLD=95      # Emergency cleanup if pool reaches this capacity

# Advanced settings
SEND_RESUME_ENABLED=true            # Enable resumable sends for large datasets
SEND_COMPRESSED=true                # Send compressed streams (requires matching receive)
SEND_INCREMENTAL_PREFERRED=true     # Prefer incremental sends when possible
BOOKMARK_SNAPSHOTS=true             # Create bookmarks for efficient incremental sends

# Monitoring and logging
BACKUP_METRICS_ENABLED=true         # Export backup metrics
BACKUP_LOG_DETAIL="normal"          # Logging detail level: minimal|normal|verbose
BACKUP_HISTORY_RETENTION=90         # Days to keep backup history logs

# Error handling
MAX_BACKUP_RETRIES=3                # Maximum retry attempts for failed backups
RETRY_DELAY=300                     # Delay between retries (seconds)
CONTINUE_ON_ERROR=false             # Continue with other datasets if one fails

# Network settings (for remote backups)
SSH_TIMEOUT=30                      # SSH connection timeout (seconds)
SSH_KEEPALIVE=60                    # SSH keepalive interval (seconds)
REMOTE_ZPOOL_TIMEOUT=300            # Timeout for remote zpool operations (seconds)

# Dataset-specific settings
# Format: DATASET_SETTINGS_<dataset_name_with_underscores>="setting=value,setting=value"
# Example: DATASET_SETTINGS_tank_vm_data="retention_daily=60,verify=true"

# Exclude patterns (datasets matching these patterns will be skipped)
EXCLUDE_PATTERNS="tmp,cache,swap"   # Comma-separated patterns

# Include only patterns (if set, only datasets matching these patterns will be backed up)
INCLUDE_PATTERNS=""                 # Comma-separated patterns

# Pre/post backup hooks
PRE_BACKUP_SCRIPT=""               # Script to run before backup starts
POST_BACKUP_SCRIPT=""              # Script to run after backup completes
PRE_DATASET_SCRIPT=""              # Script to run before each dataset backup
POST_DATASET_SCRIPT=""             # Script to run after each dataset backup