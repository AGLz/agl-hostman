openapi: 3.0.3
info:
  title: AGL Hostman API
  description: |
    Comprehensive API for AGL-29 Hostman - an advanced infrastructure management platform.

    ## Features
    - Infrastructure Management (Physical Locations, Servers)
    - N8N Workflow Automation
    - AI Integration (Multiple AI Services)
    - Scrum Board Management
    - Container Lifecycle Management
    - Harbor Container Registry Integration
    - Dokploy Application Deployment
    - Alert Management System
    - Network Topology Visualization
    - Deployment Pipeline Management
    - Build Metrics Tracking
    - Smart Notifications System
    - Role-Based Access Control (RBAC)

  version: v3.0.0
  contact:
    name: AGL Hostman Team
    email: support@agl.hostman
    url: https://github.com/agl/hostman
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.agl.hostman/api
    description: Production server
  - url: https://staging-api.agl.hostman/api
    description: Staging server
  - url: http://localhost:8000/api
    description: Local development server

security:
  - BearerAuth: []

paths:
  # =================================
  # Authentication Endpoints
  # =================================
  /user:
    get:
      tags:
        - Authentication
      summary: Get current authenticated user
      description: Returns the current authenticated user's profile and permissions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "John Doe"
                  email:
                    type: string
                    format: email
                    example: "john@example.com"
                  workos_id:
                    type: string
                    example: "usr_123456789"
                  avatar_url:
                    type: string
                    format: uri
                    example: "https://example.com/avatar.jpg"
                  is_active:
                    type: boolean
                    example: true
                  last_login_at:
                    type: string
                    format: date-time
                    example: "2024-02-11T10:30:00Z"
                  roles:
                    type: array
                    items:
                      type: string
                    example: ["admin", "developer"]
                  permissions:
                    type: array
                    items:
                      type: string
                    example: ["users.view", "infrastructure.manage"]

  /auth/workos/redirect:
    get:
      tags:
        - Authentication
      summary: WorkOS authentication redirect
      description: Redirects to WorkOS for OAuth authentication
      responses:
        '302':
          description: Redirect to WorkOS
          headers:
            Location:
              schema:
                type: string
                format: uri
              example: "https://api.workos.com/sso/redirect?..."

  /auth/workos/callback:
    get:
      tags:
        - Authentication
      summary: WorkOS authentication callback
      description: Handles the callback from WorkOS after authentication
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from WorkOS
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      access_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time

  /auth/workos/logout:
    post:
      tags:
        - Authentication
      summary: WorkOS logout
      description: Logs out the current user from WorkOS
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  # =================================
  # N8N Workflow Management
  # =================================
  /n8n/webhook/{workflow}:
    post:
      tags:
        - N8N
      summary: Handle N8N webhook
      description: Webhook endpoint for N8N workflows (public, no authentication required)
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
          description: Workflow slug identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workflow_id:
                  type: string
                node:
                  type: object
                properties:
                  type: object
                authentication:
                  type: object
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Webhook processed successfully
        '400':
          description: Invalid webhook payload

  /n8n/workflows:
    get:
      tags:
        - N8N
      summary: List N8N workflows
      description: Retrieves a list of all N8N workflows
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    n8n_id:
                      type: string
                    name:
                      type: string
                    slug:
                      type: string
                    description:
                      type: string
                    active:
                      type: boolean
                    category:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
                    execution_count:
                      type: integer
                    last_executed_at:
                      type: string
                      format: date-time
                    created_at:
                      type: string
                      format: date-time

    post:
      tags:
        - N8N
      summary: Create N8N workflow
      description: Creates a new N8N workflow
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                settings:
                  type: object
                metadata:
                  type: object
      responses:
        '201':
          description: Workflow created successfully
        '400':
          description: Invalid input data

  /n8n/workflows/{workflow}:
    get:
      tags:
        - N8N
      summary: Get N8N workflow details
      description: Retrieves details of a specific N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
          description: Workflow slug or ID
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  n8n_id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  active:
                    type: boolean
                  category:
                    type: string
                  settings:
                    type: object
                  metadata:
                    type: object
                  statistics:
                    type: object
                    properties:
                      total_executions:
                        type: integer
                      successful_executions:
                        type: integer
                      failed_executions:
                        type: integer
                      last_execution:
                        type: string
                        format: date-time

    put:
      tags:
        - N8N
      summary: Update N8N workflow
      description: Updates an existing N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                settings:
                  type: object
      responses:
        '200':
          description: Workflow updated successfully

    delete:
      tags:
        - N8N
      summary: Delete N8N workflow
      description: Deletes a N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Workflow deleted successfully

    post:
      tags:
        - N8N
      summary: Activate N8N workflow
      description: Activates a deactivated N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow activated

  /n8n/workflows/{workflow}/deactivate:
    post:
      tags:
        - N8N
      summary: Deactivate N8N workflow
      description: Deactivates an active N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow deactivated

  /n8n/workflows/{workflow}/executions:
    get:
      tags:
        - N8N
      summary: Get N8N workflow executions
      description: Retrieves execution history for a specific workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, running]
      responses:
        '200':
          description: Execution history
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    workflow_id:
                      type: integer
                    status:
                      type: string
                      enum: [success, failed, running, pending]
                    started_at:
                      type: string
                      format: date-time
                    completed_at:
                      type: string
                      format: date-time
                    duration_ms:
                      type: integer
                    error_message:
                      type: string

  /n8n/trigger/{workflow}:
    post:
      tags:
        - N8N
      summary: Trigger N8N workflow
      description: Manually triggers a specific N8N workflow
      security:
        - BearerAuth: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                headers:
                  type: object
                retries:
                  type: integer
                  default: 3
      responses:
        '200':
          description: Workflow triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  execution_id:
                    type: string

  /n8n/test-connection:
    get:
      tags:
        - N8N
      summary: Test N8N connection
      description: Tests the connection to N8N API
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                  version:
                    type: string
                  latency:
                    type: number

  /n8n/sync:
    post:
      tags:
        - N8N
      summary: Sync N8N workflows
      description: Synchronizes workflows from N8N to the local database
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sync completed

  # =================================
  # Infrastructure Management
  # =================================
  /infrastructure/locations:
    get:
      tags:
        - Infrastructure
      summary: Get physical locations
      description: Retrieves all physical locations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    code:
                      type: string
                      example: "HQ"
                    name:
                      type: string
                      example: "Headquarters"
                    type:
                      type: string
                      example: "headquarters"
                    address:
                      type: string
                    city:
                      type: string
                    country:
                      type: string
                    latitude:
                      type: number
                    longitude:
                      type: number
                    is_active:
                      type: boolean
                    metadata:
                      type: object

  /infrastructure/servers/{code}:
    get:
      tags:
        - Infrastructure
      summary: Get server details
      description: Retrieves details of a specific server/physical location
      security:
        - BearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  code:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                  status:
                    type: string
                  ip_address:
                    type: string
                  capacity:
                    type: object
                  metrics:
                    type: object
        '404':
          description: Server not found

  /infrastructure/status:
    get:
      tags:
        - Infrastructure
      summary: Get infrastructure status
      description: Retrieves overall infrastructure status
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Infrastructure status
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_servers:
                    type: integer
                  online_servers:
                    type: integer
                  total_capacity:
                    type: object
                  current_utilization:
                    type: object
                  alert_count:
                    type: integer

  /infrastructure/analytics:
    get:
      tags:
        - Infrastructure
      summary: Get infrastructure analytics
      description: Retrieves analytics data for infrastructure
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  trends:
                    type: array
                    items:
                      type: object
                  predictions:
                    type: array
                    items:
                      type: object
                  recommendations:
                    type: array
                    items:
                      type: object

  # =================================
  # AI Integration
  # =================================
  /ai/query:
    post:
      tags:
        - AI
      summary: AI query
      description: Send a query to the AI system
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  example: "What is the current server status?"
                context:
                  type: object
                max_tokens:
                  type: integer
                  default: 1000
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: string
                  confidence:
                    type: number
                    format: float
                  tokens_used:
                    type: integer

  /ai/multi-agent:
    post:
      tags:
        - AI
      summary: Multi-agent AI query
      description: Use multiple AI agents to process complex queries
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                agents:
                  type: array
                  items:
                    type: string
                collaboration_mode:
                  type: string
                  enum: [sequential, parallel, hybrid]
      responses:
        '200':
          description: Multi-agent response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                  consensus:
                    type: string
                  confidence:
                    type: number

  /ai/models:
    get:
      tags:
        - AI
      summary: Get available AI models
      description: Lists all available AI models
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of AI models
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    provider:
                      type: string
                      enum: [openai, claude, ollama]
                    version:
                      type: string
                    capabilities:
                      type: array
                      items:
                        type: string
                    cost_per_1k_tokens:
                      type: number
                    max_tokens:
                      type: integer

  # =================================
  # Scrum Board Management
  # =================================
  /scrum/sprints:
    get:
      tags:
        - Scrum
      summary: List sprints
      description: Retrieves all sprints
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of sprints
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    description:
                      type: string
                    start_date:
                      type: string
                      format: date
                    end_date:
                      type: string
                      format: date
                    status:
                      type: string
                      enum: [planning, active, completed, cancelled]
                    velocity:
                      type: number
                    capacity:
                      type: integer

    post:
      tags:
        - Scrum
      summary: Create sprint
      description: Creates a new sprint
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - start_date
                - end_date
              properties:
                name:
                  type: string
                description:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                capacity:
                  type: integer
      responses:
        '201':
          description: Sprint created

  /scrum/sprints/{id}/start:
    post:
      tags:
        - Scrum
      summary: Start sprint
      description: Starts a sprint
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sprint started

  /scrum/sprints/{id}/complete:
    post:
      tags:
        - Scrum
      summary: Complete sprint
      description: Marks a sprint as completed
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sprint completed

  /scrum/tasks:
    get:
      tags:
        - Scrum
      summary: List tasks
      description: Retrieves all tasks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    description:
                      type: string
                    story_points:
                      type: integer
                    status:
                      type: string
                      enum: [todo, in_progress, review, done]
                    priority:
                      type: string
                      enum: [low, medium, high, critical]
                    assignee_id:
                      type: integer
                    story_id:
                      type: integer
                    sprint_id:
                      type: integer

    post:
      tags:
        - Scrum
      summary: Create task
      description: Creates a new task
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                description:
                  type: string
                story_points:
                  type: integer
                status:
                  type: string
                  enum: [todo, in_progress, review, done]
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                assignee_id:
                  type: integer
                story_id:
                  type: integer
      responses:
        '201':
          description: Task created

  /scrum/tasks/{id}:
    put:
      tags:
        - Scrum
      summary: Update task
      description: Updates an existing task
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                story_points:
                  type: integer
                status:
                  type: string
                  enum: [todo, in_progress, review, done]
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                assignee_id:
                  type: integer
      responses:
        '200':
          description: Task updated

    delete:
      tags:
        - Scrum
      summary: Delete task
      description: Deletes a task
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Task deleted

  # =================================
  # Container Management
  # =================================
  /containers/create:
    post:
      tags:
        - Containers
      summary: Create container
      description: Creates a new container
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - template
              properties:
                name:
                  type: string
                template:
                  type: string
                config:
                  type: object
                resources:
                  type: object
      responses:
        '201':
          description: Container created
          content:
            application/json:
              schema:
                type: object
                properties:
                  vmid:
                    type: integer
                  status:
                    type: string
                  created_at:
                    type: string
                    format: date-time

  /containers/{vmid}/clone:
    post:
      tags:
        - Containers
      summary: Clone container
      description: Clones an existing container
      security:
        - BearerAuth: []
      parameters:
        - name: vmid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                full_clone:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Container cloning initiated

  /containers/{vmid}/backup:
    post:
      tags:
        - Containers
      summary: Backup container
      description: Creates a backup of a container
      security:
        - BearerAuth: []
      parameters:
        - name: vmid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                retention_days:
                  type: integer
      responses:
        '200':
          description: Backup initiated

  # =================================
  # Backup Management
  # =================================
  /backup/list:
    get:
      tags:
        - Backup
      summary: List backups
      description: Retrieves all backup records
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of backups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    size:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    expires_at:
                      type: string
                      format: date-time
                    type:
                      type: string
                      enum: [container, database, system]

  /backup/create:
    post:
      tags:
        - Backup
      summary: Create backup
      description: Creates a new backup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [container, database, system]
                description:
                  type: string
                retention_days:
                  type: integer
                  default: 30
      responses:
        '201':
          description: Backup created

  # =================================
  # Harbor Integration
  # =================================
  /harbor/projects:
    get:
      tags:
        - Harbor
      summary: List Harbor projects
      description: Retrieves all Harbor projects
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
