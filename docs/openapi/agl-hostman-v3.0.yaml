components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained via WorkOS authentication

  schemas:
    # Error Response Schema
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Resource not found"
        message:
          type: string
          example: "The requested resource could not be found"
        code:
          type: string
          example: "NOT_FOUND"
        details:
          type: object
          description: Additional error details

    # Success Response Schema
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Response data
        message:
          type: string
          description: Success message

    # Pagination Schema
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer
        next_page_url:
          type: string
          format: uri
        prev_page_url:
          type: string
          format: uri

    # User Schema
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        workos_id:
          type: string
        avatar_url:
          type: string
          format: uri
        is_active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    # N8N Workflow Schema
    N8NWorkflow:
      type: object
      properties:
        id:
          type: integer
        n8n_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        active:
          type: boolean
        category:
          type: string
        settings:
          type: object
        metadata:
          type: object
        last_synced_at:
          type: string
          format: date-time
        last_executed_at:
          type: string
          format: date-time
        execution_count:
          type: integer
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Physical Location Schema
    PhysicalLocation:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        type:
          type: string
        ip_range:
          type: string
        metadata:
          type: object
        is_active:
          type: boolean

    # Alert Schema
    Alert:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [active, acknowledged, resolved]
        created_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    # Deployment Schema
    Deployment:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed, cancelled]
        environment:
          type: string
          enum: [qa, uat, production]
        branch:
          type: string
        commit:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration:
          type: integer
        logs:
          type: array
          items:
            type: object

    # Harbor Project Schema
    HarborProject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        public:
          type: boolean
        creation_time:
          type: string
          format: date-time

    # Dokploy Application Schema
    DokployApplication:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [building, deployed, stopped, error]
        url:
          type: string
        port:
          type: integer
        build_command:
          type: string
        start_command:
          type: string

    # Task Schema
    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        story_points:
          type: integer
        status:
          type: string
          enum: [todo, in_progress, review, done]
        priority:
          type: string
          enum: [low, medium, high, critical]
        assignee_id:
          type: integer
        story_id:
          type: integer
        sprint_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Sprint Schema
    Sprint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [planning, active, completed, cancelled]
        velocity:
          type: number
        capacity:
          type: integer

