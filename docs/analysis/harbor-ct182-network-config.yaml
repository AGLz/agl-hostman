# Harbor CT182 Network Configuration Specifications
# Generated by Analyst Agent - Hive Mind Swarm
# Date: 2025-10-22
# Status: Ready for Deployment

---
network_configuration:
  container_info:
    vmid: 182
    hostname: harbor
    description: "Harbor Container Registry - Enterprise Docker Registry with vulnerability scanning"

  network_interface:
    interface_name: eth0
    interface_type: veth
    bridge: vmbr0
    firewall_enabled: true
    mtu: 1500

  ip_configuration:
    ip_address: 192.168.0.182
    subnet_mask: 255.255.255.0
    cidr_notation: /24
    network: 192.168.0.0/24
    broadcast: 192.168.0.255
    gateway: 192.168.0.1
    dns_servers:
      primary: 192.168.0.102  # pihole
      secondary: 8.8.8.8      # Google DNS (fallback)
    search_domain: localdomain

  # Proxmox network configuration syntax
  proxmox_network_config: "name=eth0,bridge=vmbr0,gw=192.168.0.1,ip=192.168.0.182/24,type=veth"

dns_records:
  # Add to Pi-hole DNS (192.168.0.102)
  a_records:
    - hostname: harbor.localdomain
      ip: 192.168.0.182
      ttl: 300
    - hostname: harbor
      ip: 192.168.0.182
      ttl: 300

  cname_records:
    - hostname: registry.localdomain
      target: harbor.localdomain
      ttl: 300
    - hostname: docker-registry.localdomain
      target: harbor.localdomain
      ttl: 300

firewall_rules:
  input_rules:
    - name: "SSH Management"
      port: 22
      protocol: tcp
      source: any
      action: accept
      priority: 100

    - name: "HTTP to HTTPS Redirect"
      port: 80
      protocol: tcp
      source: any
      action: accept
      priority: 200

    - name: "HTTPS - Harbor Web UI and API"
      port: 443
      protocol: tcp
      source: any
      action: accept
      priority: 300

    - name: "Docker Registry Alternative Port"
      port: 5000
      protocol: tcp
      source: 192.168.0.0/24
      action: accept
      priority: 400
      optional: true

  output_rules:
    - name: "Allow All Outbound"
      action: accept
      priority: 100

network_topology:
  description: "Harbor CT182 placement in vmbr0 bridge network"

  bridge_network:
    name: vmbr0
    subnet: 192.168.0.0/24
    gateway: 192.168.0.1
    vlan: none
    physical_interface: enp4s0f0

  nearby_containers:
    development_zone:
      - vmid: 178
        name: aglfs1
        ip: 192.168.0.178
        purpose: File Server
        integration: "Harbor backups via NFS"

      - vmid: 179
        name: agldv03
        ip: 192.168.0.179
        purpose: Development Environment
        integration: "Push/pull images during development"

      - vmid: 180
        name: dokploy
        ip: 192.168.0.180
        purpose: Deployment Platform
        integration: "Use Harbor as private registry"

      - vmid: 181
        name: agldv4
        ip: 192.168.0.181
        purpose: Development Environment
        integration: "Push/pull images during development"

      - vmid: 182
        name: harbor
        ip: 192.168.0.182
        purpose: Container Registry
        integration: "Primary registry for all services"

    management_services:
      - vmid: 102
        name: pihole
        ip: 192.168.0.102
        purpose: DNS Server
        integration: "DNS resolution for harbor.localdomain"

      - vmid: 103
        name: portainer
        ip: 192.168.0.103
        purpose: Container Management
        integration: "Manage Harbor container, add as external registry"

integration_network_flows:
  # Data flow diagrams for network integration

  docker_registry_flow:
    description: "Container image push/pull flow"
    flow:
      - source: "Dev Environments (CT179, CT181)"
        destination: "Harbor (CT182:443)"
        protocol: "HTTPS/Docker Registry API"
        bandwidth: "Variable (image dependent)"

      - source: "Dokploy (CT180)"
        destination: "Harbor (CT182:443)"
        protocol: "HTTPS/Docker Registry API"
        bandwidth: "High during deployments"

      - source: "Harbor (CT182)"
        destination: "Internet"
        protocol: "HTTPS"
        purpose: "Trivy vulnerability database updates"

  backup_flow:
    description: "Harbor backup data flow"
    flow:
      - source: "Harbor (CT182)"
        destination: "aglfs1 (CT178)"
        protocol: "NFS/CIFS"
        purpose: "Backup storage"

      - source: "Harbor (CT182)"
        destination: "Proxmox Backup Server"
        protocol: "PBS API"
        purpose: "Automated container backups"

  management_flow:
    description: "Management and monitoring flow"
    flow:
      - source: "Portainer (CT103)"
        destination: "Harbor (CT182:443)"
        protocol: "HTTPS/Docker API"
        purpose: "Container management"

      - source: "Monitoring (Prometheus)"
        destination: "Harbor (CT182:443/metrics)"
        protocol: "HTTPS"
        purpose: "Metrics collection"

network_performance:
  expected_performance:
    latency:
      same_host_containers: "<1ms"
      same_bridge: "<2ms"
      gateway: "<5ms"
      internet: "Variable (ISP dependent)"

    bandwidth:
      bridge_capacity: "1 Gbps"
      typical_usage: "10-100 Mbps"
      peak_usage: "500 Mbps (multiple concurrent image pulls)"

    connections:
      max_concurrent_connections: 1000
      typical_concurrent: 10-50
      connection_timeout: 30s

network_security:
  ssl_tls:
    enabled: true
    certificate_type: "Self-signed (initial), Let's Encrypt (production)"
    certificate_location: "/data/secrets/cert/server.crt"
    private_key_location: "/data/secrets/cert/server.key"
    tls_version_min: "1.2"
    cipher_suites: "Modern Mozilla configuration"

  access_control:
    authentication: "Harbor RBAC (Local, LDAP, OIDC)"
    authorization: "Project-based permissions"
    network_acl: "Allow from 192.168.0.0/24"
    rate_limiting: "100 requests/minute per IP"

  security_features:
    vulnerability_scanning: "Trivy (enabled)"
    image_signing: "Docker Content Trust (optional)"
    audit_logging: "Enabled for all operations"
    webhook_notifications: "Security events, scan results"

troubleshooting:
  connectivity_tests:
    - test: "Ping Harbor"
      command: "ping -c 4 192.168.0.182"
      expected: "0% packet loss"

    - test: "Test HTTPS"
      command: "curl -k https://192.168.0.182"
      expected: "HTTP 200 or redirect"

    - test: "Test API"
      command: "curl -k https://192.168.0.182/api/v2.0/health"
      expected: '{\"status\":\"healthy\"}'

    - test: "DNS Resolution"
      command: "dig harbor.localdomain @192.168.0.102"
      expected: "A record pointing to 192.168.0.182"

  common_issues:
    - issue: "Cannot connect to Harbor"
      causes:
        - "Firewall blocking ports"
        - "Harbor services not started"
        - "Network misconfiguration"
      solutions:
        - "Check firewall rules: iptables -L -n | grep 443"
        - "Check services: docker ps | grep harbor"
        - "Verify IP: ip addr show eth0"

    - issue: "DNS resolution fails"
      causes:
        - "Pi-hole not configured"
        - "DNS record missing"
        - "Client DNS misconfigured"
      solutions:
        - "Add A record in pi-hole for harbor.localdomain"
        - "Test: nslookup harbor.localdomain 192.168.0.102"
        - "Check /etc/resolv.conf in client"

    - issue: "SSL certificate errors"
      causes:
        - "Self-signed certificate not trusted"
        - "Certificate CN mismatch"
        - "Certificate expired"
      solutions:
        - "Add certificate to Docker daemon's trusted CAs"
        - "Use harbor.localdomain instead of IP"
        - "Regenerate certificate or use Let's Encrypt"

monitoring:
  network_metrics:
    - metric: "Latency to Harbor"
      target: "<5ms"
      alert_threshold: ">50ms"
      collection_interval: "1m"

    - metric: "Network throughput"
      target: "Variable"
      alert_threshold: ">500 Mbps sustained"
      collection_interval: "1m"

    - metric: "Connection count"
      target: "<100 concurrent"
      alert_threshold: ">500 concurrent"
      collection_interval: "30s"

    - metric: "DNS query time"
      target: "<50ms"
      alert_threshold: ">500ms"
      collection_interval: "5m"

  health_checks:
    - endpoint: "https://192.168.0.182/api/v2.0/health"
      interval: "30s"
      timeout: "5s"
      expected_status: 200
      expected_body: '{"status":"healthy"}'

    - endpoint: "https://192.168.0.182"
      interval: "1m"
      timeout: "10s"
      expected_status: 200
      expected_body: "Harbor"

deployment_validation:
  pre_deployment:
    - check: "IP availability"
      command: "ping -c 3 192.168.0.182"
      expected: "100% packet loss (not in use)"
      status: "verified"

    - check: "Network bridge status"
      command: "brctl show vmbr0"
      expected: "vmbr0 bridge exists and active"
      status: "verified"

    - check: "Gateway reachability"
      command: "ping -c 3 192.168.0.1"
      expected: "0% packet loss"
      status: "verified"

  post_deployment:
    - check: "Container IP assigned"
      command: "pct exec 182 -- ip addr show eth0"
      expected: "inet 192.168.0.182/24"

    - check: "DNS resolution"
      command: "pct exec 182 -- nslookup google.com"
      expected: "Successful DNS resolution"

    - check: "Internet connectivity"
      command: "pct exec 182 -- ping -c 3 8.8.8.8"
      expected: "0% packet loss"

    - check: "Harbor API accessible"
      command: "curl -k https://192.168.0.182/api/v2.0/health"
      expected: "HTTP 200, status healthy"

---
# END OF NETWORK CONFIGURATION SPECIFICATIONS
