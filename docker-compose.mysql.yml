# Docker Compose - MySQL 8.0 Multi-Database Setup
# AGL Hostman - Infrastructure Management Platform
#
# This file extends the base docker-compose.yml with MySQL 8.0
# Usage: docker compose -f docker-compose.yml -f docker-compose.mysql.yml up -d

services:
  # ============================================================================
  # MySQL 8.0 Database
  # ============================================================================
  mysql:
    image: mysql:8.0
    container_name: agl-hostman-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agl_hostman}
      MYSQL_USER: ${MYSQL_USER:-agl_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - agl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=1G

  # ============================================================================
  # PhpMyAdmin - MySQL Management UI
  # ============================================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: agl-hostman-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8083}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-agl_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-secret}
      UPLOAD_LIMIT: 100M
      MAX_EXECUTION_TIME: 600
    networks:
      - agl-network
    depends_on:
      mysql:
        condition: service_healthy

# ============================================================================
# Networks
# ============================================================================
networks:
  agl-network:
    name: agl-hostman-network
    external: true

# ============================================================================
# Volumes
# ============================================================================
volumes:
  mysql-data:
    name: agl-hostman-mysql-data
    driver: local
