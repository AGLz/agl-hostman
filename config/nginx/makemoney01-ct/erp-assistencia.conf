# erp-assistencia.mm01.aglz.io — makemoney01 niche demo (CT194)
server {
    listen 80;
    server_name erp-assistencia.mm01.aglz.io;

    root /mnt/overpower/apps/dev/agl/erp-assistencia/src/public;

    location /assets/ {
        try_files $uri =404;
        expires 1h;
    }

    location / {
        proxy_pass http://127.0.0.1:8105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/erp-assistencia.access.log;
    error_log /var/log/nginx/erp-assistencia.error.log;
}
