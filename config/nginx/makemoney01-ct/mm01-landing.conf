# mm01.aglz.io — landing makemoney01 + SaaS staging path-based (SSL Universal)
server {
    listen 80;
    server_name mm01.aglz.io;

    root /mnt/overpower/apps/dev/agl/makemoney01/public/mm01;
    index index.html;

    # ponytail: path-based evita 4º nível (*.saas.aglz.io) sem Advanced Certificate
    location /s/assistencia/ {
        proxy_pass http://127.0.0.1:8105/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /s/assistencia;
        proxy_read_timeout 120s;
    }

    location /s/imobiliaria/ {
        proxy_pass http://127.0.0.1:8101/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /s/imobiliaria;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/mm01-landing.access.log;
    error_log /var/log/nginx/mm01-landing.error.log;
}
