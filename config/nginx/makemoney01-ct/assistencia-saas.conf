# assistencia.saas.aglz.io — ERP Assistência SaaS (Laravel CT194 ou Dokploy)
# Gerado makemoney01 S1 — proxy para php artisan serve / fpm
server {
    listen 80;
    server_name assistencia.saas.aglz.io;

    location / {
        proxy_pass http://127.0.0.1:8105/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/assistencia-saas.access.log;
    error_log /var/log/nginx/assistencia-saas.error.log;
}
