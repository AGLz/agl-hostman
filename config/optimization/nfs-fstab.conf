# Optimized NFS/SSHFS Mount Configuration
# For /etc/fstab on Proxmox hosts
#
# Performance optimizations:
# - Large read/write buffer sizes (131072 bytes = 128KB)
# - NFSv4.2 for better performance and features
# - Hard mounts with proper timeout and retry
# - Network device flag (_netdev) for proper boot ordering
# - nordirplus to reduce network traffic

# ============================================================================
# NFS Mounts (WireGuard Mesh)
# ============================================================================

# FGSRV6 Storage (197GB) - Primary cloud storage
10.6.0.5:/              /mnt/pve/fgsrv6-wg      nfs     rw,sync,hard,intr,rsize=131072,wsize=131072,timeo=600,retrans=2,noresvport,_netdev,vers=4.2,nordirplus     0 0

# FGSRV5 Storage (77GB) - Secondary cloud storage
10.6.0.11:/             /mnt/pve/fgsrv5-wg      nfs     rw,sync,hard,intr,rsize=131072,wsize=131072,timeo=600,retrans=2,noresvport,_netdev,vers=4.2,nordirplus     0 0

# CT111 Shares (66GB) - Network shares
10.6.0.20:/mnt/shares   /mnt/pve/ct111-shares   nfs     rw,sync,hard,intr,rsize=131072,wsize=131072,timeo=600,retrans=2,noresvport,_netdev,vers=4.2,nordirplus     0 0

# CT111 Sistema (818GB) - System storage
10.6.0.20:/mnt/sistema  /mnt/pve/ct111-sistema  nfs     rw,sync,hard,intr,rsize=131072,wsize=131072,timeo=600,retrans=2,noresvport,_netdev,vers=4.2,nordirplus     0 0

# ============================================================================
# SSHFS Mounts (WireGuard Mesh)
# ============================================================================

# AGLSRV6 BB Storage (954GB)
root@10.6.0.12:/mnt/pve/bb              /mnt/pve/aglsrv6-bb         fuse    allow_other,default_permissions,compression=yes,cache=yes,cache_timeout=115200,cache_X_timeout=115200,cache_stat_timeout=115200,cache_dir_timeout=115200,cache_link_timeout=115200,kernel_cache,large_read,max_read=131072,Ciphers=aes128-gcm@openssh.com,ServerAliveInterval=15,ServerAliveCountMax=3,_netdev,reconnect,x-systemd.automount     0 0

# AGLSRV6 USB4TB Storage (3.9TB)
root@10.6.0.12:/mnt/usb4tb-direct       /mnt/pve/aglsrv6-usb4tb     fuse    allow_other,default_permissions,compression=yes,cache=yes,cache_timeout=115200,cache_X_timeout=115200,cache_stat_timeout=115200,cache_dir_timeout=115200,cache_link_timeout=115200,kernel_cache,large_read,max_read=131072,Ciphers=aes128-gcm@openssh.com,ServerAliveInterval=15,ServerAliveCountMax=3,_netdev,reconnect,x-systemd.automount     0 0

# ============================================================================
# Mount Option Explanations
# ============================================================================
#
# NFS Options:
# - rw: Read-write access
# - sync: Synchronous writes (safer but slower, use async for speed)
# - hard: Hard mount (wait indefinitely for server)
# - intr: Allow interruption of NFS calls
# - rsize=131072: 128KB read buffer size
# - wsize=131072: 128KB write buffer size
# - timeo=600: 60 second timeout (600 deciseconds)
# - retrans=2: Retry twice before error
# - noresvport: Use non-reserved source port (better firewall compatibility)
# - _netdev: Mount after network is available
# - vers=4.2: Use NFSv4.2 protocol
# - nordirplus: Don't use READDIRPLUS (reduces network traffic)
#
# SSHFS Options:
# - allow_other: Allow other users to access mount
# - default_permissions: Use standard permissions
# - compression=yes: Enable SSH compression
# - cache=yes: Enable file content caching
# - cache_timeout=115200: 32 hour cache timeout
# - kernel_cache: Use kernel page cache
# - large_read: Enable large read operations
# - max_read=131072: 128KB maximum read size
# - Ciphers=aes128-gcm@openssh.com: Fast encryption cipher
# - ServerAliveInterval=15: Send keepalive every 15s
# - ServerAliveCountMax=3: Disconnect after 3 failed keepalives
# - reconnect: Automatically reconnect on connection loss
# - x-systemd.automount: Use systemd automount
#
# ============================================================================
# Performance Tips
# ============================================================================
#
# 1. For maximum speed (less safe):
#    Replace 'sync' with 'async' in NFS mounts
#
# 2. For stale mount recovery:
#    umount -f /mnt/pve/<storage> && mount -a
#
# 3. To test mount options:
#    mount -o remount,<options> /mnt/pve/<storage>
#
# 4. To verify mount options:
#    mount | grep <storage>
#
# 5. To check NFS server exports:
#    showmount -e 10.6.0.5
#
# 6. To monitor NFS performance:
#    nfsstat -c (client stats)
#    nfsiostat 1 (I/O stats)
#
# 7. For SSHFS debugging:
#    sshfs -o debug,sshfs_debug,loglevel=debug ...
