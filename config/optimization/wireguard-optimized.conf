# Optimized WireGuard Configuration Template
# For LXC containers in AGL infrastructure
#
# Performance optimizations:
# - Optimal MTU for WireGuard (1420)
# - PersistentKeepalive for NAT traversal
# - No PresharedKey for LXC (causes handshake issues)
# - DNS configuration for mesh network

[Interface]
# Private key (replace with actual key)
PrivateKey = <PRIVATE_KEY_HERE>

# IP address in mesh network
Address = 10.6.0.X/24

# DNS servers (pihole + fallbacks)
DNS = 192.168.0.102, 1.1.1.1, 8.8.8.8

# Optimal MTU for WireGuard
# 1420 = 1500 (standard) - 80 (WireGuard overhead)
MTU = 1420

# Pre/Post Up scripts (optional)
# PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
# Hub public key (FGSRV6)
PublicKey = Dj8XsoPeDlgnqA4Ox++yDy+t4xGxYtEevxQh513fSA8=

# IMPORTANT: Do NOT use PresharedKey in LXC containers
# PresharedKey causes handshake failures in unprivileged containers
# PresharedKey = <DO_NOT_USE_IN_LXC>

# Allow all mesh network traffic
AllowedIPs = 10.6.0.0/24

# Hub endpoint
Endpoint = 186.202.57.120:51823

# Keepalive for NAT traversal (25 seconds optimal)
PersistentKeepalive = 25

# Additional peer configurations can be added below
# Example for peer-to-peer mesh connectivity:
#
# [Peer]
# PublicKey = <PEER_PUBLIC_KEY>
# AllowedIPs = 10.6.0.Y/32
# Endpoint = <PEER_IP>:51XXX
# PersistentKeepalive = 25

# Performance tuning notes:
# - Use wg-quick for automatic routing and DNS
# - Monitor with: wg show wg0
# - Check handshakes: wg show wg0 latest-handshakes
# - Test connectivity: ping 10.6.0.5 (hub)
# - Measure latency: ping -c 10 10.6.0.5
# - View transfer stats: wg show wg0 transfer
