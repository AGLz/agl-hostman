# ============================================
# DEPRECATED — SYSTEMD DROPOIN (2026-04-13)
# ============================================
# OpenClaw foi migrado para Docker. Este arquivo é mantido apenas como referência.
# O serviço systemd está DESATIVADO.
# Para gestão do OpenClaw, use: docker compose (openclaw-repo)
# ============================================
#
# Legacy config — copiar para: ~/.config/systemd/user/openclaw-gateway.service.d/env.conf
# Reason: o ambiente global do user systemd (`systemctl --user show-environment`)
# pode conter LITELLM_* e ANTHROPIC_* do LiteLLM; o SDK Anthropic (usado também pelo
# Z.AI) segue ANTHROPIC_BASE_URL → pedidos vão para :4000 com chave errada (401).

[Service]
UnsetEnvironment=ANTHROPIC_BASE_URL ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN LITELLM_GATEWAY_URL LITELLM_MASTER_KEY LITELLM_API_KEY LITELLM_VIRTUAL_KEY
EnvironmentFile=%h/.config/environment.d/openclaw.conf
