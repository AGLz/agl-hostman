# LiteLLM Configuration for CT200 Ollama Stack
# GPU: GeForce GTX 1650 — 4096 MiB (4GB VRAM).
# SOMENTE modelos com reasoning (thinking mode) configurados aqui.

# ============================================================================
# Model Definitions — Reasoning models only
# ============================================================================
model_list:

  # --- Qwen3 (Alibaba) — thinking mode nativo (--think) ---
  # Ref: https://ollama.com/library/qwen3
  # 0.6B: ~523MB | 1.7B: ~1.4GB — ambos cabem em 4GB VRAM

  - model_name: ollama-qwen3-0.6b
    litellm_params:
      model: ollama/qwen3:0.6b
      api_base: http://host.docker.internal:11434
      stream: true
      max_tokens: 4096
    model_info:
      mode: chat
      supports_function_calling: false
      supports_vision: false
      note: "Reasoning — 0.6B, ~523MB, mínimo latência"

  - model_name: ollama-qwen3-1.7b
    litellm_params:
      model: ollama/qwen3:1.7b
      api_base: http://host.docker.internal:11434
      stream: true
      max_tokens: 8192
    model_info:
      mode: chat
      supports_function_calling: false
      supports_vision: false
      note: "Reasoning — 1.7B, ~1.4GB, melhor equilíbrio tamanho/capacidade"

  # --- DeepSeek-R1-Distill (reasoning puro) ---
  # Ref: https://ollama.com/library/deepseek-r1
  # 1.5B: ~1.1GB — cabe em 4GB VRAM

  - model_name: ollama-deepseek-r1-1.5b
    litellm_params:
      model: ollama/deepseek-r1:1.5b
      api_base: http://host.docker.internal:11434
      stream: true
      max_tokens: 8192
    model_info:
      mode: chat
      supports_function_calling: false
      supports_vision: false
      note: "Reasoning — DeepSeek R1 1.5B, ~1.1GB, forte em matemática/lógica"

# ============================================================================
# Router Settings
# ============================================================================
router_settings:
  # Load balancing strategy
  routing_strategy: simple-shuffle

  # Retry logic
  num_retries: 3
  timeout: 600

  # Fallback models (todos reasoning, do maior para o menor)
  fallbacks:
    - ollama-qwen3-1.7b: [ollama-deepseek-r1-1.5b, ollama-qwen3-0.6b]
    - ollama-deepseek-r1-1.5b: [ollama-qwen3-1.7b, ollama-qwen3-0.6b]
    - ollama-qwen3-0.6b: [ollama-qwen3-1.7b, ollama-deepseek-r1-1.5b]

  # Allowed fails before circuit breaker
  allowed_fails: 3
  cooldown_time: 60

# ============================================================================
# General Settings
# ============================================================================
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: ${DATABASE_URL}

  # Default model — melhor reasoning em 4GB VRAM
  completion_model: ollama-qwen3-1.7b

  max_parallel_requests: 100
  global_max_parallel_requests: 1000
  rpm_limit: 1000

  disable_spend_logs: false
  disable_master_key_return: false
  disable_reset_budget: false
  disable_adding_users: false

# ============================================================================
# LiteLLM Settings
# ============================================================================
litellm_settings:
  set_verbose: true
  json_logs: true
  drop_params: true
  add_user_information_to_metadata: true

  success_callback: []
  failure_callback: []

  cache: false

  num_retries: 3
  request_timeout: 600

  # Context window fallbacks
  context_window_fallbacks:
    - model: ollama-qwen3-1.7b
      fallback_model: ollama-qwen3-0.6b

# ============================================================================
# Usage Examples
# ============================================================================
#
# 1. OpenAI Compatible API:
# curl -X POST http://10.6.0.17:4000/chat/completions \
#   -H "Authorization: Bearer ${LITELLM_MASTER_KEY}" \
#   -H "Content-Type: application/json" \
#   -d '{
#     "model": "ollama-qwen3-1.7b",
#     "messages": [{"role": "user", "content": "Explain Docker in one sentence."}],
#     "stream": false
#   }'
#
# 2. Via Ollama CLI (com thinking mode):
# ollama run qwen3:1.7b --think
# ollama run deepseek-r1:1.5b
