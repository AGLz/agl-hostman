# Modelos auth2api (OAuth Claude Pro / ChatGPT Plus) — inject no LiteLLM CT186.
# Aplicar: bash scripts/auth2api/enable-litellm-ct186.sh
#
# Env LiteLLM (.env):
#   AUTH2API_BASE_URL=http://agl-auth2api:8317/v1
#   AUTH2API_API_KEY=<chave /opt/agl-auth2api/.env>

# >>> AUTH2API_LAB_BEGIN
- model_name: auth2api-claude-fable-5
  litellm_params:
    model: openai/claude-fable-5
    api_base: os.environ/AUTH2API_BASE_URL
    api_key: os.environ/AUTH2API_API_KEY
    rpm: 8
    tpm: 40000
  model_info:
    mode: chat
    description: "auth2api — Claude Fable 5 (OAuth Anthropic); primary Jarvis"
