# Snippet LAB — modelos auth2api (Claude OAuth + Codex/ChatGPT Plus).
# Aplicar: bash scripts/auth2api/enable-litellm-lab.sh
# Remover: bash scripts/auth2api/disable-litellm-lab.sh
#
# Indentação alinhada a /opt/litellm/config.yaml (itens model_list com "-" na col 0).
# Cursor omitido (chat bloqueado por version gate).
#
# Env no LiteLLM (.env):
#   AUTH2API_BASE_URL=http://agl-auth2api:8317/v1
#   AUTH2API_API_KEY=<chave docker/auth2api/.env>

# >>> AUTH2API_LAB_BEGIN
- model_name: auth2api-claude-sonnet
  litellm_params:
    model: openai/claude-sonnet-5
    api_base: os.environ/AUTH2API_BASE_URL
    api_key: os.environ/AUTH2API_API_KEY
    rpm: 10
    tpm: 50000
  model_info:
    mode: chat
    description: "LAB auth2api — Claude via OAuth Anthropic"
- model_name: auth2api-claude-opus
  litellm_params:
    model: openai/claude-opus-4-8
    api_base: os.environ/AUTH2API_BASE_URL
    api_key: os.environ/AUTH2API_API_KEY
    rpm: 5
    tpm: 30000
  model_info:
    mode: chat
    description: "LAB auth2api — Claude Opus via OAuth Anthropic"
- model_name: auth2api-gpt-codex
  litellm_params:
    model: openai/gpt-5.5
    api_base: os.environ/AUTH2API_BASE_URL
    api_key: os.environ/AUTH2API_API_KEY
    rpm: 10
    tpm: 50000
  model_info:
    mode: chat
    description: "LAB auth2api — GPT via ChatGPT Plus Codex OAuth"
# <<< AUTH2API_LAB_END
