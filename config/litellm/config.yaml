# Ollama: VM110 agl-ollama (AGLSRV1). LiteLLM CT186 usa Tailscale (não LAN 192.168.0.200).
# Activo: aglsrv1-ollama 100.74.118.51:11434 | VM110 GPU (offline): aglsrv1-ollama-gpu 100.116.57.111
# Ollama VM110: um único modelo local `qwen3:4b` (agl-primary + aliases ollama-qwen3-4b). Limites: scripts/aglsrv1/vm110-ollama-override.conf.
#
# Z.AI (docs.z.ai): três bases úteis — (1) OpenAI-compat aggregado `https://api.z.ai/api/openai/v1` (entradas zai/glm-* abaixo);
# (2) PaaS geral `https://api.z.ai/api/paas/v4`; (3) GLM Coding Plan `https://api.z.ai/api/coding/paas/v4` (subscrição Coding; política de uso
# limita a ferramentas oficiais). Modelo de teste explícito: `zai-coding-glm-4.7`.
# Claude Code via LiteLLM: usar `zai-glm-5` / `zai-glm-flash` (Anthropic-compat `https://api.z.ai/api/anthropic`) — o OpenAI-compat devolve 404 para GLM.
# GLM-4.7-Flash / glm-flash: usar Z.AI Anthropic-compat (`api.z.ai/api/anthropic`) — OpenAI-compat e PaaS v4 devolvem 404/rate-limit/ content vazio.
# Hermes CT188: Jarvis `gpt-5.5` → Z.AI glm-5 (OpenAI quota esgotada); agentes `glm-4.7-flash` → anthropic/glm-4.7-flash.
#
# DashScope (Alibaba Cloud): DESACTIVADO 2026-05 (fatura 5k+; ~99% era qwen3-coder-plus).
# Alias qwen-coder / qwen/qwen-coder → DeepSeek V3.2 (NÃO chamar DashScope). Outros qwen* → Z.AI/Ollama/OpenRouter.
