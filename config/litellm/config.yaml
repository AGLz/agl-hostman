# Configurações LiteLLM (fallbacks nativos)
litellm_settings:
  num_retries: 2
  request_timeout: 120
  allowed_fails: 2
  # IMPORTANTE: Encaminha headers de auth para Claude Code Max subscription
  forward_client_headers_to_llm_api: true
  # ============================================================
  # FALLBACKS ORDENADOS POR LATÊNCIA (mais rápidos primeiro)
  # ============================================================
  # Latência referência: qwen3.5-plus ~0.8s, deepseek ~1.4s, glm-flash ~1.6s, glm-5 ~2.4s
  fallbacks:
    # ============================================================
    # Primário AGL: Z.AI GLM-4.7-Flash (FREE) — mesmo stack que OpenClaw
    # ============================================================
    - agl-primary: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]

    # ============================================================
    # FALLBACKS FREE TIER (agldv03, fgsrv06, aglwk45)
    # Prioridade: ZAI GLM-4.7-Flash (glm-flash) > Qwen > OpenRouter :free
    # ============================================================

    # === Claude fallbacks (usar FREE como backup) ===
    - claude-opus: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - claude-opus-4-6: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - claude-sonnet: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - claude-sonnet-4-6: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - claude-sonnet-4-5-20250929: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - claude-haiku: [glm-flash, qwen-turbo, or-llama-free, or-gemma-3-4b-free]
    - claude-haiku-4-5-20251001: [glm-flash, qwen-turbo, or-llama-free, or-gemma-3-4b-free]

    # OpenClaw: modelos pedidos como zai/* — FREE fallbacks
    - zai/glm-4.5-flash: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - zai/glm-4.7-flash: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - zai/glm-5: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - zai/glm-4.7: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - glm-4.5-flash: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - glm-4.7-flash: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - kimi/moonshot-v1-128k: [qwen3.5-plus, glm-flash, or-nemotron-free]
    - moonshot-v1-128k: [qwen3.5-plus, glm-flash, or-nemotron-free]

    # === GLM fallbacks (FREE) ===
    - glm: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - glm-5: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - glm-flash: [qwen-coder, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - glm-air: [glm-flash, qwen-coder, or-nemotron-free]

    # === Cursor Agent — Z.AI flash → GLM-5 / DeepSeek ===
    - cursor-composer: [cursor-glm-5, cursor-deepseek, glm-flash, qwen-coder]
    - cursor-composer-2-fast: [cursor-glm-5, cursor-deepseek, glm-flash, qwen-coder]
    - cursor-claude-sonnet: [cursor-glm-5, cursor-deepseek, or-nemotron-free]
    - cursor-claude-opus: [cursor-glm-5, cursor-deepseek, or-nemotron-free]
    - cursor-glm-5: [cursor-deepseek, or-nemotron-free, or-llama-free]

    # === DeepSeek fallbacks (usar FREE) ===
    - deepseek: [qwen-coder, glm-flash, or-nemotron-free, or-llama-free]
    - r1: [deepseek, qwen-coder, glm-flash, or-nemotron-free]

    # === Kimi fallbacks (usar FREE) ===
    - kimi: [qwen3.5-plus, glm-flash, or-nemotron-free, or-llama-free]
    - kimi-128k: [qwen3.5-plus, glm-flash, or-nemotron-free]

    # === GPT fallbacks (usar FREE) ===
    - gpt: [qwen-coder, glm-flash, or-nemotron-free, or-minimax-free]
    - gpt-4o: [qwen-coder, glm-flash, or-nemotron-free, or-minimax-free]

    # === Gemini fallbacks (usar FREE) ===
    - gemini: [qwen-coder, glm-flash, or-nemotron-free, or-minimax-free]
    - gemini-lite: [glm-flash, qwen-turbo, or-llama-free, or-gemma-3-4b-free]

    # === Qwen (DashScope) - FREE fallbacks ===
    - qwen3.5: [glm-flash, qwen-coder, or-nemotron-free, or-llama-free]
    - qwen3.5-plus: [glm-flash, qwen-coder, or-nemotron-free, or-llama-free]
    - qwen3-max: [glm-flash, qwen-coder, or-nemotron-free, or-minimax-free]
    - qwen-plus: [glm-flash, qwen-coder, or-nemotron-free, or-llama-free]
    - qwen-coder: [glm-flash, qwen3.5-plus, or-nemotron-free, or-llama-free]
    - qwen-turbo: [glm-flash, qwen-coder, or-llama-free, or-gemma-3-4b-free]

    # === OpenRouter FREE fallbacks ===
    - or-nemotron-free: [or-minimax-free, or-llama-free, glm-flash, qwen-coder]
    - or-minimax-free: [or-llama-free, or-step-free, glm-flash, qwen-coder]
    - or-llama-free: [or-step-free, or-gemma-3-12b-free, glm-flash, qwen-coder]
    - or-step-free: [or-gemma-3-4b-free, glm-flash, qwen-turbo]
    - or-gemma-3-4b-free: [glm-flash, qwen-turbo, or-llama-free]
    - or-gemma-3-12b-free: [glm-flash, qwen-coder, or-llama-free]
    - or-gemma-3-27b-free: [glm-flash, qwen-coder, or-nemotron-free]
    - or-mistral-small-free: [glm-flash, qwen-coder, or-llama-free]
    - or-hermes-free: [glm-flash, qwen-coder, or-nemotron-free]
    - openrouter/openrouter/free: [zai/glm-4.7-flash, or-llama-free, or-nemotron-free, glm-flash]
    - openrouter-free: [zai/glm-4.7-flash, or-llama-free, or-nemotron-free, glm-flash]

  # Fallback por contexto excedido (modelos com mais tokens)
  context_window_fallbacks:
    - glm: [kimi, kimi-128k, qwen3.5-plus, qwen3-max]
    - glm-5: [kimi, kimi-128k, qwen3.5-plus, qwen3-max]
    - glm-flash: [kimi, deepseek, qwen3.5-plus, gemini]
