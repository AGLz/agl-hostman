    litellm_params:
      model: "anthropic/glm-4.7-flash"
      api_key: os.environ/ZAI_API_KEY
      api_base: "https://api.z.ai/api/anthropic"
      timeout: 30
    model_info:
      max_tokens: 8192
      input_cost_per_token: 0
      output_cost_per_token: 0
      context_window: 131072
      access: direct
      free_tier: true

