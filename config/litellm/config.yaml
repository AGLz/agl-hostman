# LiteLLM Proxy - Claude-Flow Multi-Model & Fallback
# Integração com agl-hostman (OpenClaw model list)
# Ref: https://github.com/ruvnet/claude-flow/wiki/litellm-integration
# Última atualização modelos: 2026-02
# Env vars: ANTHROPIC_API_KEY, ZAI_API_KEY, MOONSHOT_API_KEY, DEEPSEEK_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY

model_list:
  # === Anthropic Claude (conta PRO) ===
  - model_name: "claude-opus"
    litellm_params:
      model: "anthropic/claude-opus-4-6"
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.000025

  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.000015

  - model_name: "claude-haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.000005

  # === ZAI/GLM (primário - 200k ctx) ===
  - model_name: "glm"
    litellm_params:
      model: "zai/glm-4.7"
      api_key: os.environ/ZAI_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.0000006

  - model_name: "glm-flash"
    litellm_params:
      model: "zai/glm-4.5-flash"
      api_key: os.environ/ZAI_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0

  # === Kimi/Moonshot (K2.5: 256k, v1: 128k) ===
  - model_name: "kimi"
    litellm_params:
      model: "moonshot/kimi-k2.5"
      api_key: os.environ/MOONSHOT_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.0000008

  - model_name: "kimi-128k"
    litellm_params:
      model: "moonshot/moonshot-v1-128k"
      api_key: os.environ/MOONSHOT_API_KEY
    model_info:
      max_tokens: 8192

  # === DeepSeek (V3.2: 128k, chat + reasoner) ===
  - model_name: "deepseek"
    litellm_params:
      model: "deepseek/deepseek-chat"
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.00000027

  - model_name: "r1"
    litellm_params:
      model: "deepseek/deepseek-reasoner"
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.00000055

  # === OpenAI (GPT-5.2 / GPT-4o) ===
  - model_name: "gpt"
    litellm_params:
      model: "openai/gpt-5.2"
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.000005

  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      max_tokens: 8192

  - model_name: "gpt-mini"
    litellm_params:
      model: "openai/gpt-4o-mini"
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.00000015

  # === Google Gemini (2.5 Flash / 2.0) ===
  - model_name: "gemini"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.0000001

  - model_name: "gemini-2.0"
    litellm_params:
      model: "gemini/gemini-2.0-flash"
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      max_tokens: 8192

  # === OpenRouter (modelos mais recentes) ===
  - model_name: "glm-5"
    litellm_params:
      model: "openrouter/z-ai/glm-5"
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0.00000095

  - model_name: "deepseek-v3"
    litellm_params:
      model: "openrouter/deepseek/deepseek-v3"
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 8192

  - model_name: "glm-free"
    litellm_params:
      model: "openrouter/z-ai/glm-4.5-air:free"
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 8192
      cost_per_token: 0

  - model_name: "qwen-coder"
    litellm_params:
      model: "openrouter/qwen/qwen-3-coder"
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 65536

  - model_name: "qwen3.5-plus"
    litellm_params:
      model: "openrouter/qwen/qwen3.5-plus-02-15"
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 8192

# Configurações LiteLLM (fallbacks nativos)
litellm_settings:
  num_retries: 3
  request_timeout: 60
  allowed_fails: 3
  # Fallback por modelo (se primário falhar após num_retries)
  fallbacks:
    - claude-opus: [claude-sonnet, gpt, deepseek]
    - claude-sonnet: [claude-haiku, gpt, deepseek]
    - claude-haiku: [claude-sonnet, gpt, deepseek]
    - glm: [glm-flash, glm-5, deepseek, glm-free]
    - glm-flash: [glm, deepseek, glm-free]
    - glm-5: [glm, deepseek, glm-free]
    - kimi: [kimi-128k, gemini, deepseek]
    - kimi-128k: [kimi, gemini, deepseek]
    - deepseek: [gpt, gpt-4o, claude-sonnet, kimi]
    - r1: [deepseek, gpt, claude-sonnet]
    - gpt: [gpt-4o, claude-sonnet, deepseek, kimi]
    - gemini: [gemini-2.0, kimi, deepseek]
  # Fallback por contexto excedido
  context_window_fallbacks:
    - glm: [kimi, kimi-128k, gemini]
    - glm-flash: [kimi, gemini]
    - deepseek: [kimi, deepseek-v3]
    - claude-opus: [claude-sonnet, kimi, gemini]
    - claude-sonnet: [kimi, gemini]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null  # opcional: postgresql:// para prod
  cache: false       # opcional: true com Redis para prod
