# REMOVIDO: subscriptao direta Z.AI — todos os modelos Z.AI removidos
# MANIDO: openrouter/z-ai/glm-4.5-air:free (OpenRouter free tier, nao Z.AI direto)
#
# CONFIGURAO FREE TIER (fgsrv06, remote)
# - qwen3.5-flash (DashScope Singapore) — NEW DEFAULT (MoE 35B-A3B, 1M ctx)
# - qwen-flash — ultra-cheap general purpose
# - qwen-coder, qwq-plus (DashScope Singapore)
# - OpenRouter :free: - Modelos gratuitos
