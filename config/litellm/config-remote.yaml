# Configuraoes LiteLLM (fallbacks nativos)
litellm_settings:
  num_retries: 2
  request_timeout: 120
  allowed_fails: 2
  # IMPORTANTE: Encaminha headers de auth para Claude Code Max subscription
  forward_client_headers_to_llm_api: true
  # ============================================================
  # FALLBACKS ORDENADOS POR LATENCIA (mais rapidos primeiro)
  # ============================================================
  # Latencia referencia: qwen3.5-flash ~0.6s, qwen-flash ~0.5s, qwen-coder ~0.9s, deepseek ~1.4s
  fallbacks:
    - agl-primary: [qwen3.5-flash, qwen-flash, ollama-qwen3-4b, ollama-nemotron-3-nano-4b, ollama-qwen3-1.7b, ollama-qwen3-0.6b, deepseek]
    - openai/ollama-nemotron-3-nano-4b: [qwen3.5-flash, qwen-flash, ollama-qwen3-4b, ollama-qwen3-1.7b, ollama-qwen3-0.6b, deepseek]
    - ollama-nemotron-3-nano-4b: [qwen3.5-flash, qwen-flash, ollama-qwen3-4b, ollama-qwen3-1.7b, deepseek]

    # === Claude fallbacks (qwen3.5-flash first, qwen-coder for code) ===
    - claude-opus: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-opus-4-6: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-sonnet: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-sonnet-4-6: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-sonnet-4-5-20250929: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-haiku: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - claude-haiku-4-5-20251001: [qwen3.5-flash, qwen-coder, deepseek, gemini]

    # OpenClaw: modelos kimi/moonshot — qwen models first
    - kimi/moonshot-v1-128k: [qwen3.5-flash, qwen-coder, deepseek, kimi]
    - moonshot-v1-128k: [qwen3.5-flash, qwen-coder, deepseek, kimi]

    # === DeepSeek fallbacks (qwen-coder for code first) ===
    - deepseek: [qwen-coder, qwen3.5-flash, kimi, gemini]
    - r1: [qwq-plus, qwen-coder, deepseek, qwen3.5-flash, kimi]

    # === Kimi fallbacks (qwen3.5-flash default) ===
    - kimi: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - kimi-128k: [qwen3.5-flash, qwen-coder, deepseek, kimi]

    # === GPT fallbacks (qwen3.5-flash default) ===
    - gpt: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - gpt-4o: [qwen3.5-flash, qwen-coder, deepseek, gemini]

    # === Gemini fallbacks (qwen3.5-flash default) ===
    - gemini: [qwen3.5-flash, qwen-coder, deepseek, kimi]

    # === Qwen (DashScope) - qwen3.5-flash/qwen-coder cross-fallbacks ===
    - qwen3.5: [qwen3.5-flash, qwen-coder, deepseek, gemini, or-qwen3-coder-free]
    - qwen3.5-plus: [qwen-coder, qwen3.5-flash, deepseek, gemini, or-qwen3-coder-free]
    - qwen3.5-flash: [qwen-flash, qwen-coder, deepseek, gemini, or-qwen3-coder-free]
    - qwen3-max: [qwen3.5-flash, qwen-coder, deepseek, gemini, or-qwen3-coder-free]
    - qwen-plus: [qwen3.5-flash, qwen-coder, deepseek, gemini, or-qwen3-coder-free]
    - qwen-coder: [qwen3.5-flash, qwen3.5-plus, deepseek, gemini, or-qwen3-coder-free]
    - qwen-flash: [qwen3.5-flash, qwen-coder, deepseek, gemini]
    - qwen3-coder-flash: [qwen-coder, qwen3.5-flash, deepseek, gemini]
    - qwq-plus: [qwen3.5-flash, qwen-coder, deepseek, gemini]

    - openrouter/openrouter/free: [qwen3.5-flash, qwen-coder, or-glm-air-free, deepseek, or-llama-3.3-70b-free]
    - openrouter-free: [qwen3.5-flash, qwen-coder, or-glm-air-free, deepseek, or-llama-3.3-70b-free]

  # Fallback por contexto excedido (qwen3.5-flash/qwen-coder first)
  context_window_fallbacks:
    - deepseek: [qwen3.5-flash, qwen-coder, kimi, qwen3.5-plus, qwen3-max]
    - claude-opus: [qwen3.5-flash, qwen-coder, qwen-plus, deepseek, qwen3.5-plus]
    - claude-opus-4-6: [qwen3.5-flash, qwen-coder, qwen-plus, deepseek, qwen3.5-plus]
    - claude-sonnet: [qwen3.5-flash, qwen-coder, qwen-plus, deepseek, qwen3.5-plus, qwen3-max]
    - claude-sonnet-4-6: [qwen3.5-flash, qwen-coder, qwen-plus, deepseek, qwen3.5-plus, qwen3-max]
    - claude-sonnet-4-5-20250929: [qwen3.5-flash, qwen-coder, qwen-plus, deepseek, qwen3.5-plus, qwen3-max]
    - qwen3.5-plus: [qwen-coder, qwen3.5-flash, kimi, deepseek, gemini]
    - qwen3.5-flash: [qwen-flash, qwen-coder, kimi, deepseek, qwen3.5-plus]
    - qwen-plus: [qwen3.5-flash, qwen-coder, kimi, deepseek]
    - qwen-coder: [qwen3.5-flash, qwen3.5-plus, kimi, deepseek]
    - qwq-plus: [qwen3.5-flash, qwen-coder, kimi, deepseek]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL  # PostgreSQL para auth/keys
  cache: true        # Redis caching habilitado
  allow_client_side_credentials: true  # api_base personalizado quando necessario

# Redis Cache Configuration (local - litellm-redis, fgsrv06 Docker)
cache_params:
  type: redis
  host: "litellm-redis"
  port: 6379
