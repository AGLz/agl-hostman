# Integração com agl-hostman (OpenClaw model list)
# Ref: https://github.com/ruvnet/claude-flow/wiki/litellm-integration
# Última atualização modelos: 2026-03-13
# Env vars: ANTHROPIC_API_KEY, ZAI_API_KEY, MOONSHOT_API_KEY, DEEPSEEK_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY, DASHSCOPE_API_KEY, GROQ_API_KEY, GROQ_API_KEY2 (opcional), CEREBRAS_API_KEY, OLLAMA_HOST (opcional; override api_base Ollama); primário FREE: GLM-4.7-Flash Z.AI
#
# ATUALIZAÇÕES 2026-03-13:
# - Claude: Opus 4.6 (1M ctx), Sonnet 4.6, Haiku 4.5 - confirmados
# - GLM: GLM-5 (744B/40B active), GLM-4.7-FlashX adicionado
# - DeepSeek: V3.2 unificado ($0.28/$0.42), V4 em breve
# - OpenAI: GPT-5.3 Instant (400K ctx), GPT-5.4 em Q2 2026
# - Gemini: 3.1 Pro (Feb 2026), 2.5 Pro/Flash atualizados
# - Kimi: K2.5, K2 Thinking, K2 Turbo Preview
# - Qwen: Qwen3.5 Plus (1M ctx), Qwen3-Max-Thinking
#
# NOVIDADES 2026-03-26:
# - Agente especializado: infra-agent (Ollama removido do proxy — carga em aglsrv1)
# - Modelos removidos: falhas de quota/auth validadas; embeddings OpenAI; OpenRouter mortos
# - OpenRouter :free: IDs confirmados via openrouter.ai/api/v1/models

model_list:
  # ============================================================
  # AGENTES ESPECIALIZADOS (System Prompts + Tools)
  # ============================================================
  # Configurados para Claude Flow V3 + agl-hostman

  # === infra-agent: Especialista em infraestrutura ===
  # GLM-5 com tools de infraestrutura (Proxmox, WireGuard, NFS)
  - model_name: "infra-agent"
    litellm_params:
      model: "anthropic/glm-5"
      api_key: os.environ/ZAI_API_KEY
      api_base: "https://api.z.ai/api/anthropic"
      timeout: 45
      system_prompt: |
        Você é um especialista em infraestrutura AGL.
        Hosts: agldv03 (dev), aglsrv1 (Proxmox), fgsrv3-6 (MySQL/APIs/WireGuard).
        Ferramentas: Proxmox API, WireGuard, NFS, Tailscale, Cloudflare Tunnels.
        Priorize: alta disponibilidade, monitoramento, alertas de storage.
        Responda em português brasileiro.
    model_info:
      max_tokens: 131072
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.0000032
      context_window: 200000
      access: direct
      agent_type: "infrastructure"
      rpm: 60
      tpm: 100000

  # ============================================================
  # ACESSO DIRETO (preferir sempre)
  # ============================================================

  # === Alias primário AGL = GLM-4.7-Flash Z.AI (FREE) ===
