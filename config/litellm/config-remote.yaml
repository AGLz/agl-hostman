# Configurações LiteLLM (fallbacks nativos)
litellm_settings:
  num_retries: 2
  request_timeout: 20  # Timeout para permitir modelos locais
  allowed_fails: 2
  # IMPORTANTE: Encaminha headers de auth para Claude Code Max subscription
  forward_client_headers_to_llm_api: true
  # ============================================================
  # FALLBACKS ORDENADOS POR LATÊNCIA (mais rápidos primeiro)
  # ============================================================
  # Latência média:
  # - qwen3.5-plus (DashScope): 0.8s
  # - deepseek: 1.4s
  # - glm-flash: 1.6s
  # - glm-5: 2.4s
  # - phi3-local: 8s
  # - llama-local: 9s
  # - qwen3-4b: 10s
  # - mistral-local: 10s
  # - gemma2-local: 12s
  # - qwen-coder-local: 15s
  # - qwen3-local: 21s
  fallbacks:
    # === Claude fallbacks ===
    # Alinhado com config.yaml: GLM primeiro (ZAI), depois deepseek/qwen/gemini — hive-mind / claude-flow esperam GLM como default económico
    # APENAS cloud APIs nos fallbacks (Ollama não suporta "thinking" → erro 500 em alguns fluxos)
    - claude-opus: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-opus-4-6: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet-4-6: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet-4-5-20250929: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-haiku: [glm-flash, deepseek, qwen3.5-plus, gemini]
    - claude-haiku-4-5-20251001: [glm-flash, deepseek, qwen3.5-plus, gemini]

    # === GLM fallbacks ===
    - glm: [qwen3.5-plus, deepseek, phi3-local, qwen3-local, kimi, gemini]
    - glm-5: [qwen3.5-plus, deepseek, phi3-local, qwen3-local, kimi, gemini]
    - glm-flash: [qwen3.5-plus, deepseek, phi3-local, qwen3-4b, kimi, gemini]
    - glm-air: [glm-flash, qwen3.5-plus, deepseek, phi3-local]  # glm-4.5-air pode falhar via /v1/messages

    # === Cursor Agent fallbacks (Ask/Plan modes) ===
    - cursor-composer: [cursor-claude-sonnet, cursor-claude-opus, cursor-glm-5, cursor-deepseek]
    - cursor-composer-2-fast: [cursor-claude-sonnet, cursor-claude-opus, cursor-glm-5, cursor-deepseek]
    - cursor-claude-sonnet: [cursor-composer, cursor-composer-2-fast, cursor-claude-opus, cursor-glm-5, cursor-deepseek]
    - cursor-claude-opus: [cursor-claude-sonnet, cursor-composer, cursor-composer-2-fast, cursor-gpt-4o]
    - cursor-glm-5: [cursor-deepseek, cursor-gpt-4o]

    # === DeepSeek fallbacks ===
    - deepseek: [qwen3.5-plus, glm, phi3-local, qwen3-local, kimi, gemini]
    - r1: [deepseek, qwen3.5-plus, glm, phi3-local, qwen3-local, kimi]

    # === Kimi fallbacks ===
    - kimi: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local, gemini]
    - kimi-128k: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local, kimi]

    # === GPT fallbacks ===
    - gpt: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local, gemini]
    - gpt-4o: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local, gemini]

    # === Gemini fallbacks ===
    - gemini: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local, kimi]

    # === Qwen Cloud fallbacks ===
    - qwen3.5: [phi3-local, qwen3-4b, qwen3-local, glm, deepseek, qwen3.5-or]
    - qwen3.5-plus: [phi3-local, qwen3-4b, qwen3-local, glm, deepseek, qwen3.5-or]
    - qwen3-max: [phi3-local, qwen3-local, glm, deepseek, qwen3-max-or]
    - qwen-plus: [phi3-local, qwen3-4b, qwen3-local, glm, deepseek, qwen3.5-or]
    - qwen-coder: [qwen-coder-local, phi3-local, qwen3-local, glm, deepseek, qwen3.5-or]

    # === Ollama Local fallbacks ===
    - phi3-local: [qwen3.5-plus, deepseek, glm-flash, llama-local, qwen3-4b]
    - llama-local: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-4b]
    - qwen3-4b: [qwen3.5-plus, deepseek, glm, phi3-local, llama-local]
    - mistral-local: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local]
    - gemma2-local: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local]
    - qwen-coder-local: [qwen3.5-plus, deepseek, glm, phi3-local, qwen3-local]
    - qwen3-local: [qwen3.5-plus, deepseek, glm, phi3-local, gemma2-local]

    - groq-llama-33: [groq-gpt-oss-120b, deepseek, glm-flash, qwen3.5-plus]
    - groq-gpt-oss-120b: [groq-llama-33, deepseek, glm-flash]

    - openrouter-free: [openrouter-llama-3.2-3b-free, glm-flash, deepseek, qwen3.5-plus]
    - openrouter-llama-3.2-3b-free: [openrouter-free, glm-flash, deepseek]

  # Fallback por contexto excedido (modelos com mais tokens)
  context_window_fallbacks:
    - glm: [kimi, kimi-128k, qwen3.5-plus, qwen3-local]
    - glm-5: [kimi, kimi-128k, qwen3.5-plus, qwen3-local]
    - glm-flash: [kimi, deepseek, qwen3.5-plus, qwen3-4b]
    - deepseek: [kimi, qwen3.5-plus, glm, qwen3-local]
    - claude-opus: [glm, deepseek, qwen3.5-plus, qwen3-local]
    - claude-opus-4-6: [glm, deepseek, qwen3.5-plus, qwen3-local]
    - claude-sonnet: [glm, deepseek, qwen3.5-plus, qwen3-local]
    - claude-sonnet-4-6: [glm, deepseek, qwen3.5-plus, qwen3-local]
    - claude-sonnet-4-5-20250929: [glm, deepseek, qwen3.5-plus, qwen3-local]
    - qwen3.5-plus: [kimi, glm, deepseek, qwen3-local]
    - qwen3-local: [qwen3.5-plus, glm, deepseek, kimi]

