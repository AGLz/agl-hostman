# LiteLLM Proxy - Claude-Flow Multi-Model & Fallback (REMOTO)
# Variante para fgsrv06 e hosts fora da LAN AGLSRV1
# Ollama via Tailscale (100.116.57.111), cache desabilitado
# Integração com agl-hostman (OpenClaw model list)
# Ref: https://github.com/ruvnet/claude-flow/wiki/litellm-integration
# Última atualização modelos: 2026-03-20 (sync com config.yaml / docs oficiais API)
# Env vars: ANTHROPIC_API_KEY, ZAI_API_KEY, MOONSHOT_API_KEY, DEEPSEEK_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY, GROQ_API_KEY, DASHSCOPE_API_KEY (Qwen direto)
#
# Ver cabeçalho de config/litellm/config.yaml para IDs de referência (Anthropic, OpenAI, Google).
#
# NOVIDADES 2026-03-13:
# - Fallbacks claude-* alinhados com config.yaml (GLM primeiro; antes: qwen/deepseek primeiro em remoto)
# - Agentes especializados: claude-code-agent, infra-agent, research-agent
# - Rate limits por modelo (TPM/RPM)
# - Fallbacks otimizados por latência
# - Cache Redis melhorado com TTL diferenciado

model_list:
  # ============================================================
  # AGENTES ESPECIALIZADOS (System Prompts + Tools)
  # ============================================================
  # Configurados para Claude Flow V3 + agl-hostman

  # === claude-code-agent: Especialista em código ===
  # Claude Sonnet 4.6 com system prompt otimizado para desenvolvimento
  - model_name: "claude-code-agent"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: os.environ/ANTHROPIC_API_KEY
      system_prompt: |
        Você é um especialista em desenvolvimento de software backend.
        Especialidades: Node.js, Fastify, PostgreSQL, Redis, APIs RESTful.
        Siga sempre: TDD London School, Domain-Driven Design, Clean Architecture.
        Valide inputs, trate erros, documente APIs.
        Responda em português brasileiro.
    model_info:
      max_tokens: 8192
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      context_window: 200000
      access: direct
      agent_type: "coder"
      rpm: 1000
      tpm: 400000

  # === infra-agent: Especialista em infraestrutura ===
  # GLM-5 com tools de infraestrutura (Proxmox, WireGuard, NFS)
  - model_name: "infra-agent"
    litellm_params:
      model: "anthropic/glm-5"
      api_key: os.environ/ZAI_API_KEY
      api_base: "https://api.z.ai/api/anthropic"
      timeout: 45
      system_prompt: |
        Você é um especialista em infraestrutura AGL.
        Hosts: agldv03 (dev), aglsrv1 (Proxmox), fgsrv3-6 (MySQL/APIs/WireGuard).
        Ferramentas: Proxmox API, WireGuard, NFS, Tailscale, Cloudflare Tunnels.
        Priorize: alta disponibilidade, monitoramento, alertas de storage.
        Responda em português brasileiro.
    model_info:
      max_tokens: 131072
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.0000032
      context_window: 200000
      access: direct
      agent_type: "infrastructure"
      rpm: 60
      tpm: 100000

  # === research-agent: Especialista em pesquisa ===
  # Kimi K2.5 para contexto longo e análise de documentação
  - model_name: "research-agent"
    litellm_params:
      model: "moonshot/kimi-k2.5"
      api_key: os.environ/MOONSHOT_API_KEY
      system_prompt: |
        Você é um especialista em pesquisa e análise de documentação.
        Capacidades: análise de código, revisão de PRs, documentação técnica.
        Use contexto longo para analisar múltiplos arquivos simultaneamente.
        Responda em português brasileiro.
    model_info:
      max_tokens: 16384
      input_cost_per_token: 0.0000006
      output_cost_per_token: 0.000003
      context_window: 262144
      access: direct
      agent_type: "researcher"
      rpm: 30
      tpm: 50000

