# Configurações LiteLLM (fallbacks nativos)
litellm_settings:
  num_retries: 2
  request_timeout: 120
  allowed_fails: 2
  # IMPORTANTE: Encaminha headers de auth para Claude Code Max subscription
  forward_client_headers_to_llm_api: true
  # ============================================================
  # FALLBACKS ORDENADOS POR LATÊNCIA (mais rápidos primeiro)
  # ============================================================
  # Latência referência: qwen3.5-plus ~0.8s, deepseek ~1.4s, glm-flash ~1.6s, glm-5 ~2.4s
  fallbacks:
    - agl-primary: [glm-flash, qwen3.5-plus, deepseek, gemini]

    # === Claude fallbacks (só cloud) ===
    - claude-opus: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-opus-4-6: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet-4-6: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-sonnet-4-5-20250929: [glm, deepseek, qwen3.5-plus, gemini]
    - claude-haiku: [glm-flash, deepseek, qwen3.5-plus, gemini]
    - claude-haiku-4-5-20251001: [glm-flash, deepseek, qwen3.5-plus, gemini]

    # OpenClaw: modelos pedidos como zai/* — sem grupo o router não faz fallback; Z.AI rate limit → cloud
    - zai/glm-4.5-flash: [deepseek, qwen3.5-plus, gemini]
    - zai/glm-4.7-flash: [deepseek, qwen3.5-plus, gemini]
    - zai/glm-5: [deepseek, qwen3.5-plus, gemini]
    - zai/glm-4.7: [deepseek, qwen3.5-plus, gemini]
    - glm-4.5-flash: [deepseek, qwen3.5-plus, gemini]
    - glm-4.7-flash: [deepseek, qwen3.5-plus, gemini]
    - kimi/moonshot-v1-128k: [qwen3.5-plus, deepseek, glm, kimi]
    - moonshot-v1-128k: [qwen3.5-plus, deepseek, glm, kimi]

    # === GLM fallbacks ===
    - glm: [qwen3.5-plus, deepseek, kimi, gemini]
    - glm-5: [qwen3.5-plus, deepseek, kimi, gemini]
    - glm-flash: [qwen3.5-plus, deepseek, kimi, gemini]
    - glm-air: [glm-flash, qwen3.5-plus, deepseek, gemini]  # glm-4.5-air pode falhar via /v1/messages

    # === Cursor Agent — Z.AI flash → GLM-5 / cloud ===
    - cursor-composer: [cursor-glm-5, glm-flash, cursor-deepseek, deepseek]
    - cursor-composer-2-fast: [cursor-glm-5, glm-flash, cursor-deepseek, deepseek]
    - cursor-claude-sonnet: [cursor-composer, cursor-composer-2-fast, cursor-claude-opus, cursor-glm-5, cursor-deepseek]
    - cursor-claude-opus: [cursor-claude-sonnet, cursor-composer, cursor-composer-2-fast, cursor-glm-5, cursor-deepseek]
    - cursor-glm-5: [cursor-deepseek, cursor-claude-sonnet]

    # === DeepSeek fallbacks ===
    - deepseek: [qwen3.5-plus, glm, kimi, gemini]
    - r1: [deepseek, qwen3.5-plus, glm, kimi]

    # === Kimi fallbacks ===
    - kimi: [qwen3.5-plus, deepseek, glm, gemini]
    - kimi-128k: [qwen3.5-plus, deepseek, glm, kimi]

    # === GPT fallbacks ===
    - gpt: [qwen3.5-plus, deepseek, glm, gemini]
    - gpt-4o: [qwen3.5-plus, deepseek, glm, gemini]

    # === Gemini fallbacks ===
    - gemini: [qwen3.5-plus, deepseek, glm, kimi]

    # === Qwen (DashScope) ===
    - qwen3.5: [glm, deepseek, gemini, or-qwen3-coder-free]
    - qwen3.5-plus: [glm, deepseek, gemini, or-qwen3-coder-free]
    - qwen3-max: [glm, deepseek, gemini, or-qwen3-coder-free]
    - qwen-plus: [glm, deepseek, gemini, or-qwen3-coder-free]
    - qwen-coder: [glm, deepseek, gemini, or-qwen3-coder-free]

    - openrouter/openrouter/free: [zai/glm-4.7-flash, deepseek, or-llama-3.3-70b-free, glm-flash]
    - openrouter-free: [zai/glm-4.7-flash, deepseek, or-llama-3.3-70b-free, glm-flash]

  # Fallback por contexto excedido (modelos com mais tokens)
  context_window_fallbacks:
    - glm: [kimi, kimi-128k, qwen3.5-plus, qwen3-max]
    - glm-5: [kimi, kimi-128k, qwen3.5-plus, qwen3-max]
    - glm-flash: [kimi, deepseek, qwen3.5-plus, gemini]
    - deepseek: [kimi, qwen3.5-plus, glm, qwen3-max]
    - claude-opus: [glm, deepseek, qwen3.5-plus]
    - claude-opus-4-6: [glm, deepseek, qwen3.5-plus]
    - claude-sonnet: [glm, deepseek, qwen3.5-plus, qwen3-max]
    - claude-sonnet-4-6: [glm, deepseek, qwen3.5-plus, qwen3-max]
    - claude-sonnet-4-5-20250929: [glm, deepseek, qwen3.5-plus, qwen3-max]
    - qwen3.5-plus: [kimi, glm, deepseek, gemini]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL  # PostgreSQL para auth/keys
  cache: true        # Redis caching habilitado
  allow_client_side_credentials: true  # api_base personalizado quando necessário

# Redis Cache Configuration (local - litellm-redis, fgsrv06 Docker)
cache_params:
  type: redis
  host: "litellm-redis"
  port: 6379
