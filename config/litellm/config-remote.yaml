# Base operacional agldv03: config/litellm/config.yaml — fundir alteraoes de modelo aqui quando possivel.
# Ultima atualizaao modelos: 2026-04-12
# Env vars: ANTHROPIC_API_KEY, MOONSHOT_API_KEY, DEEPSEEK_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY, DASHSCOPE_API_KEY, GROQ_API_KEY, GROQ_API_KEY2 (opcional), CEREBRAS_API_KEY, OLLAMA_HOST (opcional; override api_base Ollama)
