# Proxmox Backup Schedule - Cron Configuration
# Location: /etc/cron.d/backup-schedule
# Configure automated backup operations

# ============================================================================
# CRITICAL SYSTEMS BACKUPS (CT183, CT184)
# Daily at 02:00 AM - Full + Incremental backups
# ============================================================================
0 2 * * * root /usr/bin/vzdump 183 --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification always --prune-backups 'keep-daily=7 keep-weekly=4 keep-monthly=12'
0 2 * * * root /usr/bin/vzdump 184 --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification always --prune-backups 'keep-daily=7 keep-weekly=4 keep-monthly=12'

# ============================================================================
# HIGH PRIORITY SYSTEMS BACKUPS (CT180, CT182)
# Daily at 03:00 AM - Incremental backups (Mon-Sat)
# ============================================================================
0 3 * * 1-6 root /usr/bin/vzdump 180 --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification failure --prune-backups 'keep-daily=7 keep-weekly=4 keep-monthly=6'
0 3 * * 1-6 root /usr/bin/vzdump 182 --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification failure --prune-backups 'keep-daily=7 keep-weekly=4 keep-monthly=6'

# ============================================================================
# FULL WEEKLY BACKUP (All Systems)
# Sunday at 05:00 AM - Full backup for all containers
# ============================================================================
0 5 * * 0 root /usr/bin/vzdump --all --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification always --prune-backups 'keep-daily=7 keep-weekly=4 keep-monthly=12'

# ============================================================================
# STANDARD SYSTEMS BACKUP (CT173)
# Weekly Sunday at 04:00 AM - Full backup
# ============================================================================
0 4 * * 0 root /usr/bin/vzdump 173 --storage aglsrv6-pbs --mode snapshot --compress zstd --mailnotification failure --prune-backups 'keep-weekly=4 keep-monthly=6'

# ============================================================================
# BACKUP VERIFICATION
# Daily at 08:00 AM - Verify backup age and integrity
# ============================================================================
0 8 * * * root /usr/local/bin/backup-verify.sh

# ============================================================================
# WEEKLY FULL VERIFICATION
# Sunday at 10:00 AM - Comprehensive backup integrity check
# ============================================================================
0 10 * * 0 root /usr/local/bin/backup-verify.sh --full

# ============================================================================
# BACKUP METRICS COLLECTION
# Every 5 minutes - Collect Prometheus metrics
# ============================================================================
*/5 * * * * root /usr/local/bin/backup-metrics-collector.sh

# ============================================================================
# PBS GARBAGE COLLECTION
# Monday, Wednesday, Friday at 02:30 AM - Clean up old backups
# This is configured in PBS, but triggered via API
# ============================================================================
30 2 * * 1,3,5 root /usr/bin/ssh root@10.6.0.14 "proxmox-backup-manager datastore update --datastore aglsrv6-pbs --gc-schedule '02:30'"

# ============================================================================
# PBS PRUNE OPERATION
# Saturday at 04:30 AM - Apply retention policy
# ============================================================================
30 4 * * 6 root /usr/bin/ssh root@10.6.0.14 "proxmox-backup-client prune --repository 10.6.0.14:aglsrv6-pbs --keep-daily 7 --keep-weekly 4 --keep-monthly 12"

# ============================================================================
# BACKUP TO OFF-SITE (FGSRV07)
# Daily at 06:00 AM - Sync backups to FGSRV07 for disaster recovery
# This is configured as a PBS sync job, but can be triggered manually
# ============================================================================
0 6 * * * root /usr/bin/ssh root@100.109.181.93 "proxmox-backup-manager sync-job run fgsrv07-local-backup"

# ============================================================================
# MONTHLY BACKUP REPORT
# First day of month at 09:00 AM - Generate backup status report
# ============================================================================
0 9 1 * * root /usr/local/bin/backup-report.sh --email

# ============================================================================
# BACKUP NOTIFICATION CLEANUP
# Daily at 23:55 - Rotate backup notification logs
# ============================================================================
55 23 * * * root /usr/sbin/logrotate /etc/logrotate.d/backup-logs

# ============================================================================
# NOTES
# ============================================================================
# - All times are in server local time
# - Backup jobs run sequentially by Proxmox scheduler
# - Logs are stored in /var/log/vzdump.log
# - Verification logs are in /var/log/backup-verify.log
# - Metrics are exported to node_exporter textfile collector
# - Email notifications sent to admin@agl.io
# - Adjust schedules based on maintenance windows
# ============================================================================
