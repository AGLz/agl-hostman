[Service]
# CT200 — /etc/systemd/system/ollama.service.d/override.conf
# Aplicar: scripts/aglsrv1/apply-ct200-ollama-override.sh (como root no CT200) ou pct push + systemctl restart ollama.
# Política: um único modelo local (qwen3:4b) — OLLAMA_MAX_LOADED_MODELS=1. LiteLLM só expõe rotas qwen3:4b.
#
# LD_LIBRARY_PATH: libggml-base + libcuda em /lib/x86_64-linux-gnu (LXC).
# OLLAMA_GPU_OVERHEAD: evita deteção 0 VRAM em alguns drivers NVIDIA (ollama#14280).
# OLLAMA_LLM_LIBRARY: força cuda_v12 quando coexistem cuda_v12 e cuda_v13 no bundle.
# Proxmox LXC: incluir lxc.cgroup2.devices.allow c 509:* rwm (nvidia-uvm) — sem isto CUDA pode falhar com initial_count=0.
Environment="OLLAMA_HOST=0.0.0.0:11434"
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_MAX_QUEUE=256"
Environment="OLLAMA_KEEP_ALIVE=30m"
Environment="OLLAMA_LOAD_TIMEOUT=5m"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_CONTEXT_LENGTH=8192"
Environment="OLLAMA_NUM_GPU=999"
Environment="OLLAMA_GPU_MEMORY_FRACTION=0.9"
Environment="OLLAMA_MAX_VRAM=0"
Environment="LD_LIBRARY_PATH=/usr/local/lib/ollama:/usr/local/lib/ollama/cuda_v12:/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu"
Environment="OLLAMA_GPU_OVERHEAD=1"
Environment="OLLAMA_LLM_LIBRARY=cuda_v12"
