# AGLSRV1 — GTX 1650 (05:00.0 VGA + 05:00.1 HDMI audio) → VM110 agl-ollama
# Alinhado com Proxmox forum 2025 + softdep para evitar hijack de drivers.
# Instalar: prepare-gpu-passthrough-host.sh (copia para /etc/modprobe.d/vfio-gpu.conf)

options vfio-pci ids=10de:1f82,10de:10fa disable_vga=1 disable_idle_d3=1
softdep nvidia pre: vfio-pci
softdep nvidia_drm pre: vfio-pci
softdep nvidia_modeset pre: vfio-pci
softdep snd_hda_intel pre: vfio-pci
