[Service]
# Aplicar só no CT200 (Ollama não no host). Destino: .../ollama.service.d/10-agl-concurrency.conf
# Limitar a 1 modelo residente e 1 pedido paralelo (menos RAM; ver issues Ollama sobre OLLAMA_NUM_PARALLEL).
Environment=OLLAMA_MAX_LOADED_MODELS=1
Environment=OLLAMA_NUM_PARALLEL=1
Environment=OLLAMA_MAX_QUEUE=256
