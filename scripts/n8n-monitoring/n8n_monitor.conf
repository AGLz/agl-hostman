# N8N Monitoring System Configuration
# Edit this file to customize monitoring behavior

# Container Configuration
N8N_CONTAINER_NAME=n8n
N8N_HTTP_PORT=5678
N8N_HTTP_TIMEOUT=10

# Health Check Thresholds
N8N_MAX_MEMORY_PERCENT=90
N8N_MAX_CPU_PERCENT=95
N8N_CHECK_INTERVAL=60

# Recovery Configuration
N8N_MAX_RESTARTS_PER_HOUR=5
N8N_MAX_RESTARTS_PER_DAY=20
N8N_COOLDOWN_AFTER_MAX_RESTARTS=3600
N8N_CIRCUIT_BREAKER_THRESHOLD=10
N8N_CIRCUIT_BREAKER_RESET_TIME=86400

# Backoff Strategy
N8N_INITIAL_BACKOFF=10
N8N_MAX_BACKOFF=600
N8N_BACKOFF_MULTIPLIER=2

# Restart Strategy
N8N_RESTART_TIMEOUT=30
N8N_HEALTH_CHECK_RETRIES=3
N8N_HEALTH_CHECK_INTERVAL=10

# Diagnostics Configuration
N8N_DIAG_LOG_LINES=1000
N8N_DIAG_RETENTION=7

# Log Aggregation
N8N_REPORT_LINES=5000
N8N_REPORT_RETENTION=14

# Monitoring Schedule (for cron)
# Health check every 5 minutes: */5 * * * *
# Recovery check every minute when needed
# Log aggregation daily at 02:00: 0 2 * * *
# Full diagnostics weekly: 0 3 * * 0

# Alerting (placeholder for future implementation)
N8N_ALERT_EMAIL=""
N8N_ALERT_WEBHOOK=""
N8N_ALERT_ON_CRITICAL=true
N8N_ALERT_ON_WARNING=false
