# MySQL HA Failover — template (copiar para /etc/mysql-ha/mysql-failover.conf no CT135)
# Preencher MYSQL_PASS e CF_API_KEY a partir do cofre. Não commitar segredos.
#
# Topologia 2026-04 (GTID): MASTER = CT235 (mysql7, FGSRV7) · SLAVE read_only = CT135 (mysql5, AGLSRV5).
# Este script deve correr no SLAVE (CT135), com cron local. Monitoriza MASTER_MYSQL_IP (Tailscale CT235).

ROLE="slave"
THIS_SERVER_TUNNEL="mysql-slave.falg.com.br"
MASTER_TUNNEL_HOST="mysql-master.falg.com.br"

# Tailscale: master CT235 · este nó (slave) CT135
MASTER_MYSQL_IP="100.83.7.16"
THIS_SERVER_IP="100.98.1.119"

# LAN (referência túneis / firewall)
SLAVE_MYSQL_LOCAL="172.2.2.135"
MASTER_MYSQL_LOCAL="192.168.70.135"

MYSQL_USER="root"
MYSQL_PASS="CHANGE_ME_USE_VAULT"

MAX_FAILURES=3
FAILOVER_COOLDOWN=300

CF_EMAIL="carlos@aguileraz.net"
CF_API_KEY="CHANGE_ME_USE_VAULT"

CF_ZONE_ID="01ce76a70c797ca510bb56bf61f3a75e"

CF_MYSQL_HA_ID="c1629d07520b0d5becfddf028c88dd54"
CF_DB_HA_ID="9a1a01ec203f16e16ed598ed8532ec44"

# Túnel Cloudflare onde o master CT235 é alcançado (FGSRV7 / CT170)
CF_SLAVE_TUNNEL="513cec7b-754d-4dd8-a69d-d15942180fe4.cfargotunnel.com"

# Túnel Cloudflare onde o promovido CT135 é alcançado (AGLSRV5 / CT130) — alvo DNS após failover
CF_MASTER_TUNNEL="02d57187-83ba-4042-a5cc-8bb752a6b65a.cfargotunnel.com"

CF_TTL="60"
CF_PROXIED="false"

WEBHOOK_URL=""
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""
