# CPU-only override — GPUs removidas da VM310.
# Aplicar: bash scripts/aglsrv3/apply-vm310-cpu-ollama.sh
# Remover zz-cpu.conf nos dois service.d para voltar a GPU.
[Service]
Environment="OLLAMA_NUM_GPU=0"
Environment="OLLAMA_VULKAN=0"
Environment="GGML_VK_VISIBLE_DEVICES="
Environment="OLLAMA_GPU_MEMORY_FRACTION=0"
Environment="HIP_VISIBLE_DEVICES=-1"
Environment="ROCR_VISIBLE_DEVICES=-1"
Environment="OLLAMA_FLASH_ATTENTION=0"
Environment="OLLAMA_NUM_PARALLEL=1"
