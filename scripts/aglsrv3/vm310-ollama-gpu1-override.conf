[Service]
# VM310 agl-ollama GPU1 — RX 580 #2, Vulkan RADV, porta 11435 (agl-primary-strong / qwen3:8b)
Environment="OLLAMA_HOST=0.0.0.0:11435"
Environment="GGML_VK_VISIBLE_DEVICES=1"
Environment="OLLAMA_NUM_PARALLEL=2"
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_MAX_QUEUE=256"
Environment="OLLAMA_KEEP_ALIVE=30m"
Environment="OLLAMA_LOAD_TIMEOUT=5m"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_VULKAN=1"
Environment="OLLAMA_CONTEXT_LENGTH=16384"
Environment="OLLAMA_NUM_GPU=999"
Environment="OLLAMA_GPU_MEMORY_FRACTION=0.92"
Environment="OLLAMA_SCHED_SPREAD=0"
Environment="HIP_VISIBLE_DEVICES=-1"
Environment="ROCR_VISIBLE_DEVICES=-1"
Environment="HSA_OVERRIDE_GFX_VERSION=10.3.0"
Environment="GGML_VK_DISABLE_INTEGER_DOT_PRODUCT=1"
SupplementaryGroups=render video
