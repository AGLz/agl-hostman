# Statusline Configuration Templates
# Pre-built templates for different user scenarios and preferences

templates:

  # Minimal template - essential information only
  minimal:
    name: "Minimal"
    description: "Clean, distraction-free statusline with basic burn rate"
    use_case: "Focus-oriented development, minimal screen real estate"

    global:
      visual_burn_rate:
        enabled: true
        update_interval: 2000  # Slower updates for less distraction
        indicators:
          style: "dots"
          width: 5
        thresholds:
          low: 40
          medium: 75
          high: 90
          critical: 95

    environments:
      vim:
        enabled: true
        format: "{file} {modified} | {burn_rate_mini} | {line_col}"
        components:
          burn_rate_mini:
            format: "{color_dot}"  # Single colored dot

      tmux:
        enabled: true
        left_section:
          format: "{session} {burn_rate_mini}"
        right_section:
          format: "%H:%M"

      shell:
        zsh:
          format: "{pwd_short} {burn_rate_mini} $ "

  # Developer template - comprehensive development information
  developer:
    name: "Developer Focus"
    description: "Comprehensive statusline for active development work"
    use_case: "Software development, debugging, performance monitoring"

    global:
      visual_burn_rate:
        enabled: true
        update_interval: 500   # Fast updates for development
        indicators:
          style: "bar"
          width: 12
        metrics:
          cpu_enabled: true
          memory_enabled: true
          disk_io_enabled: true
          network_enabled: false

    environments:
      vim:
        enabled: true
        format: "{mode} | {file_path} {modified} {git_status} | {burn_rate_full} | {line_col} {file_percent} | {time}"
        components:
          mode:
            show_icon: true
            colors:
              normal: "#5eacd3"
              insert: "#00ff00"
              visual: "#ffaa00"

          file_path:
            show_relative_path: true
            max_length: 40

          git_status:
            enabled: true
            show_branch: true
            show_dirty: true

          burn_rate_full:
            format: "🔥{visual_bar} {percentage}% ({primary_metric})"
            show_primary_metric: true

      tmux:
        enabled: true
        left_section:
          format: "#{session_name} | {git_branch} | {burn_rate_compact}"
        right_section:
          format: "{burn_rate_detailed} | {load_average} | %Y-%m-%d %H:%M"

      shell:
        zsh:
          format: "{user}@{host}:{pwd} {git_info} {burn_rate_full} {exit_code}\n$ "

  # Sysadmin template - system monitoring focus
  sysadmin:
    name: "System Administrator"
    description: "System health and performance monitoring focus"
    use_case: "Server administration, system monitoring, troubleshooting"

    global:
      visual_burn_rate:
        enabled: true
        update_interval: 1000
        indicators:
          style: "blocks"
          width: 15
        metrics:
          cpu_enabled: true
          memory_enabled: true
          disk_io_enabled: true
          network_enabled: true
        thresholds:
          low: 20      # More sensitive for server environments
          medium: 50
          high: 80
          critical: 90

    environments:
      vim:
        enabled: true
        format: "{file} | {burn_rate_detailed} | {system_load} | {line_col} | {time}"
        components:
          burn_rate_detailed:
            format: "🔥{visual_bar} {percentage}% CPU:{cpu}% MEM:{memory}% IO:{disk_io}%"

          system_load:
            enabled: true
            format: "Load: {load_1m}"

      tmux:
        enabled: true
        left_section:
          format: "#{session_name} | {hostname} | {burn_rate_system}"
        right_section:
          format: "{uptime} | {users_count} users | %Y-%m-%d %H:%M"

      shell:
        zsh:
          format: "[{timestamp_short}] {user}@{host}:{pwd} {burn_rate_system} {load_avg}\n# "

  # Powerline template - visually rich with symbols
  powerline:
    name: "Powerline Style"
    description: "Rich visual styling with powerline symbols"
    use_case: "Visual appeal, comprehensive information display"

    global:
      visual_burn_rate:
        enabled: true
        update_interval: 1000
        indicators:
          style: "blocks"
          width: 10
          use_powerline_symbols: true
        animation:
          enabled: true
          transition_duration: 300

    environments:
      vim:
        enabled: true
        format: " {mode_powerline}  {file_powerline} {modified}  {burn_rate_powerline}  {line_col_powerline}  {time_powerline} "
        powerline_separators:
          enabled: true
          left: ""
          right: ""

      tmux:
        enabled: true
        powerline_theme: true
        left_section:
          format: " #{session_name}   {burn_rate_powerline} "
        right_section:
          format: " {weather}   %Y-%m-%d   %H:%M "

  # Performance template - optimized for low resource usage
  performance:
    name: "Performance Optimized"
    description: "Minimal resource usage while maintaining functionality"
    use_case: "Resource-constrained environments, battery-powered devices"

    global:
      visual_burn_rate:
        enabled: true
        update_interval: 5000  # Slow updates to save resources
        indicators:
          style: "ascii"
          width: 8
        metrics:
          cpu_enabled: true
          memory_enabled: false  # Disable non-essential metrics
          disk_io_enabled: false
          network_enabled: false
        performance:
          cache_enabled: true
          cache_duration: 2000
          background_updates: true

    environments:
      vim:
        enabled: true
        format: "{file_short} | {burn_rate_ascii} | {line_col}"
        components:
          file_short:
            max_length: 20
          burn_rate_ascii:
            format: "[{ascii_bar}]"

  # Accessibility template - high contrast and clear indicators
  accessibility:
    name: "Accessibility Focused"
    description: "High contrast colors and clear visual indicators"
    use_case: "Visual accessibility, high contrast displays, screen readers"

    global:
      visual_burn_rate:
        enabled: true
        indicators:
          style: "ascii"
          width: 10
          high_contrast: true
        colors:
          background: "#000000"
          foreground: "#ffffff"
          low: "#ffffff"      # White for normal
          medium: "#ffff00"   # Bright yellow for medium
          high: "#ff4400"     # Bright orange for high
          critical: "#ff0000" # Bright red for critical

    environments:
      vim:
        enabled: true
        format: "{mode_text} | {file} | LOAD:{burn_rate_text} | LINE:{line_col}"
        components:
          mode_text:
            format: "MODE:{mode_name}"
          burn_rate_text:
            format: "{percentage_rounded}% {status_text}"
            show_text_status: true  # LOW/MED/HIGH/CRIT

# Theme customization system
customization:

  # User override system
  user_themes_dir: "~/.config/statusline/themes/"

  # Theme inheritance
  inheritance:
    # Users can extend existing themes
    example_extended_minimal:
      extends: "minimal"
      name: "My Minimal Plus"
      global:
        visual_burn_rate:
          indicators:
            width: 8  # Override just this setting

  # Component library for building custom themes
  components:

    # Burn rate component variations
    burn_rate_components:

      simple_dot:
        format: "{color_dot}"
        description: "Single colored dot indicator"

      percentage_only:
        format: "{percentage}%"
        description: "Percentage number only"

      bar_with_percent:
        format: "{visual_bar} {percentage}%"
        description: "Visual bar plus percentage"

      detailed_metrics:
        format: "🔥{visual_bar} {percentage}% (C:{cpu}% M:{memory}%)"
        description: "Bar with detailed CPU and memory"

      ascii_meter:
        format: "[{ascii_bar}] {percentage}%"
        description: "ASCII art meter"

      emoji_status:
        format: "{emoji_indicator} {percentage}%"
        emoji_mapping:
          low: "😊"
          medium: "😐"
          high: "😰"
          critical: "🔥"

    # File display components
    file_components:

      basename_only:
        format: "{filename}"

      relative_path:
        format: "{relative_path}"
        max_length: 30

      full_path:
        format: "{full_path}"
        truncate_middle: true

    # Time components
    time_components:

      time_12h:
        format: "%I:%M %p"

      time_24h:
        format: "%H:%M"

      datetime_full:
        format: "%Y-%m-%d %H:%M"

      timestamp_unix:
        format: "{unix_timestamp}"

# Template selection helpers
selection_guide:

  # Questionnaire to help users choose templates
  questionnaire:
    - question: "What is your primary use case?"
      options:
        development: "Software development and coding"
        sysadmin: "System administration and monitoring"
        general: "General terminal usage"
        presentation: "Screen sharing or presentations"

    - question: "How important is visual appeal vs. performance?"
      options:
        visual: "I want rich visual styling"
        balanced: "I want a good balance"
        performance: "I prioritize performance and minimal resource usage"

    - question: "How much information do you want displayed?"
      options:
        minimal: "Just the essentials"
        moderate: "A good amount of useful information"
        comprehensive: "Show me everything"

  # Recommendation mapping
  recommendations:
    development + visual + comprehensive: "developer"
    development + balanced + moderate: "powerline"
    development + performance + minimal: "performance"
    sysadmin + any + comprehensive: "sysadmin"
    general + visual + any: "powerline"
    general + performance + any: "performance"
    presentation + any + minimal: "accessibility"

# Installation and switching utilities
utilities:

  # Template switcher script
  switcher:
    command: "statusline-switch"
    usage: |
      # List available templates
      statusline-switch --list

      # Preview template without applying
      statusline-switch --preview developer

      # Apply template
      statusline-switch --apply minimal

      # Create custom template from existing
      statusline-switch --customize minimal my-custom

      # Restore previous template
      statusline-switch --restore

  # Configuration generator
  generator:
    command: "statusline-config-gen"
    usage: |
      # Interactive configuration wizard
      statusline-config-gen --interactive

      # Generate from questionnaire responses
      statusline-config-gen --quick-setup development visual comprehensive

      # Merge multiple templates
      statusline-config-gen --merge minimal developer --output hybrid.yaml

  # Validation tool
  validator:
    command: "statusline-validate"
    usage: |
      # Validate configuration file
      statusline-validate ~/.config/statusline/config.yaml

      # Test template compatibility
      statusline-validate --template developer --environment vim

      # Performance impact analysis
      statusline-validate --performance-test config.yaml