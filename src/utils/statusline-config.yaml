# Statusline Configuration with Visual Burn Rate
# This configuration supports multiple environments: vim, tmux, shell prompt, and custom applications

version: "1.0"
metadata:
  name: "Enhanced Statusline Configuration"
  description: "Unified statusline configuration with Visual Burn Rate feature"
  created_by: "CODER-1 Hive Mind Collective"

# Global configuration
global:
  # Visual Burn Rate Configuration
  visual_burn_rate:
    enabled: true
    update_interval: 1000  # milliseconds
    history_length: 60     # seconds to track
    thresholds:
      low: 30      # < 30% burn rate (green)
      medium: 70   # 30-70% burn rate (yellow)
      high: 90     # 70-90% burn rate (orange)
      critical: 95 # > 95% burn rate (red)

    # Visual indicators
    indicators:
      style: "bar"  # Options: bar, dots, blocks, ascii
      width: 10     # Character width for visual indicator
      colors:
        low: "#00ff00"      # Green
        medium: "#ffff00"   # Yellow
        high: "#ff8800"     # Orange
        critical: "#ff0000" # Red

    # Data sources for burn rate calculation
    metrics:
      cpu_enabled: true
      memory_enabled: true
      disk_io_enabled: false
      network_enabled: false
      custom_script_enabled: false
      custom_script_path: ""

  # Color scheme
  colors:
    background: "#333333"
    foreground: "#ffffff"
    accent: "#5eacd3"
    warning: "#ffaa00"
    error: "#ff0000"
    success: "#00ff00"

  # Typography
  fonts:
    primary: "monospace"
    size: 12
    bold_elements: ["time", "burn_rate"]

# Environment-specific configurations
environments:
  # Vim statusline configuration
  vim:
    enabled: true
    format: "{mode} | {file} {modified} | {burn_rate} | {line_col} | {time}"

    components:
      mode:
        enabled: true
        colors:
          normal: "#5eacd3"
          insert: "#00ff00"
          visual: "#ffaa00"
          command: "#ff8800"

      file:
        enabled: true
        show_path: false
        max_length: 30
        truncate_middle: true

      modified:
        enabled: true
        indicator: "*"
        color: "#ffaa00"

      burn_rate:
        enabled: true
        position: "center"
        format: "🔥{visual_indicator} {percentage}%"
        show_percentage: true
        show_visual: true

      line_col:
        enabled: true
        format: "{line}:{col}"

      time:
        enabled: true
        format: "%H:%M"

  # Tmux statusline configuration
  tmux:
    enabled: true
    position: "bottom"

    left_section:
      format: "#{session_name} | {burn_rate_compact}"
      length: 40

    right_section:
      format: "{burn_rate_full} | %Y-%m-%d %H:%M"
      length: 50

    window_format:
      current: " #I:#W#{?window_flags,#{window_flags}, } "
      inactive: " #I:#W#{?window_flags,#{window_flags}, } "

    burn_rate_formats:
      compact: "🔥{visual_bar}"
      full: "🔥{visual_bar} {percentage}%"

  # Shell prompt configuration (PS1)
  shell:
    enabled: true
    shells: ["zsh", "bash"]

    zsh:
      format: "{user}@{host}:{pwd} {burn_rate_mini} {git_branch}\n$ "

    bash:
      format: "{user}@{host}:{pwd} {burn_rate_mini} $ "

    burn_rate_formats:
      mini: "{color_indicator}●"  # Single colored dot
      compact: "{color_indicator}{visual_dots}"
      full: "🔥{visual_bar} {percentage}%"

  # Custom application configuration
  custom:
    enabled: true
    api_endpoint: "http://localhost:8080/statusline"
    format_template: "{timestamp} | {burn_rate} | {custom_metrics}"
    update_method: "webhook"  # Options: webhook, polling, file_watch

# Advanced Visual Burn Rate Configuration
burn_rate_advanced:
  # Calculation methods
  calculation:
    method: "weighted_average"  # Options: average, weighted_average, max, adaptive
    weights:
      cpu: 0.4
      memory: 0.3
      disk_io: 0.2
      network: 0.1

    smoothing:
      enabled: true
      window_size: 5  # Number of samples to smooth over
      algorithm: "exponential"  # Options: simple, exponential, gaussian

  # Animation and transitions
  animation:
    enabled: true
    transition_duration: 200  # milliseconds
    easing: "ease-in-out"

    effects:
      pulse_on_critical: true
      fade_transitions: true
      color_interpolation: true

  # Alert system
  alerts:
    enabled: true

    critical_threshold_alert:
      enabled: true
      action: "notify"  # Options: notify, beep, flash, script
      script_path: ""
      cooldown: 30000  # milliseconds between alerts

    sustained_high_load:
      enabled: true
      threshold: 85
      duration: 10000  # milliseconds
      action: "notify"

# Logging and debugging
logging:
  enabled: false
  level: "info"  # Options: debug, info, warn, error
  file_path: "/tmp/statusline.log"
  max_size: "10MB"
  rotate: true

# Performance optimization
performance:
  cache_enabled: true
  cache_duration: 500  # milliseconds
  lazy_loading: true
  background_updates: true
  resource_limits:
    max_memory: "50MB"
    max_cpu_percent: 5

# User customization overrides
user_overrides:
  # Users can override any configuration by creating ~/.statuslinerc
  # Format: YAML or JSON
  config_file_paths:
    - "~/.statuslinerc"
    - "~/.config/statusline/config.yaml"
    - "/etc/statusline/config.yaml"

  # Environment variables for quick overrides
  env_prefix: "STATUSLINE_"

  # Examples:
  # STATUSLINE_BURN_RATE_ENABLED=false
  # STATUSLINE_UPDATE_INTERVAL=2000
  # STATUSLINE_THEME=minimal

# Themes and presets
themes:
  default:
    name: "Default"
    colors:
      background: "#333333"
      foreground: "#ffffff"
      accent: "#5eacd3"

  minimal:
    name: "Minimal"
    global:
      visual_burn_rate:
        indicators:
          style: "dots"
          width: 5
    environments:
      vim:
        format: "{file} | {burn_rate} | {line_col}"

  powerline:
    name: "Powerline Style"
    fonts:
      primary: "Powerline"
    environments:
      vim:
        format: " {mode}  {file} {modified}  {burn_rate}  {line_col}  {time} "

  developer:
    name: "Developer Focus"
    global:
      visual_burn_rate:
        metrics:
          cpu_enabled: true
          memory_enabled: true
          disk_io_enabled: true
          network_enabled: true

# Integration hooks
hooks:
  pre_update: ""     # Script to run before updating statusline
  post_update: ""    # Script to run after updating statusline
  on_critical: ""    # Script to run when burn rate hits critical
  on_recovery: ""    # Script to run when burn rate returns to normal