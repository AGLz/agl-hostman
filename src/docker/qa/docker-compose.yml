version: '3.8'

services:
  app:
    image: harbor.aglz.io:5000/agl-hostman-qa/agl-hostman:latest
    container_name: agl-hostman-qa
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=qa
      - APP_DEBUG=true
      - APP_URL=https://qa-agl.aglz.io
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=agl_hostman_qa
      - DB_USERNAME=agl_hostman
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - MAIL_MAILER=log
      - LOG_CHANNEL=stack
      - LOG_LEVEL=info
      # Dokploy
      - DOKPLOY_API_URL=http://192.168.0.180:3000
      - DOKPLOY_API_TOKEN=${DOKPLOY_API_TOKEN}
      # Harbor
      - HARBOR_REGISTRY=harbor.aglz.io:5000
      - HARBOR_USERNAME=${HARBOR_USERNAME}
      - HARBOR_PASSWORD=${HARBOR_PASSWORD}
      # GitHub
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_WEBHOOK_ENABLED=true
      # Deployment
      - DEPLOYMENT_TIMEOUT=300
      - DEPLOYMENT_ROLLBACK_ON_FAILURE=true
      - DEPLOYMENT_RUN_TESTS=true
    volumes:
      - app-storage:/var/www/html/storage
      - app-logs:/var/www/html/storage/logs
    ports:
      - "8081:80"
    networks:
      - qa-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4096M
        reservations:
          cpus: '1'
          memory: 2048M

  postgres:
    image: postgres:16-alpine
    container_name: agl-hostman-qa-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agl_hostman_qa
      - POSTGRES_USER=agl_hostman
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - qa-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - qa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agl_hostman -d agl_hostman_qa"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 1024M

  redis:
    image: redis:7-alpine
    container_name: agl-hostman-qa-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - qa-redis-data:/data
    ports:
      - "6380:6379"
    networks:
      - qa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Optional: Nginx reverse proxy (if not using Dokploy's built-in)
  # nginx:
  #   image: nginx:alpine
  #   container_name: agl-hostman-qa-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - qa-network
  #   depends_on:
  #     - app

networks:
  qa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  qa-db-data:
    driver: local
  qa-redis-data:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local
