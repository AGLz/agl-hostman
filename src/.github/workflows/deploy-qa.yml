name: Deploy to QA

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        type: boolean
        default: false
      skip_cache:
        description: 'Skip build cache for clean build'
        required: false
        type: boolean
        default: false

env:
  HARBOR_REGISTRY: harbor.aglz.io:5000
  HARBOR_PROJECT: agl-hostman-qa
  IMAGE_NAME: agl-hostman
  DOKPLOY_URL: https://dok.aglz.io
  # Cache configuration
  COMPOSER_CACHE_VERSION: v1
  NPM_CACHE_VERSION: v1
  DOCKER_CACHE_VERSION: v1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################
      # Cache Configuration (Phase 4.1)
      #############################################
      # Multi-layer caching strategy for maximum build speed
      # Expected improvement: 75%+ reduction in build time

      - name: Cache Composer dependencies
        if: inputs.skip_cache != true
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ env.COMPOSER_CACHE_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ env.COMPOSER_CACHE_VERSION }}-
            ${{ runner.os }}-composer-

      - name: Cache NPM dependencies
        if: inputs.skip_cache != true
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            .vite
          key: ${{ runner.os }}-node-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NPM_CACHE_VERSION }}-
            ${{ runner.os }}-node-

      - name: Cache Docker layers
        if: inputs.skip_cache != true
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.DOCKER_CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ env.DOCKER_CACHE_VERSION }}-
            ${{ runner.os }}-buildx-

      #############################################
      # Build Environment Setup
      #############################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Login to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "version=qa-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Display cache status
        run: |
          echo "=== Build Cache Status ==="
          echo "Composer cache: ${{ steps.cache-composer.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}"
          echo "NPM cache: ${{ steps.cache-npm.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}"
          echo "Docker cache: ${{ steps.cache-docker.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}"
          echo "Skip cache: ${{ inputs.skip_cache }}"
          echo "=========================="

      #############################################
      # Optimized Docker Build (Multi-Stage + Cache)
      #############################################

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:qa-latest
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=AGL Infrastructure Management - QA
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.branch=${{ steps.meta.outputs.branch }}
          # Multi-layer caching strategy
          cache-from: |
            type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha
          cache-to: |
            type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
            type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
            BUILDKIT_INLINE_CACHE=1
          # Enable BuildKit features
          provenance: false
          sbom: false

      - name: Display build metrics
        run: |
          echo "=== Build Metrics ==="
          echo "Image digest: ${{ steps.docker_build.outputs.digest }}"
          echo "Build time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Image tags:"
          echo "  - ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "  - ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:qa-latest"
          echo "===================="

      #############################################
      # Deployment to Dokploy
      #############################################

      - name: Trigger Dokploy deployment
        id: deploy
        run: |
          echo "Triggering Dokploy deployment..."

          RESPONSE=$(curl -X POST "${{ env.DOKPLOY_URL }}/api/deploy/webhook" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "agl-hostman-qa",
              "tag": "${{ steps.meta.outputs.version }}",
              "branch": "${{ steps.meta.outputs.branch }}",
              "commit": "${{ github.sha }}"
            }' \
            -w "\n%{http_code}" \
            -s)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Deployment trigger failed with code $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deployment triggered successfully"
          echo "deployment_triggered=true" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        if: steps.deploy.outputs.deployment_triggered == 'true'
        run: |
          echo "Waiting for deployment to complete..."
          echo "Initial wait: 120 seconds for container startup"
          sleep 120

          MAX_ATTEMPTS=30
          ATTEMPT=0
          WAIT_INTERVAL=10

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" https://qa-agl.aglz.io/api/health)

            if [ "$HEALTH_CHECK" = "200" ]; then
              echo "✅ Deployment successful! Application is healthy."
              echo "Total wait time: $((120 + ATTEMPT * WAIT_INTERVAL)) seconds"
              exit 0
            fi

            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: Health check returned $HEALTH_CHECK"
            ATTEMPT=$((ATTEMPT + 1))
            sleep $WAIT_INTERVAL
          done

          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          echo "Total wait time: $((120 + MAX_ATTEMPTS * WAIT_INTERVAL)) seconds"
          exit 1

      #############################################
      # Integration Tests
      #############################################

      - name: Run integration tests
        if: success() || inputs.force_deploy
        run: |
          echo "Running integration tests against QA environment..."

          # Health check test
          HEALTH_RESPONSE=$(curl -s https://qa-agl.aglz.io/api/health)
          echo "Health Response: $HEALTH_RESPONSE"

          if echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed"
            if [ "${{ inputs.force_deploy }}" != "true" ]; then
              exit 1
            fi
          fi

          # API version test
          VERSION_RESPONSE=$(curl -s https://qa-agl.aglz.io/api/version)
          echo "Version Response: $VERSION_RESPONSE"

          # Database connectivity test (if endpoint exists)
          DB_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://qa-agl.aglz.io/api/health/database)
          echo "Database Health: $DB_RESPONSE"

          if [ "$DB_RESPONSE" = "200" ]; then
            echo "✅ Database connectivity verified"
          else
            echo "⚠️ Database health check unavailable or failed (non-critical)"
          fi

          echo "✅ All integration tests passed"

      #############################################
      # Performance Metrics Collection
      #############################################

      - name: Collect performance metrics
        if: success()
        run: |
          echo "=== Performance Metrics ==="

          # Response time test
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" https://qa-agl.aglz.io/api/health)
          echo "Health endpoint response time: ${RESPONSE_TIME}s"

          # Image size
          IMAGE_SIZE=$(docker manifest inspect ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} 2>/dev/null | jq -r '.config.size // 0' || echo "N/A")
          echo "Docker image size: ${IMAGE_SIZE} bytes"

          # Build duration (approximate from workflow)
          echo "Build completed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "============================"

      #############################################
      # Notifications & Reporting
      #############################################

      - name: Send notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            QA Deployment ${{ job.status }}
            Version: ${{ steps.meta.outputs.version }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ steps.meta.outputs.branch }}
            Cache Status:
              - Composer: ${{ steps.cache-composer.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}
              - NPM: ${{ steps.cache-npm.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}
              - Docker: ${{ steps.cache-docker.outputs.cache-hit == 'true' && '✅ HIT' || '❌ MISS' }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create deployment record
        if: success()
        run: |
          echo "=== Deployment Summary ==="
          echo "✅ Deployment successful!"
          echo "Version: ${{ steps.meta.outputs.version }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ steps.meta.outputs.branch }}"
          echo "Deployed to: https://qa-agl.aglz.io"
          echo "Harbor Image: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "Image Digest: ${{ steps.docker_build.outputs.digest }}"
          echo "Build Date: ${{ steps.meta.outputs.build_date }}"
          echo "=========================="

      #############################################
      # Cache Cleanup (Optional)
      #############################################

      - name: Cleanup old cache entries
        if: success()
        continue-on-error: true
        run: |
          echo "Cache cleanup runs automatically via GitHub Actions cache eviction policy"
          echo "Caches older than 7 days are automatically removed"
          echo "Current cache keys in use:"
          echo "  - Composer: composer-${{ env.COMPOSER_CACHE_VERSION }}-${{ hashFiles('**/composer.lock') }}"
          echo "  - NPM: node-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}"
          echo "  - Docker: buildx-${{ env.DOCKER_CACHE_VERSION }}-${{ github.sha }}"

  #############################################
  # Rollback Job (on failure)
  #############################################

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: build-and-deploy

    steps:
      - name: Rollback deployment
        run: |
          echo "⚠️ Deployment failed, initiating rollback..."

          # Trigger rollback via Dokploy API
          ROLLBACK_RESPONSE=$(curl -X POST "${{ env.DOKPLOY_URL }}/api/deploy/rollback" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "agl-hostman-qa",
              "reason": "Automated rollback due to deployment failure"
            }' \
            -w "\n%{http_code}" \
            -s)

          HTTP_CODE=$(echo "$ROLLBACK_RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Rollback triggered successfully"
          else
            echo "❌ Rollback failed, manual intervention required"
            echo "HTTP Code: $HTTP_CODE"
            exit 1
          fi

      - name: Verify rollback
        run: |
          echo "Waiting for rollback to complete..."
          sleep 60

          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" https://qa-agl.aglz.io/api/health)

          if [ "$HEALTH_CHECK" = "200" ]; then
            echo "✅ Application restored and healthy after rollback"
          else
            echo "⚠️ Application health check failed after rollback"
            echo "Manual verification required at https://qa-agl.aglz.io"
          fi

#############################################
# Workflow Performance Notes
#############################################
# Phase 4.1 Optimizations Applied:
# 1. Multi-layer GitHub Actions cache (Composer, NPM, Docker)
# 2. Registry cache for Docker BuildKit (persistent across runners)
# 3. GitHub Actions cache with restore-keys for partial matches
# 4. Cache versioning for controlled invalidation
# 5. BuildKit inline cache for layer reuse
#
# Expected Performance Improvements:
# - First run (cold cache): ~8-12 minutes
# - Subsequent runs (warm cache): ~2-3 minutes (75%+ improvement)
# - No code changes (full cache): ~30-60 seconds (90%+ improvement)
#
# Cache Invalidation Strategy:
# - composer.lock change: Invalidates Composer cache
# - package-lock.json change: Invalidates NPM cache
# - Dockerfile change: Invalidates Docker layer cache
# - Manual: Set skip_cache=true in workflow dispatch
