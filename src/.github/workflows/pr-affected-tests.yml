name: PR - Affected Tests Only

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'tests/**'

jobs:
  detect-affected-tests:
    name: Detect Affected Tests
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.detect.outputs.run_tests }}
      affected_count: ${{ steps.detect.outputs.affected_count }}
      total_count: ${{ steps.detect.outputs.total_count }}
      reduction_pct: ${{ steps.detect.outputs.reduction_pct }}
      unit_tests: ${{ steps.detect.outputs.unit_tests }}
      feature_tests: ${{ steps.detect.outputs.feature_tests }}
      integration_tests: ${{ steps.detect.outputs.integration_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect affected tests
        id: detect
        env:
          BASE_BRANCH: origin/${{ github.base_ref }}
          VERBOSE: 'true'
        run: |
          chmod +x scripts/detect-affected-tests.sh
          ./scripts/detect-affected-tests.sh

          # Read outputs
          source affected-tests.txt

          echo "run_tests=$RUN_TESTS" >> $GITHUB_OUTPUT
          echo "affected_count=$AFFECTED_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          echo "reduction_pct=$REDUCTION_PCT" >> $GITHUB_OUTPUT

          # Extract test lists (handle multiline)
          echo "unit_tests=$UNIT_TESTS" >> $GITHUB_OUTPUT
          echo "feature_tests=$FEATURE_TESTS" >> $GITHUB_OUTPUT
          echo "integration_tests=$INTEGRATION_TESTS" >> $GITHUB_OUTPUT

      - name: Comment PR with test summary
        uses: actions/github-script@v7
        with:
          script: |
            const runTests = '${{ steps.detect.outputs.run_tests }}';
            const affectedCount = '${{ steps.detect.outputs.affected_count }}';
            const totalCount = '${{ steps.detect.outputs.total_count }}';
            const reductionPct = '${{ steps.detect.outputs.reduction_pct }}';

            let body = '## 🧪 Affected Tests Detection\n\n';

            if (runTests === 'false') {
              body += '✅ **No tests affected** - Changes do not impact test coverage\n';
            } else {
              body += `📊 **Test Optimization**\n`;
              body += `- Running: **${affectedCount}** tests (out of ${totalCount} total)\n`;
              body += `- Reduction: **${reductionPct}%** faster execution\n`;
              body += `- Estimated time savings: ~${Math.round(reductionPct * 0.6)}s\n\n`;
              body += `This PR will run only the tests affected by your changes. `;
              body += `The full test suite will run after merge to ${context.payload.pull_request.base.ref}.`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload affected tests list
        uses: actions/upload-artifact@v4
        with:
          name: affected-tests
          path: affected-tests.txt
          retention-days: 7

  run-affected-tests:
    name: Run Affected Tests
    needs: detect-affected-tests
    if: needs.detect-affected-tests.outputs.run_tests == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test-suite: [unit, feature]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, redis, pcov
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Download affected tests
        uses: actions/download-artifact@v4
        with:
          name: affected-tests

      - name: Run unit tests
        if: matrix.test-suite == 'unit' && needs.detect-affected-tests.outputs.unit_tests != ''
        run: |
          TESTS="${{ needs.detect-affected-tests.outputs.unit_tests }}"
          if [ -n "$TESTS" ]; then
            vendor/bin/phpunit --testsuite=Unit --filter="$(echo $TESTS | tr ' ' '|')" --coverage-clover=coverage-unit.xml
          else
            echo "No unit tests affected"
          fi

      - name: Run feature tests
        if: matrix.test-suite == 'feature' && needs.detect-affected-tests.outputs.feature_tests != ''
        run: |
          TESTS="${{ needs.detect-affected-tests.outputs.feature_tests }}"
          if [ -n "$TESTS" ]; then
            vendor/bin/phpunit --testsuite=Feature --filter="$(echo $TESTS | tr ' ' '|')" --coverage-clover=coverage-feature.xml
          else
            echo "No feature tests affected"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-${{ matrix.test-suite }}.xml
          flags: affected-${{ matrix.test-suite }}
          name: affected-${{ matrix.test-suite }}

  full-suite-required:
    name: Full Suite Reminder
    needs: run-affected-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Comment about full suite
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 📝 Note: Full Test Suite\n\n` +
              `This PR ran only affected tests for faster feedback. ` +
              `The **complete test suite** will automatically run when merged to ` +
              `\`${context.payload.pull_request.base.ref}\`.\n\n` +
              `To manually run the full suite before merging, add the label \`run-full-tests\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
