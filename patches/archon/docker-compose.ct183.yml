# CT183 — Archon v0.4 (prod) override
# Uso: docker compose -f docker-compose.yml -f docker-compose.ct183.yml --profile with-db up -d
services:
  app:
    image: ghcr.io/coleam00/archon:latest
    build: !reset null
    ports:
      - "0.0.0.0:${PORT:-3000}:${PORT:-3000}"
    environment:
      ARCHON_DOCKER: "true"
    volumes:
      - ${ARCHON_DATA:-/opt/archon-data}:/.archon
      - ${ARCHON_USER_HOME:-/opt/archon-user-home}:/home/appuser

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
