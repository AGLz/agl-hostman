# agl-hostman — produção CT134 (pull Harbor; gerido por Dokploy ou compose local)
# Imagem: harbor.aglz.io/agl-hostman-prod/hostman:prod-latest

services:
  app:
    image: ${IMAGE:-harbor.aglz.io/agl-hostman-prod/hostman:prod-latest}
    container_name: agl-hostman-prod-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
      - /var/log/hostman:/var/log/hostman:ro
    networks:
      - agl-prod
    ports:
      - "80:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1/health || curl -sf http://127.0.0.1/up",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  horizon:
    image: ${IMAGE:-harbor.aglz.io/agl-hostman-prod/hostman:prod-latest}
    container_name: agl-hostman-prod-horizon
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
      - /var/log/hostman:/var/log/hostman:ro
    networks:
      - agl-prod
    depends_on:
      app:
        condition: service_started
    # ponytail: imagem herda HEALTHCHECK HTTP (nginx) — inválido sem porta 80
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  scheduler:
    image: ${IMAGE:-harbor.aglz.io/agl-hostman-prod/hostman:prod-latest}
    container_name: agl-hostman-prod-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
      - /var/log/hostman:/var/log/hostman:ro
    networks:
      - agl-prod
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:run' >/dev/null || pgrep -x sleep >/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  agl-prod:
    driver: bridge

volumes:
  app-storage:
  app-bootstrap-cache:
