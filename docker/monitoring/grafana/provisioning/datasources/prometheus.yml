# Grafana Datasource Provisioning - Prometheus
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
      exemplarTraceIdDestinations:
        - datasourceUid: jaeger
          name: trace_id
    version: 1

  - name: Prometheus-Long-Term
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_LT_URL:-http://prometheus-lt:9090}
    editable: true
    jsonData:
      timeInterval: "1m"
      queryTimeout: "120s"
      httpMethod: "POST"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger-all-in-one:16686
    editable: true
    uid: jaeger
    jsonData:
      tracesToLogs:
        datasourceUid: 'Loki'
        filterByTraceID: true
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: job
      tracesToMetrics:
        datasourceUid: 'Prometheus'
        tags:
          - key: service.name
            value: job
        queries:
          - name: Sample query
            query: 'sum(rate(http_requests_total{trace_id="$${__trace.traceID}"}[5m]))'
