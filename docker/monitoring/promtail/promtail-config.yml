# Promtail Configuration
# AGL Hostman - Log Collection Agent

server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Position file for tracking read logs
positions:
  filename: /tmp/positions.yaml

# Loki client configuration
client:
  url: http://loki:3100/loki/api/v1/push
  batch_wait: 1s
  batch_size: 102400
  timeout: 10s
  backoff_config:
    min_period: 100ms
    max_period: 5s
    max_retries: 20

  # External labels for all logs
  external_labels:
    cluster: 'agl-hostman'
    environment: '${ENVIRONMENT:-development}'

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Application Logs - Laravel
  # ============================================================================
  - job_name: laravel-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          service: api
          tier: application
          __path__: /var/log/laravel/*.log

    # Pipeline for parsing Laravel logs
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            timestamp: time
            level: level
            message: message
            user_id: user_id
            request_id: request_id

      # Add labels
      - labels:
          level:
          user_id:
          request_id:

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

      # Regex parsing for non-JSON logs
      - regex:
          expression: '^\[(?P<timestamp>.*)\] (?P<level>\w+).*(?P<message>.*)'

      # Filter out debug logs
      - filter:
          expression: 'level != "debug"'

  # ============================================================================
  # Nginx Access Logs
  # ============================================================================
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          type: access
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      # Parse nginx access log format
      - regex:
          expression: '(?P<remote_addr>[\w\.]+) - (?P<remote_user>\S+) \[(?P<timestamp>.*)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_size>\d+) "(?P<referer>.*)" "(?P<user_agent>.*)"'

      # Create labels
      - labels:
          method:
          status:
          remote_addr:

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: '02/Jan/2006:15:04:05 -0700'

      # Convert status to number
      - labels:
          status:
          source: status

  # ============================================================================
  # Nginx Error Logs
  # ============================================================================
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          type: error
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)'

      - labels:
          level:

      - timestamp:
          source: timestamp
          format: '2006/01/02 15:04:05'

  # ============================================================================
  # Database Logs - PostgreSQL
  # ============================================================================
  - job_name: postgresql-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql
          service: database
          tier: database
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+) \[(?P<pid>\d+)\] (?P<level>\w+):\s+(?P<message>.*)'

      - labels:
          level:
          pid:

      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'

  # ============================================================================
  # Redis Logs
  # ============================================================================
  - job_name: redis-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: cache
          tier: cache
          __path__: /var/log/redis/*.log

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d+ [A-Z][a-z]{2} \d{2}:\d{2}:\d{2}\.\d+) (?P<level>\w+) (?P<message>.*)'

      - labels:
          level:

  # ============================================================================
  # Queue Logs - Laravel Horizon
  # ============================================================================
  - job_name: horizon-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: horizon
          service: queue
          tier: queue
          __path__: /var/log/horizon/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level_name
            message: message
            job: job
            queue: queue
            status: status

      - labels:
          level:
          job:
          queue:
          status:

      - timestamp:
          source: timestamp
          format: RFC3339

  # ============================================================================
  # Container Logs (Docker)
  # ============================================================================
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=agl_hostman"]

    relabel_configs:
      # Extract container name
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name

      # Extract image name
      - source_labels: [__meta_docker_image_name]
        target_label: image_name

      # Extract service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
        regex: '(.+)'

      # Add cluster label
      - replacement: 'agl-hostman'
        target_label: cluster

      # Add environment label
      - replacement: '${ENVIRONMENT:-development}'
        target_label: environment

    pipeline_stages:
      # Parse timestamp from various formats
      - timestamp:
          source: time
          format: RFC3339
          fallback_on_failure: true

      # Extract log level if present
      - regex:
          expression: '(?P<level>ERROR|WARN|INFO|DEBUG|TRACE)'
          source: output

      - labels:
          level:

      # Clean up output
      - output:
          source: output

  # ============================================================================
  # System Logs (journald)
  # ============================================================================
  - job_name: system-logs
    journal:
      max_age: 12h
      labels:
        job: systemd
        tier: system
      matches:
        - '_SYSTEMD_UNIT=docker.service'
        - '_SYSTEMD_UNIT=nginx.service'
        - '_SYSTEMD_UNIT=postgresql.service'

    relabel_configs:
      - source_labels: [__journal__hostname]
        target_label: hostname

      - source_labels: [__journal_systemd_unit]
        target_label: unit

      - source_labels: [__journal_priority_keyword]
        target_label: level

      - replacement: 'agl-hostman'
        target_label: cluster

  # ============================================================================
  # Application Error Logs Only
  # ============================================================================
  - job_name: application-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: errors
          __path__: /var/log/**/*.log

    pipeline_stages:
      # Only keep error logs
      - filter:
          expression: '(?s).*ERROR|.*CRITICAL|.*FATAL.*'

      # Add alert label
      - labels:
          alert: "true"

      # Extract error details
      - regex:
          expression: '.*(?P<error_type>Exception|Error|Fatal): (?P<error_message>.*)'

      - labels:
          error_type:
          error_message:

  # ============================================================================
  # Audit Logs
  # ============================================================================
  - job_name: audit-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: audit
          type: security
          __path__: /var/log/audit/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: '@timestamp'
            user: user.name
            action: event.action
            resource: resource.name
            outcome: event.outcome

      - labels:
          user:
          action:
          resource:
          outcome:

      - timestamp:
          source: timestamp
          format: RFC3339

# Global relabel configuration
global_relabel_configs:
  # Add datacenter label
  - source_labels: []
    replacement: '${DATACENTER:-default}'
    target_label: datacenter

  # Add region label
  - source_labels: []
    replacement: '${REGION:-default}'
    target_label: region

  # Strip sensitive data
  - regex:
      expression: '(password|api_key|secret|token)=(.*)'
      replacement: '${1}=[REDACTED]'

# Target configuration
target_config:
  sync_period: 10s
