# CouchDB para Obsidian Self-hosted LiveSync (CT193 agl-obsidian).
# Uso: cp .env.example .env && docker compose -f docker-compose.couchdb.yml up -d
services:
  couchdb:
    image: couchdb:3.4.2
    container_name: agl-obsidian-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-obsidian}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?definir COUCHDB_PASSWORD em .env}
    volumes:
      - ${COUCHDB_DATA_DIR:-/var/lib/agl-obsidian/couchdb}:/opt/couchdb/data
    ports:
      - "${COUCHDB_BIND:-127.0.0.1}:5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
