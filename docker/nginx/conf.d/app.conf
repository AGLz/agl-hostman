# Map to detect Cloudflare/HTTPS upstream
map $http_x_forwarded_proto $is_https_upstream {
    default 0;
    "https" 1;
}

# HTTP server — used by Cloudflare Tunnel
server {
    listen 80;
    listen [::]:80;
    server_name ah.aglz.io localhost;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 40M;

    # Cloudflare sends X-Forwarded-Proto: https — serve content directly
    # Direct HTTP access redirects to HTTPS
    location / {
        if ($is_https_upstream) {
            # Already HTTPS upstream — serve content via PHP
            rewrite ^ /index.php?$query_string last;
        }

        # Direct HTTP access — redirect to HTTPS
        return 301 https://$host$request_uri;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600;
        fastcgi_param HTTPS $https;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param SERVER_PORT $server_port;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
        expires 30d;
    }
}

# HTTPS server — direct access
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ah.aglz.io localhost;
    http2 on;

    ssl_certificate /etc/nginx/ssl/ah.aglz.io.crt;
    ssl_certificate_key /etc/nginx/ssl/ah.aglz.io.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 40M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param SERVER_PORT 443;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
        expires 30d;
    }
}
