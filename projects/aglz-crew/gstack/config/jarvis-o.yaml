# GStack Configuration for Jarvis O (OpenClaw)
# CT-203 - CEO/COO Executive Agent

agent:
  name: "Jarvis O"
  codename: "OpenClaw"
  role: "CEO/COO"
  ct_id: "CT-203"
  ip: "192.168.0.203"
  version: "1.0.0-aglz"
  
  # Persona Configuration
  persona:
    base: "satya_nadella_tim_cook"
    traits:
      - "transformative_leadership"
      - "operational_excellence"
      - "empathy_driven"
      - "growth_mindset"
    
browser:
  engine: "chromium"
  headless: true
  viewport:
    width: 1920
    height: 1080
  
  launch_options:
    args:
      - "--no-sandbox"
      - "--disable-setuid-sandbox"
      - "--disable-dev-shm-usage"
      - "--disable-gpu"
    
  pool:
    min_pages: 1
    max_pages: 5
    timeout: 30000

server:
  port_range:
    min: 10000
    max: 60000
  idle_timeout: 1800000  # 30 minutes
  state_file: ".gstack/browse.json"
  
a2a:
  enabled: true
  port: 8080
  protocol: "http"
  
  peers:
    - id: "jarvis-h"
      name: "Jarvis H (Hermes)"
      endpoint: "http://192.168.0.204:8080"
      role: "cpo_cro"
      ct_id: "CT-204"
      
    - id: "agl-crew"
      name: "AGLz Crew"
      endpoint: "http://192.168.0.205:8080"
      role: "scrum_teams"
      ct_id: "CT-205"

skills:
  enabled:
    - browse
    - qa
    - ship
    - investigate
    - checkpoint
    
  config:
    browse:
      default_viewport: "1920x1080"
      screenshot_dir: "/var/lib/gstack/screenshots"
      
    qa:
      test_timeout: 30000
      screenshot_on_failure: true

logging:
  level: "info"
  format: "json"
  output: "file"
  file: "/var/log/gstack/browser.log"
  max_size: "100MB"
  max_files: 10

paths:
  home: "/opt/gstack"
  config: "/etc/gstack"
  data: "/var/lib/gstack"
  logs: "/var/log/gstack"
  temp: "/tmp/gstack"
