<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 Callback - AGL Hostman API Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .icon.error {
            background: #ef4444;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 0.625rem 1.25rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <h1>Processing OAuth2 Callback</h1>
            <p>Please wait while we process your authentication...</p>
        </div>
        <div id="success" style="display: none;">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h1>Authentication Successful</h1>
            <p>You can close this window and return to the API Explorer.</p>
            <a href="./" class="btn">Return to API Explorer</a>
        </div>
        <div id="error" style="display: none;">
            <div class="icon error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <h1>Authentication Failed</h1>
            <p id="error-message">An error occurred during authentication.</p>
            <a href="./" class="btn">Return to API Explorer</a>
        </div>
    </div>

    <script>
        (function() {
            const loading = document.getElementById('loading');
            const success = document.getElementById('success');
            const error = document.getElementById('error');
            const errorMessage = document.getElementById('error-message');

            // Get URL parameters
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const errorParam = params.get('error');
            const errorDescription = params.get('error_description');

            // Handle error response
            if (errorParam) {
                loading.style.display = 'none';
                error.style.display = 'block';
                errorMessage.textContent = errorDescription || errorParam;
                return;
            }

            // Handle successful response
            if (code && state) {
                // Store OAuth data for parent window
                sessionStorage.setItem('oauth_code', code);
                sessionStorage.setItem('oauth_state', state);

                // Try to notify parent window
                try {
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'oauth2_callback',
                            code: code,
                            state: state
                        }, window.location.origin);
                    }
                } catch (e) {
                    console.error('Failed to notify parent window:', e);
                }

                // Show success message
                loading.style.display = 'none';
                success.style.display = 'block';

                // Auto-close after 3 seconds
                setTimeout(() => {
                    window.close();
                }, 3000);

                return;
            }

            // No valid parameters
            loading.style.display = 'none';
            error.style.display = 'block';
            errorMessage.textContent = 'Invalid OAuth2 callback parameters.';
        })();
    </script>
</body>
</html>
