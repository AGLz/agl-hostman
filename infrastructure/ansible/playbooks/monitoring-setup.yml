---
# Monitoring stack setup with Prometheus, Grafana, and exporters
# Deploys comprehensive monitoring for AGL infrastructure

- name: Deploy monitoring stack
  hosts: monitoring_servers
  become: true

  vars:
    # Version configuration
    prometheus_version: "2.48.0"
    grafana_version: "10.2.2"
    alertmanager_version: "0.26.0"
    loki_version: "2.9.4"
    promtail_version: "2.9.4"

    # Port configuration
    prometheus_port: 9090
    grafana_port: 3000
    alertmanager_port: 9093
    loki_port: 3100
    promtail_port: 9080

    # Storage paths
    monitoring_data_dir: /opt/monitoring/data
    monitoring_config_dir: /opt/monitoring/config

    # Retention
    prometheus_retention: "30d"
    loki_retention: "30d"

    # Credentials
    grafana_admin_password: "{{ vault_grafana_password | default('admin123') }}"

  tasks:
    - name: Create monitoring directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - "{{ monitoring_data_dir }}/prometheus"
        - "{{ monitoring_data_dir }}/grafana"
        - "{{ monitoring_data_dir }}/alertmanager"
        - "{{ monitoring_data_dir }}/loki"
        - "{{ monitoring_config_dir }}/prometheus"
        - "{{ monitoring_config_dir }}/grafana"
        - "{{ monitoring_config_dir }}/alertmanager"
        - "{{ monitoring_config_dir }}/loki"

    - name: Create Prometheus configuration
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/prometheus/prometheus.yml"
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
            external_labels:
              cluster: 'agl-production'
              replica: 'primary'

          # Alertmanager configuration
          alerting:
            alertmanagers:
              - static_configs:
                  - targets:
                      - 'localhost:{{ alertmanager_port }}'

          # Rule files
          rule_files:
              - "alerts/*.yml"

          # Scrape configurations
          scrape_configs:
            # Prometheus self-monitoring
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:{{ prometheus_port }}']
              relabel_configs:
                - source_labels: [job]
                  target_label: environment
                  replacement: 'production'

            # Alertmanager
            - job_name: 'alertmanager'
              static_configs:
                - targets: ['localhost:{{ alertmanager_port }}']

            # Node Exporter (system metrics)
            - job_name: 'node'
              static_configs:
                - targets:
                    - 'AGLSRV1:9100'
                    - 'AGLSRV6:9100'
              relabel_configs:
                - source_labels: [address]
                  target_label: instance
                  regex: '(.*):.*'
                  replacement: '${1}'

            # cAdvisor (container metrics)
            - job_name: 'cadvisor'
              static_configs:
                - targets: ['localhost:9325']

            # Proxmox Exporter
            - job_name: 'proxmox'
              static_configs:
                - targets: ['AGLSRV1:9221']
              relabel_configs:
                - source_labels: [__address__]
                  target_label: __param_module
                  replacement: 'default'

            # Grafana
            - job_name: 'grafana'
              static_configs:
                - targets: ['localhost:{{ grafana_port }}']

            # Loki
            - job_name: 'loki'
              static_configs:
                - targets: ['localhost:{{ loki_port }}']

            # Application-specific jobs
            - job_name: 'agl-hostman-api'
              static_configs:
                - targets: ['app-server:8000']
              metrics_path: '/metrics'
              scrape_interval: 30s

            - job_name: 'harbor-registry'
              static_configs:
                - targets: ['harbor.aglz.io']
              metrics_path: '/api/v2.0/metrics'
      notify: Restart Prometheus

    - name: Create Prometheus alert rules
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/prometheus/alerts/infrastructure.yml"
        content: |
          groups:
            - name: infrastructure_alerts
              interval: 30s
              rules:
                # Node alerts
                - alert: NodeDown
                  expr: up{job="node"} == 0
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Node {{ $labels.instance }} is down"
                    description: "Node {{ $labels.instance }} has been down for more than 5 minutes"

                - alert: HighCPUUsage
                  expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
                  for: 10m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High CPU usage on {{ $labels.instance }}"
                    description: "CPU usage is {{ $value }}%"

                - alert: HighMemoryUsage
                  expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
                  for: 10m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High memory usage on {{ $labels.instance }}"
                    description: "Memory usage is {{ $value }}%"

                - alert: DiskSpaceLow
                  expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
                  for: 10m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Low disk space on {{ $labels.instance }}"
                    description: "Disk space is below 20% on {{ $labels.device }}"

                # Container alerts
                - alert: ContainerDown
                  expr: up{job=~".*container.*"} == 0
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Container {{ $labels.name }} is down"

                # Proxmox alerts
                - alert: ProxmoxVMDown
                  expr: proxmox_vm_status_running == 0
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Proxmox VM {{ $labels.vm_name }} is down"

                - alert: ProxmoxLXCDown
                  expr: proxmox_lxc_status_running == 0
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Proxmox LXC {{ $labels.ct_name }} is down"

                # Application alerts
                - alert: HighErrorRate
                  expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 5
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: "High error rate on {{ $labels.job }}"
                    description: "Error rate is {{ $value }}%"
      notify: Restart Prometheus

    - name: Create Alertmanager configuration
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/alertmanager/alertmanager.yml"
        content: |
          global:
            resolve_timeout: 5m

          # Route configuration
          route:
            group_by: ['alertname', 'cluster', 'service']
            group_wait: 10s
            group_interval: 10s
            repeat_interval: 12h
            receiver: 'default'
            routes:
              - match:
                  severity: critical
                receiver: 'critical'
                continue: true
              - match:
                  severity: warning
                receiver: 'warning'

          # Receivers
          receivers:
            - name: 'default'
              webhook_configs:
                - url: 'http://localhost:8080/webhook'

            - name: 'critical'
              webhook_configs:
                - url: 'http://localhost:8080/critical'
              email_configs:
                - to: 'oncall@agl.local'
                  from: 'alertmanager@agl.local'
                  smarthost: 'localhost:25'

            - name: 'warning'
              webhook_configs:
                - url: 'http://localhost:8080/warning'
      notify: Restart Alertmanager

    - name: Create Loki configuration
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/loki/loki.yml"
        content: |
          auth_enabled: false

          server:
            http_listen_port: {{ loki_port }}

          ingester:
            lifecycler:
              ring:
                kvstore:
                  store: inmemory
                replication_factor: 1

          schema_config:
            configs:
              - from: 2024-01-01
                store: boltdb-shipper
                object_store: filesystem
                schema: v11
                index:
                  prefix: index_
                  period: 24h

          storage_config:
            boltdb_shipper:
              active_index_directory: /opt/monitoring/data/loki/boltdb-shipper-active
              cache_location: /opt/monitoring/data/loki/boltdb-shipper-cache
              shared_store: filesystem
            filesystem:
              directory: /opt/monitoring/data/loki/chunks

          limits_config:
            enforce_metric_name: false
            reject_old_samples: true
            reject_old_samples_max_age: 168h

          chunk_store_config:
            max_look_back_period: 0s

          table_manager:
            retention_deletes_enabled: false
            retention_period: 0s
      notify: Restart Loki

    - name: Create Grafana configuration
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/grafana/grafana.ini"
        content: |
          [server]
          http_port = {{ grafana_port }}
          root_url = https://grafana.agl.local

          [security]
          admin_user = admin
          admin_password = {{ grafana_admin_password }}

          [database]
          type = sqlite3
          path = /opt/monitoring/data/grafana/grafana.db

          [users]
          default_theme = dark

          [auth.anonymous]
          enabled = false

          [session]
          provider = file

          [log]
          mode = console
          level = info

          [metrics]
          enabled = true

          [tracing.jaeger]
          enabled = false
      notify: Restart Grafana

    - name: Create Docker Compose file
      ansible.builtin.copy:
        dest: "{{ monitoring_config_dir }}/docker-compose.yml"
        content: |
          version: '3.8'

          services:
            prometheus:
              image: prom/prometheus:v{{ prometheus_version }}
              container_name: prometheus
              ports:
                - "{{ prometheus_port }}:9090"
              volumes:
                - {{ monitoring_config_dir }}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - {{ monitoring_config_dir }}/prometheus/alerts:/etc/prometheus/alerts:ro
                - {{ monitoring_data_dir }}/prometheus:/prometheus
              command:
                - '--config.file=/etc/prometheus/prometheus.yml'
                - '--storage.tsdb.path=/prometheus'
                - '--storage.tsdb.retention.time={{ prometheus_retention }}'
                - '--web.console.libraries=/usr/share/prometheus/console_libraries'
                - '--web.console.templates=/usr/share/prometheus/consoles'
              restart: unless-stopped
              networks:
                - monitoring

            grafana:
              image: grafana/grafana:{{ grafana_version }}
              container_name: grafana
              ports:
                - "{{ grafana_port }}:3000"
              volumes:
                - {{ monitoring_data_dir }}/grafana:/var/lib/grafana
                - {{ monitoring_config_dir }}/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
              environment:
                - GF_SECURITY_ADMIN_PASSWORD={{ grafana_admin_password }}
                - GF_INSTALL_PLUGINS=grafana-piechart-panel
              restart: unless-stopped
              networks:
                - monitoring

            alertmanager:
              image: prom/alertmanager:v{{ alertmanager_version }}
              container_name: alertmanager
              ports:
                - "{{ alertmanager_port }}:9093"
              volumes:
                - {{ monitoring_config_dir }}/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
                - {{ monitoring_data_dir }}/alertmanager:/alertmanager
              command:
                - '--config.file=/etc/alertmanager/alertmanager.yml'
                - '--storage.path=/alertmanager'
              restart: unless-stopped
              networks:
                - monitoring

            loki:
              image: grafana/loki:{{ loki_version }}
              container_name: loki
              ports:
                - "{{ loki_port }}:3100"
              volumes:
                - {{ monitoring_config_dir }}/loki/loki.yml:/etc/loki/local-config.yml:ro
                - {{ monitoring_data_dir }}/loki:/loki
              command: -config.file=/etc/loki/local-config.yml
              restart: unless-stopped
              networks:
                - monitoring

            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              ports:
                - "9100:9100"
              command:
                - '--path.procfs=/host/proc'
                - '--path.sysfs=/host/sys'
                - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
              volumes:
                - /proc:/host/proc:ro
                - /sys:/host/sys:ro
                - /:/rootfs:ro
              restart: unless-stopped
              networks:
                - monitoring

            cadvisor:
              image: gcr.io/cadvisor/cadvisor:latest
              container_name: cadvisor
              ports:
                - "9325:8080"
              volumes:
                - /:/rootfs:ro
                - /var/run:/var/run:ro
                - /sys:/sys:ro
                - /var/lib/docker/:/var/lib/docker:ro
                - /dev/disk/:/dev/disk:ro
              privileged: true
              restart: unless-stopped
              networks:
                - monitoring

          networks:
            monitoring:
              driver: bridge

    - name: Deploy monitoring stack
      community.docker.docker_compose:
        project_src: "{{ monitoring_config_dir }}"
        state: present
        pull: true
        remove_orphans: true

    - name: Wait for Grafana to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ grafana_port }}/api/health"
        status_code: 200
        timeout: 5
      register: result
      until: result.status == 200
      retries: 30
      delay: 2

    - name: Add Prometheus datasource to Grafana
      ansible.builtin.uri:
        url: "http://localhost:{{ grafana_port }}/api/datasources"
        method: POST
        user: admin
        password: "{{ grafana_admin_password }}"
        body_format: json
        body:
          name: Prometheus
          type: prometheus
          access: proxy
          url: "http://prometheus:9090"
          isDefault: true
        status_code: [200, 409]  # 409 = already exists

    - name: Display monitoring stack URLs
      ansible.builtin.debug:
        msg:
          - "Prometheus: http://{{ ansible_default_ipv4.address }}:{{ prometheus_port }}"
          - "Grafana: http://{{ ansible_default_ipv4.address }}:{{ grafana_port }}"
          - "Alertmanager: http://{{ ansible_default_ipv4.address }}:{{ alertmanager_port }}"
          - "Loki: http://{{ ansible_default_ipv4.address }}:{{ loki_port }}"

  handlers:
    - name: Restart Prometheus
      community.docker.docker_container:
        name: prometheus
        state: started
        restart: true

    - name: Restart Alertmanager
      community.docker.docker_container:
        name: alertmanager
        state: started
        restart: true

    - name: Restart Loki
      community.docker.docker_container:
        name: loki
        state: started
        restart: true

    - name: Restart Grafana
      community.docker.docker_container:
        name: grafana
        state: started
        restart: true
