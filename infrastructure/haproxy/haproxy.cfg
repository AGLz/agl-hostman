# =============================================================================
# HAProxy Configuration for AGL Hostman High Availability
# =============================================================================
# Global Settings
# =============================================================================
global
    # Maximum connections
    maxconn 50000

    # Running mode
    daemon

    # Start with Log to stderr during debugging
    log stderr format raw local0 info

    # Default SSL/TLS settings
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10

    # Performance tuning
    tune.bufsize 32768
    tune.maxaccept 500

    # Stats socket for management
    stats socket /var/run/haproxy.sock mode 600 level admin

    # Runtime API
    stats timeout 2m

# =============================================================================
# Default Settings
# =============================================================================
defaults
    # Enable logging
    log global

    # Mode: http (layer 7), tcp (layer 4)
    mode http

    # Use HTTP logs with CLF format
    option httplog

    # Enable detailed HTTP logging
    option logasap

    # Don't close incomplete connections
    option dontlognull

    # Enable HTTP connection closing
    option http-server-close

    # Enable HTTP keep-alive
    option http-pretend-keepalive

    # Enable forward-for to get client IP
    option forwardfor except 127.0.0.0/8

    # Enable insertion of X-Forwarded-For
    option forwardfor header X-Forwarded-For

    # Redispatch on server failure
    option redispatch

    # Retry on connection failure
    retries 3

    # Timeout settings
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    timeout http-keep-alive 10s
    timeout check 10s
    timeout queue 60s
    timeout tunnel 1h

    # Maximum connections per backend
    maxconn 10000

    # Default error files
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# Statistics and Monitoring
# -----------------------------------------------------------------------------
# Access statistics at: http://localhost:8404/stats
# Credentials: admin / [HAPROXY_STATS_PASSWORD]
# =============================================================================
frontend stats
    bind *:8404 name stats
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats auth admin:[HAPROXY_STATS_PASSWORD]
    stats admin if TRUE

# =============================================================================
# Health Check Endpoint
# -----------------------------------------------------------------------------
# Returns 200 OK if load balancer is healthy
# =============================================================================
frontend health_check
    bind *:5555 name health
    mode http
    monitor-uri /health
    default_backend health_check_backend

backend health_check_backend
    mode http
    http-request return status 200 content-type text/plain string "OK\n"

# =============================================================================
# HTTP Frontend (Port 80) - Redirect to HTTPS
# =============================================================================
frontend http_in
    bind *:80 name http
    mode http

    # Access control lists
    acl is_health_check path -i /health
    acl is_lb_stats path_beg -i /haproxy-stats

    # Health check responses
    use_backend health_check_backend if is_health_check

    # Let's Encrypt verification
    acl is_letsencrypt path_beg -i /.well-known/acme-challenge/
    use_backend letsencrypt_backend if is_letsencrypt

    # Redirect all HTTP traffic to HTTPS
    http-request set-header X-Forwarded-Proto http
    redirect scheme https code 301 if !is_letsencrypt !is_health_check !is_lb_stats

# =============================================================================
# HTTPS Frontend (Port 443)
# =============================================================================
frontend https_in
    bind *:443 name https ssl crt-list /etc/haproxy/crt-list.txt alpn h2,http/1.1
    mode http

    # HSTS header
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Security headers
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"

    # Remove server header
    http-response del-header Server

    # Access Control Lists
    acl is_health_check path -i /health
    acl is_api path_beg -i /api/
    acl is_admin path_beg -i /admin
    acl is_horizon path_beg -i /horizon
    acl is_reverb path_beg -i /reverb
    acl is_websocket hdr(upgrade) -i websocket

    # Health check responses
    use_backend health_check_backend if is_health_check

    # WebSocket connections
    use_backend reverb_backend if is_websocket || is_reverb

    # API requests - no sticky sessions needed
    use_backend api_backend if is_api

    # Admin panel - sticky sessions
    use_backend admin_backend if is_admin

    # Horizon dashboard - sticky sessions
    use_backend horizon_backend if is_horizon

    # Default web application
    default_backend app_backend

# =============================================================================
# Let's Encrypt Backend
# =============================================================================
backend letsencrypt_backend
    mode http
    server letsencrypt 127.0.0.1:8080 check inter 1000 rise 1 fall 1

# =============================================================================
# Application Backend - Round Robin Load Balancing
# -----------------------------------------------------------------------------
# Algorithm: roundrobin - Equal distribution
# Health Check: GET /health every 2s
# Session Persistence: Cookie-based for authenticated users
# =============================================================================
backend app_backend
    mode http
    balance roundrobin

    # Cookie-based stickiness for authenticated sessions
    cookie SRVNAME insert indirect nocache httponly secure

    # Health check configuration
    option httpchk GET /health
    http-check expect status 200

    # Timeouts
    timeout connect 5s
    timeout server 30s
    tunnel 1h

    # Backend servers - Blue Environment
    server app-blue-1 10.0.1.10:80 check inter 2000 rise 3 fall 3 cookie app-blue-1 maxconn 1000 on-marked-down shutdown-sessions
    server app-blue-2 10.0.1.11:80 check inter 2000 rise 3 fall 3 cookie app-blue-2 maxconn 1000 on-marked-down shutdown-sessions backup

    # Backend servers - Green Environment (for deployments)
    server app-green-1 10.0.1.20:80 check inter 2000 rise 3 fall 3 cookie app-green-1 maxconn 1000 on-marked-down shutdown-sessions backup
    server app-green-2 10.0.1.21:80 check inter 2000 rise 3 fall 3 cookie app-green-2 maxconn 1000 on-marked-down shutdown-sessions backup

    # HTTP/2 support
    http-always h2c-setup

# =============================================================================
# API Backend - Least Connections
# -----------------------------------------------------------------------------
# Algorithm: leastconn - Route to server with fewest connections
# No sticky sessions - stateless REST API
# =============================================================================
backend api_backend
    mode http
    balance leastconn

    # Health check
    option httpchk GET /api/health
    http-check expect status 200

    # Rate limiting
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # Backend servers
    server api-blue-1 10.0.1.10:80 check inter 2000 rise 3 fall 3 maxconn 500
    server api-blue-2 10.0.1.11:80 check inter 2000 rise 3 fall 3 maxconn 500
    server api-green-1 10.0.1.20:80 check inter 2000 rise 3 fall 3 maxconn 500 backup
    server api-green-2 10.0.1.21:80 check inter 2000 rise 3 fall 3 maxconn 500 backup

# =============================================================================
# Admin Backend - IP Hash
# -----------------------------------------------------------------------------
# Algorithm: source - Consistent hashing based on client IP
# Sticky sessions required for admin operations
# =============================================================================
backend admin_backend
    mode http
    balance source

    # Health check
    option httpchk GET /admin/health
    http-check expect status 200

    # Backend servers
    server admin-blue-1 10.0.1.10:80 check inter 2000 rise 3 fall 3 maxconn 100
    server admin-blue-2 10.0.1.11:80 check inter 2000 rise 3 fall 3 maxconn 100 backup

# =============================================================================
# Horizon Backend - First Available
# -----------------------------------------------------------------------------
# Algorithm: first - Use first available server
# Stick table for session tracking
# =============================================================================
backend horizon_backend
    mode http
    balance first

    # Stick table for session persistence
    stick-table type ip size 1m expire 1h peers haproxy_peers
    stick on src

    # Health check
    option httpchk GET /horizon/api/health
    http-check expect status 200

    # Backend servers
    server horizon-1 10.0.1.30:80 check inter 2000 rise 3 fall 3 maxconn 200
    server horizon-2 10.0.1.31:80 check inter 2000 rise 3 fall 3 maxconn 200 backup

# =============================================================================
# Reverb WebSocket Backend
# -----------------------------------------------------------------------------
# Mode: tcp for WebSocket connections
# Balance: source for connection persistence
# =============================================================================
backend reverb_backend
    mode tcp
    balance source

    # Timeout for long-lived connections
    timeout tunnel 1h
    timeout connect 5s
    timeout server 1h

    # Health check
    option httpchk GET /health
    http-check expect status 200

    # Backend servers
    server reverb-1 10.0.1.40:8080 check inter 5000 rise 2 fall 3 maxconn 5000 send-proxy
    server reverb-2 10.0.1.41:8080 check inter 5000 rise 2 fall 3 maxconn 5000 send-proxy backup

# =============================================================================
# MySQL Backend - TCP Mode
# -----------------------------------------------------------------------------
# Mode: tcp for database connections
# Balance: roundrobin for read operations
# Check: MySQL protocol check
# =============================================================================
backend mysql_read_backend
    mode tcp
    balance roundrobin

    # MySQL health check
    option mysql-check user haproxy_check

    # Backend servers - Read replicas
    server mysql-read-1 10.0.2.20:3306 check inter 2000 rise 2 fall 3 maxconn 100
    server mysql-read-2 10.0.2.21:3306 check inter 2000 rise 2 fall 3 maxconn 100 backup

# =============================================================================
# Redis Backend - TCP Mode
# -----------------------------------------------------------------------------
# Mode: tcp for Redis connections
# Balance: first for consistency
# Check: Redis PING
# =============================================================================
backend redis_backend
    mode tcp
    balance first

    # Redis health check
    option tcp-check
    tcp-check send PING\r\n
    tcp-check expect string +PONG

    # Backend servers - Redis Sentinel-monitored
    server redis-1 10.0.3.10:6379 check inter 2000 rise 2 fall 3 maxconn 5000 on-marked-down shutdown-sessions
    server redis-2 10.0.3.11:6379 check inter 2000 rise 2 fall 3 maxconn 5000 on-marked-down shutdown-sessions backup
    server redis-3 10.0.3.12:6379 check inter 2000 rise 2 fall 3 maxconn 5000 on-marked-down shutdown-sessions backup

# =============================================================================
# Peer Sync for Multi-LB Setup
# =============================================================================
peers haproxy_peers
    peer lb1 10.0.0.11:55555
    peer lb2 10.0.0.12:55555
