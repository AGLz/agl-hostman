# =============================================================================
# Redis Sentinel Configuration for AGL Hostman High Availability
# =============================================================================

# Port for sentinel
port 26379

# Bind to all interfaces
bind 0.0.0.0

# Run in background
daemonize no

# PID file
pidfile /var/run/redis-sentinel.pid

# Log file
logfile ""

# Log level
loglevel notice

# Working directory
dir /data

# =============================================================================
# Master Configuration
# -----------------------------------------------------------------------------
# Monitor the master with a unique name
# quorum: Number of sentinels that agree to failover
# =============================================================================
sentinel monitor mymaster [REDIS_MASTER_IP] 6379 2

# Authentication
sentinel auth-pass mymaster [REDIS_PASSWORD]

# Down after milliseconds (master unresponsive for this time)
sentinel down-after-milliseconds mymaster 5000

# Parallel syncs (number of slaves to resync simultaneously)
sentinel parallel-syncs mymaster 1

# Failover timeout (complete failover within this time)
sentinel failover-timeout mymaster 10000

# Notification script (optional)
# sentinel notification-script mymaster /var/lib/redis/notify.sh

# Client reconfiguration script
# sentinel client-reconfig-script mymaster /var/lib/redis/reconfig.sh

# =============================================================================
# Sentinel Configuration
# -----------------------------------------------------------------------------
# Configure other sentinel instances for leader election
# =============================================================================
sentinel announce-ip [SENTINEL_IP]
sentinel announce-port 26379

# Known sentinels (add all sentinel instances here)
sentinel known-sentinel mymaster [SENTINEL_2_IP] 26379 [SENTINEL_2_RUNID]
sentinel known-sentinel mymaster [SENTINEL_3_IP] 26379 [SENTINEL_3_RUNID]

# =============================================================================
# Automatic Failover Settings
# =============================================================================
# Time to wait before starting first failover
sentinel failover-timeout mymaster 10000

# Specific script to execute for failover
# sentinel leader-epoch mymaster 1

# =============================================================================
# Deny Scripts
# =============================================================================
# Rename dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN
rename-command DEBUG ""

# =============================================================================
# Network Settings
# =============================================================================
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# Security
# =============================================================================
# requirepass "[SENTINEL_PASSWORD]"
protected-mode yes

# =============================================================================
# Logging
# =============================================================================
syslog-enabled yes
syslog-ident redis-sentinel
syslog-facility local0

# =============================================================================
# Advanced Settings
#=============
# Maximum number of clients
maxclients 10000

# Close connection after client is idle for N seconds
timeout 0

# TCP keepalive
tcp-keepalive 300

# =============================================================================
# Replication Settings
# =============================================================================
# Allow replicas to serve stale data
replica-serve-stale-data yes

# Replicas are read-only
replica-read-only yes

# Replication priority for promotion
replica-priority 100

# =============================================================================
# Notification Settings
# =============================================================================
# Enable Pub/Sub notifications
notify-keyspace-events ""
