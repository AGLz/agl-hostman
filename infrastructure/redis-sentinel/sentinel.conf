# =============================================================================
# Redis Sentinel Configuration for AGL Hostman High Availability
# =============================================================================
# This is a template configuration for Docker deployments
# For standalone deployments, use sentinel-1.conf, sentinel-2.conf, or sentinel-3.conf
#
# Environment Variables (use envsubst or Docker environment):
#   REDIS_PASSWORD    - Redis authentication password
#   REDIS_MASTER_IP   - Master Redis IP (default: redis-master)
#   SENTINEL_IP       - This Sentinel's IP (default: current container)

# =============================================================================
# Port for sentinel
# =============================================================================
port 26379

# Bind to all interfaces
bind 0.0.0.0

# Run in foreground (Docker requires this)
daemonize no

# PID file
pidfile /var/run/redis-sentinel.pid

# Log file
logfile ""

# Log level
loglevel notice

# Working directory
dir /data

# =============================================================================
# Master Configuration
# =============================================================================
# Monitor the master with quorum of 2 (need majority agreement)
# Docker service name resolution: redis-master
sentinel monitor aglmaster redis-master 6379 2

# Authentication (use REDIS_PASSWORD env var or replace placeholder)
sentinel auth-pass aglmaster ${REDIS_PASSWORD}

# Master is down after 5 seconds of no response
sentinel down-after-milliseconds aglmaster 5000

# Resync 1 slave at a time during failover
sentinel parallel-syncs aglmaster 1

# Complete failover within 10 seconds
sentinel failover-timeout aglmaster 10000

# Notification scripts (uncomment and set path if needed)
# sentinel notification-script aglmaster /etc/redis/sentinel-notify.sh
# sentinel client-reconfig-script aglmaster /etc/redis/sentinel-failover-notify.sh

# =============================================================================
# Sentinel Network Configuration
# =============================================================================
# Announce IP (Docker will use container name by default)
# sentinel announce-ip ${SENTINEL_IP}
# sentinel announce-port 26379

# =============================================================================
# Security
# =============================================================================
# Rename dangerous commands (empty = disable)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN ""

# Sentinel authentication (uncomment and set password if needed)
# requirepass "${SENTINEL_PASSWORD}"

protected-mode yes

# =============================================================================
# Network Settings
# =============================================================================
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# Logging
# =============================================================================
syslog-enabled yes
syslog-ident redis-sentinel
syslog-facility local0

# =============================================================================
# Advanced Settings
# =============================================================================
maxclients 10000

# Automatic discovery of other sentinels happens automatically
# when they monitor the same master
