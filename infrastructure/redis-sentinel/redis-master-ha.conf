# =============================================================================
# Redis Master Configuration for AGL Hostman High Availability
# =============================================================================
# Production-ready master with persistence, security, and monitoring

# Network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# =============================================================================
# Persistence - RDB Snapshots
# =============================================================================
# Save snapshot if at least 1 key changed in 900 seconds (15 minutes)
save 900 1
# Save snapshot if at least 10 keys changed in 300 seconds (5 minutes)
save 300 10
# Save snapshot if at least 10000 keys changed in 60 seconds
save 60 10000

# Stop writes if background save fails
stop-writes-on-bgsave-error yes
# Compress RDB files
rdbcompression yes
# Add CRC64 checksum to RDB files
rdbchecksum yes
dbfilename dump.rdb
dir /data

# =============================================================================
# Replication Configuration
# =============================================================================
# Serve stale data when replication is down
replica-serve-stale-data yes
# Replicas are read-only
replica-read-only yes
# Use diskless replication
repl-diskless-sync yes
repl-diskless-sync-delay 5
# Disable TCP no delay for faster replication
repl-disable-tcp-nodelay no
# Replication backlog for partial resync
repl-backlog-size 10mb
repl-backlog-ttl 3600
# Replication ping period
repl-ping-replica-period 10
# Replication timeout
repl-timeout 60

# Replica priority (lower = higher priority for promotion)
replica-priority 100

# =============================================================================
# Security
# =============================================================================
# Set a strong password (use REDIS_PASSWORD env var)
# requirepass ${REDIS_PASSWORD}
# masterauth ${REDIS_PASSWORD}

# Rename dangerous commands (empty = disable)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG CONFIG_X81B3F
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_X81B3F
rename-command EVAL ""
rename-command EVALSHA ""

# =============================================================================
# Memory Management
# =============================================================================
maxclients 10000
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# =============================================================================
# Append Only File (AOF) - Better durability
# =============================================================================
appendonly yes
appendfilename "appendonly.aof"
# Sync every second for balance between speed and durability
appendfsync everysec
# Don't block during AOF rewrite
no-appendfsync-on-rewrite no
# Rewrite AOF when 100% larger than base
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# Load truncated AOF files
aof-load-truncated yes
# Use RDB preamble for faster restart
aof-use-rdb-preamble yes

# =============================================================================
# Lua scripting
# =============================================================================
lua-time-limit 5000

# =============================================================================
# Slow log
# =============================================================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# =============================================================================
# Latency monitor
# =============================================================================
latency-monitor-threshold 100

# =============================================================================
# Event notification
# =============================================================================
# Enable for key space notifications (uncomment if needed)
# notify-keyspace-events "KEA"

# =============================================================================
# Advanced config - Data structure optimization
# =============================================================================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# =============================================================================
# Active rehashing
# =============================================================================
activerehashing yes

# =============================================================================
# Client output buffers
# =============================================================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# Background tasks
# =============================================================================
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# =============================================================================
# Active defragmentation (Redis 4+)
# =============================================================================
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 25
active-defrag-cycle-max 75

# =============================================================================
# Tracking for client-side caching
# =============================================================================
# Enable tracking for improved read performance
# tracking-table-max-keys 100000
# tracking-table-max-fill 50

# =============================================================================
# TLS (uncomment for production)
# =============================================================================
# tls-port 6379
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
# tls-auth-clients yes
