# =============================================================================
# Redis Sentinel 3 Configuration for AGL Hostman HA
# =============================================================================
# Sentinel instance 3 of 3 (quorum requires 2)

# Port for sentinel
port 26379

# Bind to all interfaces (configure specific IP in production)
bind 0.0.0.0

# Run in foreground (Docker requires this)
daemonize no

# PID file
pidfile /var/run/redis-sentinel.pid

# Log file
logfile ""

# Log level
loglevel notice

# Working directory
dir /data

# =============================================================================
# Master Configuration
# =============================================================================
# Monitor the master with quorum of 2 (need majority agreement)
sentinel monitor aglmaster redis-master 6379 2

# Authentication (use REDIS_PASSWORD env var)
sentinel auth-pass aglmaster ${REDIS_PASSWORD}

# Master is down after 5 seconds of no response
sentinel down-after-milliseconds aglmaster 5000

# Resync 1 slave at a time during failover
sentinel parallel-syncs aglmaster 1

# Complete failover within 10 seconds
sentinel failover-timeout aglmaster 10000

# =============================================================================
# Notification Scripts
# =============================================================================
# Execute this script when failover starts
# sentinel leader-epoch aglmaster 1

# Client reconfiguration script (updates application config)
sentinel client-reconfig-script aglmaster /etc/redis/sentinel-failover-notify.sh

# Notification script for alerts
sentinel notification-script aglmaster /etc/redis/sentinel-notify.sh

# =============================================================================
# Sentinel Network Configuration
# =============================================================================
# Announce IP (change to actual host IP in production)
sentinel announce-ip redis-sentinel-3
sentinel announce-port 26379

# =============================================================================
# Security
# =============================================================================
# Rename dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN SENTINEL_SHUTDOWN

# Sentinel authentication
# requirepass "${SENTINEL_PASSWORD}"

protected-mode yes

# =============================================================================
# Network Settings
# =============================================================================
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# Logging
# =============================================================================
syslog-enabled yes
syslog-ident redis-sentinel-3
syslog-facility local0

# =============================================================================
# Advanced Settings
# =============================================================================
maxclients 10000

# Automatic discovery of other sentinels happens automatically
# when they monitor the same master
