# =============================================================================
# Redis Slave Configuration for AGL Hostman High Availability
# =============================================================================
# Production-ready slave with replication and failover support

# Network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# =============================================================================
# Replication Configuration
# =============================================================================
# Replicate from master (set via command line or use sentinel)
# replicaof redis-master 6379

# Master authentication
# masterauth ${REDIS_PASSWORD}

# Serve stale data when master is down
replica-serve-stale-data yes
# This instance is read-only
replica-read-only yes
# Use diskless replication
repl-diskless-sync yes
repl-diskless-sync-delay 5
# Disable TCP no delay for faster replication
repl-disable-tcp-nodelay no
# Replication backlog for partial resync
repl-backlog-size 10mb
repl-backlog-ttl 3600
# Replication ping period
repl-ping-replica-period 10
# Replication timeout
repl-timeout 60

# Replica priority (lower = higher priority for promotion)
# Set different priorities for controlled failover:
# - 10: Primary promotion candidate
# - 100: Default
# - 1000: Never promote
replica-priority 100

# =============================================================================
# Persistence (slaves can use lighter persistence)
# =============================================================================
# Disable automatic RDB saves on slaves (rely on replication)
save ""
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# =============================================================================
# AOF for durability
# =============================================================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =============================================================================
# Security
# =============================================================================
# Set a strong password (same as master)
# requirepass ${REDIS_PASSWORD}

# Rename dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG CONFIG_X81B3F
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_X81B3F
rename-command EVAL ""
rename-command EVALSHA ""

# =============================================================================
# Memory Management
# =============================================================================
maxclients 10000
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# =============================================================================
# Lua scripting
# =============================================================================
lua-time-limit 5000

# =============================================================================
# Slow log
# =============================================================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# =============================================================================
# Latency monitor
# =============================================================================
latency-monitor-threshold 100

# =============================================================================
# Event notification
# =============================================================================
notify-keyspace-events ""

# =============================================================================
# Advanced config - Data structure optimization
# =============================================================================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# =============================================================================
# Active rehashing
# =============================================================================
activerehashing yes

# =============================================================================
# Client output buffers
# =============================================================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# Background tasks
# =============================================================================
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# =============================================================================
# Active defragmentation
# =============================================================================
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 25
active-defrag-cycle-max 75
