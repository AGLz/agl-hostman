# =============================================================================
# GitHub Actions: Terraform Plan
# AGL Hostman - Infrastructure as Code
# =============================================================================

name: "Terraform Plan"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "infrastructure/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - staging
          - production

env:
  TF_VERSION: "1.6.0"
  TF_CLOUD_ORGANIZATION: "agl-hostman"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: "Plan - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.TERRAFORM_AWS_ROLE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure/terraform
        env:
          TF_VAR_environment: ${{ matrix.environment }}
        run: |
          terraform init \
            -backend-config="bucket=agl-terraform-state" \
            -backend-config="key=${{ matrix.environment }}/infrastructure.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Workspace
        working-directory: infrastructure/terraform
        run: |
          terraform workspace select ${{ matrix.environment }} || \
          terraform workspace new ${{ matrix.environment }}

      - name: Terraform Format
        working-directory: infrastructure/terraform
        run: terraform fmt -recursive

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform
        env:
          TF_VAR_environment: ${{ matrix.environment }}
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
            -out=tfplan \
            -no-color

      - name: Save Plan Output
        working-directory: infrastructure/terraform
        run: |
          terraform show -json tfplan > plan.json
          terraform show tfplan > plan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            infrastructure/terraform/tfplan
            infrastructure/terraform/plan.json
            infrastructure/terraform/plan.txt
          retention-days: 30

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infrastructure/terraform/plan.txt', 'utf8');

            const comment = `## Terraform Plan - ${{ matrix.environment }}

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`
            </details>

            *Generated by Terraform ${{ env.TF_VERSION }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  cost-estimate:
    name: "Cost Estimate"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'production' }}
          path: infrastructure/terraform

      - name: Install Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh

      - name: Run Infracost
        working-directory: infrastructure/terraform
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'production' }}
        run: |
          infracost breakdown --path tfplan \
            --format markdown \
            --out-file infracost.md

      - name: Comment Cost Estimate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const costOutput = fs.readFileSync('infrastructure/terraform/infracost.md', 'utf8');

            const comment = `## Cost Estimate - ${{ github.event.inputs.environment || 'production' }}

            ${costOutput}

            *Generated by Infracost*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
