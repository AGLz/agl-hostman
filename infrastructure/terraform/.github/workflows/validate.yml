# =============================================================================
# GitHub Actions: Terraform Validate
# AGL Hostman - Infrastructure as Code
# =============================================================================

name: "Terraform Validate"

on:
  push:
    branches:
      - "**"
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/validate.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "infrastructure/terraform/**"

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: "Validate Terraform"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - infrastructure/terraform
          - infrastructure/terraform/modules/proxmox_vm
          - infrastructure/terraform/modules/proxmox_lxc
          - infrastructure/terraform/modules/proxmox_network
          - infrastructure/terraform/modules/proxmox_storage
          - infrastructure/terraform/modules/docker_service
          - infrastructure/terraform/modules/docker_compose
          - infrastructure/terraform/modules/docker_registry
          - infrastructure/terraform/modules/ha_load_balancer
          - infrastructure/terraform/modules/ha_database
          - infrastructure/terraform/backends

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "/infrastructure/terraform"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-results.sarif"

  checkov-scan:
    name: "Checkov Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: /infrastructure/terraform
          framework: terraform
          output_format: cli
          soft_fail: true

  docs-check:
    name: "Documentation Check"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README Files
        run: |
          for module in infrastructure/terraform/modules/*/; do
            if [ ! -f "$module/README.md" ]; then
              echo "Missing README for $module"
              exit 1
            fi
          done

      - name: Check Examples
        run: |
          if [ ! -f "infrastructure/terraform/examples/complete-stack.tf" ]; then
            echo "Missing complete-stack example"
            exit 1
          fi
