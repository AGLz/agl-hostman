name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, soap, intl, gd, exif
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: ./vendor/bin/pest --min=80

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, soap, intl, gd, exif
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
        env:
          APP_ENV: staging
          APP_KEY: ${{ secrets.STAGING_APP_KEY }}

      - name: Deploy to Dokploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_STAGING }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref }}","sha":"${{ github.sha }}"}'

      - name: Run Migrations
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_STAGING }}/migrate" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}"

      - name: Health Check
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.example.com/api/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_STAGING }}/rollback" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}"

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
