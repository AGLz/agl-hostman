# WireGuard Peer Configuration Template
# For adding peers to FGSRV6 Hub configuration
#
# This template is used on the HUB (FGSRV6) when adding new peers
# Add this section to /etc/wireguard/wg0.conf on FGSRV6
#
# Usage:
#   1. Get new peer's public key (from peer's /etc/wireguard/publickey)
#   2. Assign IP from 10.6.0.25-10.6.0.50 range
#   3. Add this section to hub's wg0.conf
#   4. Reload: wg syncconf wg0 <(wg-quick strip wg0)
#
# Placeholders to replace:
#   <PEER_PUBLIC_KEY>  - From new peer's publickey file
#   <10.6.0.X>         - Assigned IP for new peer
#   <PEER_NAME>        - Human-readable name for documentation

###############################################################################
# PEER SECTION - Add to HUB configuration (FGSRV6)
###############################################################################

# <PEER_NAME>
# Added: <DATE>
# Type: <LXC Container | Proxmox Host | VPS>
# Location: <AGLHQ | AGLALD | AGLFG-VPS>
[Peer]
# New peer's public key
PublicKey = <PEER_PUBLIC_KEY>

# WireGuard IP assigned to this peer
# Use /32 for single peer (not /24)
AllowedIPs = <10.6.0.X>/32

# Endpoint (optional - for peers with public IPs or port forwarding)
# Uncomment if peer has static public IP:
# Endpoint = <PEER_PUBLIC_IP>:<PEER_PORT>

# Persistent keepalive (usually not needed for hub-to-peer)
# Hub has public IP, so peer initiates connection
# Uncomment if peer is behind symmetric NAT:
# PersistentKeepalive = 25

###############################################################################
# USAGE EXAMPLES
###############################################################################

# Example 1: Add LXC container (no Endpoint needed)
# [Peer]
# # CT120 - Development container on AGLSRV1
# PublicKey = Ap0K+tZFaRg16L0qinuAJYKW8iQPvC9qG2dYhWPzHBo=
# AllowedIPs = 10.6.0.1/32

# Example 2: Add Proxmox host (with Endpoint)
# [Peer]
# # AGLSRV1 - Proxmox host at HQ
# PublicKey = eqZp7/vSmjYn/sCN53xVXrguVHMVqdEvBu+m3Y60D0o=
# AllowedIPs = 10.6.0.10/32
# Endpoint = 192.168.0.245:51810

# Example 3: Add remote VPS (with public IP Endpoint)
# [Peer]
# # FGSRV5 - VPS at public cloud
# PublicKey = PZbaLhHorMAmxvTd+8QQHkNhhGKJ52yNwNMj0JpKWms=
# AllowedIPs = 10.6.0.11/32
# Endpoint = 100.71.107.26:51811

###############################################################################
# PEER MANAGEMENT COMMANDS (on HUB)
###############################################################################

# List all configured peers:
# wg show wg0 peers

# Show peer details:
# wg show wg0 peer <PUBLIC_KEY>

# Add peer dynamically (without config file edit):
# wg set wg0 peer <PEER_PUBLIC_KEY> allowed-ips 10.6.0.X/32

# Remove peer:
# wg set wg0 peer <PEER_PUBLIC_KEY> remove

# Check peer handshakes:
# wg show wg0 latest-handshakes

# Reload configuration after editing config file:
# wg syncconf wg0 <(wg-quick strip wg0)

# Or restart WireGuard:
# systemctl restart wg-quick@wg0

