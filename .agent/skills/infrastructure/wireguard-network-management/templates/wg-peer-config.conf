###############################################################################
# TROUBLESHOOTING PEER CONNECTIONS
###############################################################################

# Peer not connecting?
# 1. Check peer has correct hub public key
# 2. Check peer endpoint is correct (186.202.57.120:51823)
# 3. Check peer AllowedIPs includes 10.6.0.0/24
# 4. Check for PresharedKey in LXC (should NOT have it)
# 5. Check firewall allows UDP 51823 to hub
# 6. Check hub config has correct AllowedIPs for peer (10.6.0.X/32)

# No handshake?
# 1. Verify peer can reach hub: ping 186.202.57.120
# 2. Verify UDP port open: nc -u -z 186.202.57.120 51823
# 3. Check peer WireGuard logs: journalctl -u wg-quick@wg0 -n 50
# 4. Check hub WireGuard logs: journalctl -u wg-quick@wg0 -n 50

# Handshake established but can't ping?
# 1. Check routing table: ip route show
# 2. Check peer IP is correct: ip addr show wg0
# 3. Check firewall rules on both ends
# 4. Verify AllowedIPs configuration

# Monitor peer connections:
# watch -n 5 'wg show wg0'

###############################################################################
# SECURITY REMINDERS
###############################################################################

# - Never commit private keys to git
# - Public keys only in hub configuration
# - Pre-shared keys for hosts only (not LXC)
# - Regular key rotation (every 6 months)
# - Monitor for unauthorized peers
# - Keep WireGuard updated
# - Use firewall rules to restrict access
# - Document all peer additions/removals

