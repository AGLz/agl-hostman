# WireGuard Configuration Template
# For AGL Infrastructure Mesh Network (10.6.0.0/24)
#
# This template is for new WireGuard peers joining the mesh
# Hub: FGSRV6 (186.202.57.120:51823)
# Hub Public Key: Dj8XsoPeDlgnqA4Ox++yDy+t4xGxYtEevxQh513fSA8=
#
# Usage:
#   1. Copy this template to /etc/wireguard/wg0.conf
#   2. Replace placeholders with actual values
#   3. For LXC containers: DO NOT use PresharedKey
#   4. For Proxmox hosts: USE PresharedKey
#   5. Start with: wg-quick up wg0
#
# Placeholders to replace:
#   <PRIVATE_KEY>      - Generated with: wg genkey
#   <10.6.0.X>         - Assigned IP from 10.6.0.25-10.6.0.50 range
#   <LISTEN_PORT>      - UDP port (optional for peers, required for hub)
#   <PRESHARED_KEY>    - For hosts only (NOT for LXC containers)

###############################################################################
# INTERFACE SECTION - Local peer configuration
###############################################################################
[Interface]
# Private key (generate with: wg genkey | tee privatekey | wg pubkey > publickey)
PrivateKey = <PRIVATE_KEY>

# IP address in WireGuard mesh network (10.6.0.0/24)
# Get next available IP from: docs/WIREGUARD.md
Address = <10.6.0.X>/24

# DNS servers for mesh network
# Cloudflare primary, Google secondary
DNS = 1.1.1.1, 8.8.8.8

# Maximum Transmission Unit
# 1420 = 1500 (standard) - 80 (WireGuard overhead)
MTU = 1420

# Listen port (only for hub or if this peer needs inbound connections)
# Most peers don't need this - they connect outbound to hub
# ListenPort = <LISTEN_PORT>

# PostUp/PostDown scripts (optional - for advanced routing)
# PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# SaveConfig (WARNING: This can overwrite manual config changes)
# SaveConfig = false

###############################################################################
# PEER SECTION - Hub configuration (FGSRV6)
###############################################################################
[Peer]
# Hub public key
PublicKey = Dj8XsoPeDlgnqA4Ox++yDy+t4xGxYtEevxQh513fSA8=

# Pre-shared key (OPTIONAL - for Proxmox hosts ONLY)
# CRITICAL: Do NOT use PresharedKey in LXC containers
# Causes handshake failures in unprivileged containers
# Uncomment for Proxmox hosts only:
# PresharedKey = DDvQ3xJ9Rs5pbEzXLuGCdep66zBuVNcy654+A/vD+Zk=

# Allowed IPs - which networks to route through this peer
# 10.6.0.0/24 = entire mesh network (recommended for spokes)
# DO NOT use 0.0.0.0/0 (would route internet through VPN)
AllowedIPs = 10.6.0.0/24

# Hub endpoint (public IP:port)
Endpoint = 186.202.57.120:51823

# Persistent keepalive (seconds)
# Maintains NAT traversal for peers behind firewalls/NAT
# 25 seconds is optimal for most NAT devices
# Hub does not need this (has public IP)
PersistentKeepalive = 25

###############################################################################
# ADDITIONAL PEERS (optional - for direct peer-to-peer connections)
###############################################################################
# Example: Add direct connection to another peer
# [Peer]
# PublicKey = <OTHER_PEER_PUBLIC_KEY>
# AllowedIPs = 10.6.0.Y/32
# Endpoint = <OTHER_PEER_PUBLIC_IP>:<PORT>
# PersistentKeepalive = 25

###############################################################################
# LXC CONTAINER REQUIREMENTS
###############################################################################
# For LXC containers on Proxmox, add to /etc/pve/lxc/<VMID>.conf:
#
# features: keyctl=1,nesting=1
# lxc.cgroup2.devices.allow: c 10:200 rwm
# lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
#
# Then restart container: pct restart <VMID>
###############################################################################

###############################################################################
# TROUBLESHOOTING
###############################################################################
# No handshake?
#   - Check: PresharedKey not used in LXC containers
#   - Check: AllowedIPs is 10.6.0.0/24 (not 0.0.0.0/0)
#   - Check: Firewall allows UDP 51823 outbound
#   - Check: Endpoint is reachable (ping 186.202.57.120)
#
# Can't start WireGuard?
#   - Check: /dev/net/tun exists in LXC container
#   - Check: LXC config has keyctl=1,nesting=1
#   - Check: Restart container after adding LXC features
#
# Connection drops?
#   - Check: PersistentKeepalive is set to 25
#   - Check: Network stability
#   - Check: Firewall not blocking UDP
#
# Commands:
#   wg show wg0                    # Show status
#   wg-quick up wg0                # Start interface
#   wg-quick down wg0              # Stop interface
#   systemctl restart wg-quick@wg0 # Restart service
#   journalctl -u wg-quick@wg0 -f  # View logs
###############################################################################
