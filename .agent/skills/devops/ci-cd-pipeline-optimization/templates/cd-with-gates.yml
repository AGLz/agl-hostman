name: CD - Continuous Deployment with Gates

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (default: latest)'
        required: false
        type: string
      skip_tests:
        description: 'Skip post-deployment tests (not recommended)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: harbor.aglz.io:5000
  IMAGE_NAME: agl-hostman

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # PRE-DEPLOYMENT VALIDATION
  # ============================================================================
  pre-deploy-validation:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      image_tag: ${{ steps.check.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify CI passed
        id: check
        run: |
          echo "Checking if CI workflow passed for this commit..."

          # Check if commit is on main branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "Not on main branch, skipping production deployment"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate configuration files
        run: |
          if [ ! -f "src/.env.example" ]; then
            echo "Error: .env.example not found"
            exit 1
          fi
          echo "Configuration files validated"

  # ============================================================================
  # DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pre-deploy-validation
    if: |
      always() &&
      (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging') &&
      needs.pre-deploy-validation.outputs.should_deploy == 'true'
    environment:
      name: staging
      url: https://staging-agl.aglz.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Pull latest image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-deploy-validation.outputs.image_tag }}

      - name: Deploy to staging via Dokploy
        run: |
          curl -X POST "${{ secrets.STAGING_DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": \"${{ github.ref_name }}\",
              \"sha\": \"${{ github.sha }}\",
              \"image_tag\": \"${{ needs.pre-deploy-validation.outputs.image_tag }}\"
            }"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for staging deployment to stabilize..."
          sleep 60

      - name: Run health checks on staging
        run: |
          for i in {1..30}; do
            if curl -f https://staging-agl.aglz.io/api/health; then
              echo "Staging deployment is healthy"
              exit 0
            fi
            echo "Waiting for health check... ($i/30)"
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Run smoke tests on staging
        run: |
          curl -f https://staging-agl.aglz.io/api/overview || exit 1
          curl -f https://staging-agl.aglz.io/api/containers || exit 1
          curl -f https://staging-agl.aglz.io/api/vms || exit 1
          echo "Smoke tests passed"

  # ============================================================================
  # DEPLOY TO PRODUCTION (Blue-Green with Gates)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, deploy-staging]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production') &&
      needs.deploy-staging.result == 'success'
    environment:
      name: production
      url: https://prod-agl.aglz.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version tag
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || 'latest' }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Initialize blue-green deployment
        run: |
          echo "Starting blue-green deployment to production..."

      - name: Determine active slot
        id: slot
        run: |
          # Query current active slot from production
          ACTIVE_SLOT=$(curl -s https://prod-agl.aglz.io/api/deployment/slot || echo "blue")
          INACTIVE_SLOT=$([ "$ACTIVE_SLOT" = "blue" ] && echo "green" || echo "blue")
          echo "active=$ACTIVE_SLOT" >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE_SLOT" >> $GITHUB_OUTPUT
          echo "Active slot: $ACTIVE_SLOT"
          echo "Target slot: $INACTIVE_SLOT"

      - name: Deploy to inactive slot
        run: |
          echo "Deploying to ${{ steps.slot.outputs.inactive }} slot..."

          # Deploy via Dokploy to inactive slot
          curl -X POST "${{ secrets.PRODUCTION_DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"slot\": \"${{ steps.slot.outputs.inactive }}\",
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"sha\": \"${{ github.sha }}\",
              \"blue_green\": true
            }"

      - name: Wait for inactive slot deployment
        run: |
          echo "Waiting for ${{ steps.slot.outputs.inactive }} slot to be ready..."
          sleep 90

      - name: Health check inactive slot
        run: |
          INACTIVE_ENDPOINT="https://${{ steps.slot.outputs.inactive }}-prod-agl.aglz.io/api/health"
          for i in {1..20}; do
            if curl -f "$INACTIVE_ENDPOINT"; then
              echo "Inactive slot is healthy"
              exit 0
            fi
            echo "Waiting for inactive slot health... ($i/20)"
            sleep 15
          done
          exit 1

      - name: Run smoke tests on inactive slot
        run: |
          INACTIVE_BASE="https://${{ steps.slot.outputs.inactive }}-prod-agl.aglz.io"
          curl -f "$INACTIVE_BASE/api/overview" || exit 1
          curl -f "$INACTIVE_BASE/api/containers" || exit 1
          curl -f "$INACTIVE_BASE/api/vms" || exit 1
          echo "Smoke tests passed on inactive slot"

      # Gradual traffic switch (10%, 50%, 100%)
      - name: Switch 10% traffic
        run: |
          echo "Switching 10% traffic to ${{ steps.slot.outputs.inactive }}"
          curl -X POST "${{ secrets.PRODUCTION_LB_API_URL }}/traffic" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_LB_TOKEN }}" \
            -d "{
              \"from\": \"${{ steps.slot.outputs.active }}\",
              \"to\": \"${{ steps.slot.outputs.inactive }}\",
              \"percentage\": 10
            }"
          echo "Waiting for stability..."
          sleep 60

      - name: Monitor error rates (10%)
        run: |
          ERROR_RATE=$(curl -s "https://prod-agl.aglz.io/api/metrics/error-rate" || echo "0")
          if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
            echo "Error rate too high at 10%: $ERROR_RATE"
            echo "ROLLBACK=true" >> $GITHUB_ENV
            exit 1
          fi
          echo "Error rate acceptable: $ERROR_RATE"

      - name: Switch 50% traffic
        if: env.ROLLBACK != 'true'
        run: |
          echo "Switching 50% traffic to ${{ steps.slot.outputs.inactive }}"
          curl -X POST "${{ secrets.PRODUCTION_LB_API_URL }}/traffic" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_LB_TOKEN }}" \
            -d "{
              \"from\": \"${{ steps.slot.outputs.active }}\",
              \"to\": \"${{ steps.slot.outputs.inactive }}\",
              \"percentage\": 50
            }"
          echo "Waiting for stability..."
          sleep 120

      - name: Monitor error rates (50%)
        if: env.ROLLBACK != 'true'
        run: |
          ERROR_RATE=$(curl -s "https://prod-agl.aglz.io/api/metrics/error-rate" || echo "0")
          if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
            echo "Error rate too high at 50%: $ERROR_RATE"
            echo "ROLLBACK=true" >> $GITHUB_ENV
            exit 1
          fi
          echo "Error rate acceptable: $ERROR_RATE"

      - name: Switch 100% traffic
        if: env.ROLLBACK != 'true'
        run: |
          echo "Switching 100% traffic to ${{ steps.slot.outputs.inactive }}"
          curl -X POST "${{ secrets.PRODUCTION_LB_API_URL }}/traffic" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_LB_TOKEN }}" \
            -d "{
              \"from\": \"${{ steps.slot.outputs.active }}\",
              \"to\": \"${{ steps.slot.outputs.inactive }}\",
              \"percentage\": 100
            }"

      - name: Monitor final state
        if: env.ROLLBACK != 'true'
        run: |
          echo "Monitoring final state for 5 minutes..."
          for i in {1..10}; do
            ERROR_RATE=$(curl -s "https://prod-agl.aglz.io/api/metrics/error-rate" || echo "0")
            if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
              echo "High error rate detected: $ERROR_RATE"
              echo "ROLLBACK=true" >> $GITHUB_ENV
              break
            fi
            sleep 30
          done

      - name: Mark new slot as active
        if: env.ROLLBACK != 'true'
        run: |
          echo "Marking ${{ steps.slot.outputs.inactive }} as active slot..."
          curl -X POST "${{ secrets.PRODUCTION_DOKPLOY_WEBHOOK_URL }}/activate" \
            -H "Content-Type: application/json" \
            -d "{\"slot\": \"${{ steps.slot.outputs.inactive }}\"}"

      - name: Keep old slot for rollback
        if: env.ROLLBACK != 'true'
        run: |
          echo "Old slot kept available for 1 hour rollback window"

      - name: Final health check
        if: env.ROLLBACK != 'true'
        run: |
          for i in {1..10}; do
            if curl -f https://prod-agl.aglz.io/api/health; then
              echo "Production deployment successful"
              exit 0
            fi
            sleep 10
          done
          exit 1

  # ============================================================================
  # POST-DEPLOYMENT TESTS
  # ============================================================================
  post-deploy-tests:
    name: Post-deployment Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: |
      always() &&
      needs.deploy-production.result == 'success' &&
      github.event.inputs.skip_tests != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, bcmath

      - name: Install Composer dependencies
        working-directory: ./src
        run: composer install --prefer-dist --no-interaction

      - name: Run integration tests against production
        working-directory: ./src
        run: |
          cp .env.testing .env
          php artisan test --testsuite=Integration --filter=ProductionSmokeTests

  # ============================================================================
  # ROLLBACK ON FAILURE
  # ============================================================================
  rollback-on-failure:
    name: Auto-rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: |
      (failure() && needs.deploy-production.result == 'failure') ||
      (always() && needs.deploy-production.outputs.ROLLBACK == 'true')
    environment:
      name: production

    steps:
      - name: Initiate rollback
        run: |
          echo "Deployment failed, initiating rollback..."

      - name: Switch traffic back to previous slot
        run: |
          curl -X POST "${{ secrets.PRODUCTION_LB_API_URL }}/traffic" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_LB_TOKEN }}" \
            -d '{"percentage": 100, "slot": "previous"}'

      - name: Verify rollback health
        run: |
          for i in {1..20}; do
            if curl -f https://prod-agl.aglz.io/api/health; then
              echo "Rollback successful"
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Notify rollback
        run: |
          echo "Rollback notification sent"
          # Send notification via Slack/webhook

  # ============================================================================
  # DEPLOYMENT SUMMARY
  # ============================================================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, deploy-staging, deploy-production, post-deploy-tests]
    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "## Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-deploy Tests | ${{ needs.post-deploy-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send deployment notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Deployment: ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Staging:*\n${{ needs.deploy-staging.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Production:*\n${{ needs.deploy-production.result }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
