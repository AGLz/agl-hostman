# ZFS Scrub Configuration
# Configuration for zfs-scrub-manager.sh

# Scrub scheduling
SCRUB_SCHEDULE="weekly"              # daily|weekly|monthly
SCRUB_DAY=7                         # Day of week for weekly scrubs (1=Monday, 7=Sunday)
SCRUB_HOUR=02                       # Hour to start scrubs (24-hour format)
SCRUB_MAX_AGE_DAYS=7                # Force scrub if last scrub older than this

# Scrub monitoring
SCRUB_MONITOR_PROGRESS=true         # Monitor and log scrub progress
SCRUB_CHECK_INTERVAL=300            # Check progress every N seconds (5 minutes)
SCRUB_MAX_WAIT_HOURS=24             # Maximum hours to wait for scrub completion

# Performance management
SCRUB_PAUSE_ON_HIGH_LOAD=true       # Pause scrub if system load too high
SCRUB_LOAD_THRESHOLD=2.0            # System load threshold for pausing
SCRUB_CHECK_IMPACT=true             # Monitor system impact during scrub
SCRUB_NICE_LEVEL=10                 # Nice level for scrub processes

# Pool-specific settings
SCRUB_PRIORITY_POOLS=""             # High-priority pools (comma-separated)
SCRUB_DELAY_BETWEEN_POOLS=300       # Delay between scrubbing pools (seconds)
SCRUB_EXCLUDE_POOLS=""              # Pools to exclude from automatic scrubbing

# Scrub validation
SCRUB_VERIFY_COMPLETION=true        # Verify scrub actually completed
SCRUB_ALERT_ON_ERRORS=true          # Send alerts if scrub finds errors
SCRUB_ALERT_ON_COMPLETION=false     # Send alerts on successful completion
SCRUB_FAIL_ON_ERRORS=false          # Consider scrub failed if errors found

# Scheduling constraints
SCRUB_BUSINESS_HOURS_ONLY=false     # Only scrub during business hours
SCRUB_BUSINESS_START=09             # Business hours start (24-hour)
SCRUB_BUSINESS_END=17               # Business hours end (24-hour)
SCRUB_WEEKEND_ONLY=false            # Only scrub on weekends

# Maintenance windows
SCRUB_MAINTENANCE_WINDOW=false      # Use maintenance windows for scrubbing
SCRUB_MAINTENANCE_START="02:00"     # Maintenance window start (HH:MM)
SCRUB_MAINTENANCE_END="06:00"       # Maintenance window end (HH:MM)
SCRUB_MAINTENANCE_DAYS="0,6"        # Maintenance days (0=Sunday, 6=Saturday)

# Advanced settings
SCRUB_RATE_LIMIT_MB=100             # Scrub rate limit (MB/s, 0=unlimited)
SCRUB_CONCURRENT_POOLS=1            # Number of pools to scrub concurrently
SCRUB_PRIORITY_DATASETS=""          # Datasets to prioritize during scrub

# Error handling
SCRUB_RETRY_ON_FAILURE=true         # Retry failed scrubs
SCRUB_MAX_RETRIES=3                 # Maximum retry attempts
SCRUB_RETRY_DELAY=3600              # Delay between retries (seconds)

# Logging and reporting
SCRUB_LOG_DETAIL="normal"           # Logging detail: minimal|normal|verbose
SCRUB_REPORT_ENABLED=true           # Generate scrub reports
SCRUB_REPORT_EMAIL=""               # Email for scrub reports (optional)
SCRUB_HISTORY_RETENTION=90          # Days to keep scrub history

# Integration settings
SCRUB_METRICS_ENABLED=true          # Export scrub metrics for monitoring
SCRUB_PROMETHEUS_PORT=9101          # Port for Prometheus scrub metrics

# Pool health thresholds for emergency scrubbing
EMERGENCY_SCRUB_ON_DEGRADED=true    # Emergency scrub if pool degraded
EMERGENCY_SCRUB_ON_ERRORS=true      # Emergency scrub if I/O errors detected
EMERGENCY_SCRUB_ERROR_THRESHOLD=1   # Trigger emergency scrub after N errors

# Seasonal adjustments
SCRUB_SUMMER_SCHEDULE=""            # Alternative schedule for summer months
SCRUB_WINTER_SCHEDULE=""            # Alternative schedule for winter months
SCRUB_SEASONAL_ENABLED=false        # Enable seasonal schedule adjustments