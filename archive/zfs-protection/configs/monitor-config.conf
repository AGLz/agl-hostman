# ZFS Health Monitor Configuration
# Configuration for zfs-health-monitor.sh

# Monitoring intervals
CHECK_INTERVAL=300                    # Health check interval in seconds (5 minutes)

# Alert thresholds
CAPACITY_WARNING_THRESHOLD=80         # Pool capacity warning threshold (%)
CAPACITY_CRITICAL_THRESHOLD=90        # Pool capacity critical threshold (%)
TEMP_WARNING_THRESHOLD=50             # Drive temperature warning threshold (°C)
REALLOCATED_THRESHOLD=5               # Reallocated sectors warning threshold

# ARC (ZFS cache) thresholds
ARC_HIT_RATIO_THRESHOLD=85           # Minimum acceptable ARC hit ratio (%)
ARC_USAGE_THRESHOLD=90               # Maximum ARC memory usage (%)

# Alert settings
ALERTS_ENABLED=true                   # Enable/disable alerting
ALERT_RATE_LIMIT=300                 # Rate limit for alerts (seconds)

# SMART monitoring
SMART_ENABLED=true                    # Enable SMART monitoring for drives
SMART_SHORT_TEST_INTERVAL=7          # Days between short SMART tests
SMART_LONG_TEST_INTERVAL=30          # Days between long SMART tests

# Performance monitoring
MONITOR_PERFORMANCE=true              # Monitor pool performance metrics
PERFORMANCE_ALERT_THRESHOLD=1000     # Alert if I/O wait exceeds this (ms)
LATENCY_WARNING_THRESHOLD=10         # Alert if latency exceeds this (ms)

# Logging
LOG_RETENTION_DAYS=30                # Days to keep log files
MAX_LOG_SIZE=100M                    # Maximum log file size before rotation

# Notification settings
NOTIFY_ON_DEGRADED=true              # Send alerts for degraded pools
NOTIFY_ON_ERRORS=true                # Send alerts for I/O errors
NOTIFY_ON_SCRUB_COMPLETION=false     # Send alerts when scrubs complete successfully
NOTIFY_ON_HIGH_CAPACITY=true         # Send alerts for high capacity usage

# Pool-specific settings (comma-separated pool names)
CRITICAL_POOLS=""                    # Pools that require immediate alerts
BACKUP_POOLS=""                      # Pools used for backups (less critical alerts)

# System integration
INTEGRATION_PROMETHEUS=false         # Export metrics for Prometheus
INTEGRATION_GRAFANA=false           # Enable Grafana dashboard
PROMETHEUS_PORT=9100                # Port for Prometheus metrics

# Advanced settings
MONITOR_FRAGMENTATION=true           # Monitor pool fragmentation
FRAGMENTATION_WARNING=50            # Fragmentation warning threshold (%)
FRAGMENTATION_CRITICAL=80           # Fragmentation critical threshold (%)

# Maintenance windows (during which alerts may be suppressed)
MAINTENANCE_WINDOW_ENABLED=false
MAINTENANCE_WINDOW_START="02:00"    # Start time (HH:MM)
MAINTENANCE_WINDOW_END="06:00"      # End time (HH:MM)
MAINTENANCE_WINDOW_DAYS="0,6"       # Days of week (0=Sunday, 6=Saturday)